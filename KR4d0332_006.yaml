body:
  text: 臞軒集卷六宋王邁撰啓按此卷起自丙子再薦至初蒞潭州觀察推官作丙子再薦謝太守啓少而好賦嘗見齒于賢書壯當封侯尚何顔于文屋偶辱明有司之選重書新進士之名况弟子之賢于師既叨首薦而他人不如同父又獲聨名人稱之以為美談已當之獨有慚色伏念某箕裘晚出門户早衰綴文幾至于嘔肝苦學惟知于嘗膽十年以前之志豈信富貴之在天纍戰不利之餘方知窮逹之有命開門授業仰屋著書謂若無所用于一時亦將垂不朽于千載屬槐花之近目陟覺激昂認楊葉之舊穿未知中否賦不工於吐鳳墨誤㸃以成蠅設非以後場而見收幾乎為文衡之所棄荆山之璞獲售合浦之珠復還親望因得以少寬朋舊亦憐其才遇請言僥幸亶有夤緣兹蓋伏遇某官宗主斯文之盟作成多士之氣治平有第一譽已徹公車舉送餘四十人親為勸駕致令么麼再預甄收某敢不益加駑鈍之鞭勉赴功名之㑹天其或者道之行歟鴈序聨飛佇見齊名于鴈塔龍門髙逺未知誰占於龍頭謝省試參詳林員外啓升堂拜知己之恩綈袍已敝入邸辱贈言之寵華衮非榮竦觀揮灑之雲煙深懼取將於雷電書紳起敬藏笥為珍竊以遇合之難古今所嘆必大人君子喜士素根於天性故後生晚進委身願出於門墻况有如師生名位之絶嚴鮮能略世俗禮文而相接必有卓犖不羣之彥方受特逹殊常之知如某者地寒無媒天賦不腆少而有志恥隨餘子以浮沉壯不如人安得名公之印可曩緣行役得拜宗師出名駿之圖以華其歸灑飛鸞之筆以飾其陋口共心語願托身爐鞲之間人欲天從果定價權衡之下嘗懷漫刺以晉謁輒辱閽人之見辭自䝉恩錫第以來至束擔言歸之日念不違函丈而徑去將歸白庭闈以何辭甫爾摳衣便䝉倒屣畀以名章之奬借增其行色之光輝得此於常人不足誇受知於名世何其幸昔韓昌黎送牛堪登第之序至忘師道之尊蘇東坡謝范公校文之書或動鄉人之喜久無此事今在我公兹蓋伏遇某官前輩典刑斯文宗匠流落人間之述作特泰山一毫芒之微提携天下之孤寒有大厦千萬間之庇致令么麼辱在品題某敢不尊其所聞勤乎未學文章末技粗承交臂之傳節義大間當勵立身之戒謝陳侍郎立縣學續登科記并書啓賜袍文陛躐居桂籍之上游記美鄉庠重費荷囊之妙墨人覽光而驚訝已拜賜以凌兢竊以周制既逺於賓賢唐科莫榮於進士舊莆陽實維一縣始𨽻於刺桐之州翁承贊為第四人時目以探花之使至我朝而為郡以多士而得名或立鰲頭或稱龍腹科固多于居甲名未見于列丁必有異能方叨此選如某者才踈不韻學淺無根少嘗有志於功名壯乃自憐於踸踔賣文為活浪傳錚佼之虗聲作賦逐貧贏得揶揄之一笑聚子襟以授業緩農圃之謀耕倐驚骨骼之已成漸覺頭顱之如許再偕秋計始綴春官輩試昕庭敷陳奏牘空臆盡言而無隱轉喉觸諱之不知雖清朝許罄其愚忠而時好或譏其過訐及竦臚傳之聽果輸鼎甲之先射楊葉數千人皆始期於巧中隔蓬萊三萬里恨未學於飛行親望固得以少寬友論猶為之不滿惟是自知量力之審焉敢有怨勝已之心及逺道之來歸荷逹尊之奬借濡墨發揮於妙藻命卿植立於堅珉援引前修激昂晚學金如山莫償一時之直亶謂至珍丹㸃鐡而費九轉之功豈非榮遇兹蓋伏遇某官受天間氣作地行仙游戲詞林執千古文章之印周旋禁路極三朝簮紱之榮身如一葉之輕名有九鼎之重滄浪把釣冷看舉世之浮沉雲岫岸巾一付無心於出處紉蕙蘭而覓句餐杞菊以怡顔十三人之㑹洛陽孰比潞公之耆夀九十嵗而為周相行看衛武之經綸將天下善類所賴依歸而鄉曲寒畯先叨齒録其敢不勉所未至聞之斯行誓堅素節之氷霜無負髙評於月旦仕惟行義决不為溫飽之謀實必副名當敬佩丁寧之訓謝殿試編排官聶侍郎啓數先執于慈恩之塔稀若辰星稱門生于通德之鄉恍如霄漢昔登堂不果恐涉營私今假道遄歸將何辭謝僣飭尺箋仰呈丈席恭惟某官日未東即收于巍第江以西莫著其大名詩社揮毫妙思源泉之出地昕庭抗疏精思皎日之在天不由介紹而結主知徑躐清華而登從槖剸裁國用鄙夷管晏之近功經略中原隘小孫劉之故畫詳審乎事機之㑹更閲乎理義之多謂如根本之先强則于恢拓也可待蓋知彼而不知己皆料敵之淺謀必能發而又能收乃濟時之逺略屬北方之警未息而西州之變復興人方憂蜀道之難公往為雪山之重至則事權之牽制加之饑卒之跳梁身持尺檄以直前惟知死節神叱的盧之一躍遂獲生還浮言何傷乎日月之明雅志已抗于煙霞之表携諸郎于謝墅㑹名勝于午橋耆英之㑹狄公方春秋之未艾中國即相司馬寧朝暮之少淹伏念某殖學代耕賣文為活元龍湖海之氣少也勃然司馬山川之游今其倦矣為有阿㜷之養漫從舉子之勞兩玷鄉書一塵春榜逮奉黃廷之對空臆盡言不知書生之踈轉喉觸諱痛國論之未一憫邊釁之方開惜諸將多陷讒言乃援子儀之事議宰相當存大體恐貽王吉之譏雖清朝許竭其愚𠂻而時論或譏其太訐發矢將穿于楊葉及的輒差乘舟已迫于蓬萊為風引去向非借九鼎之力當不止三籌之輸副本既不上于中書賤刺亦羞通于光範至謝知己皆後衆人俯仰何心升沉付分謂今得斗粟之祿可以無饑豈不勝布衣之時難乎一飽兹迫瓜期之戍方登荷槖之門如亮其今日之來非為炙手當賜以片言之誨庶使書紳此身已託大冶之中他日冀軫遺簮之念但不負于素學是謂報于異知雖秃千毫莫殫一感見江西真帥啓平生漫刺懶趍金張許史之門墻逺戍遷車願識杜范歐韓之人物雖匪在受察受容之數實久勞起敬起慕之誠謀三釡粟之未皇持一瓣香之為急竊以百年榮悴同歸于盡萬世議論有是與非想孔光張禹之諸人尚有餘臭讀李膺杜喬之諸傳至今耿光方當淪胥於流俗之中而有特立於時賢之表稍具識見皆知依歸恭惟某官大明若揭日月而行細行亦通神明之奧明體逹用傳心程氏之諸書開誠布公尚友孔明於千載在閨門則怡顔養志立朝廷則正色責難鯁論危言興起南渡積年之弱忠肝義膽對越列聖在天之靈原本闕通湖南葉帥啓輟文昌之座以帥藩稍緩召歸之命著從事之衫而入幕得為末席之賓以明公一日之去留卜賤子終身之遇否仕莫重乎始進天固使之有依恭惟某官氣大而養以剛道髙而立於獨渠渠孝行每興感於蓼莪皎皎科名曽收功於藥籠守命義之大節為出處之宏圖鳬舄橫飛鴛行增重考容臺三千禮司蕝甚間為冊府第一官采藝有味方在開禧嘉定之際是為君子小人之交一賢峩豸以當前衆正得輿而交賀直聲大振雷轟電擊於姦未去之先元氣不傷風恬雨霽於事已定之後紬祕史於金匱石室導正學於廣厦細旃履聲上迫於雲霄斧繡下臨於閾閫利源竭矣誰能寬之一分仁人恥之不待去於三宿此舉盈庭之色動未幾前席之恩深爰屈台斗之光俯照沙星之分潭府甚淳古分少陵嶽麓之清客堂喜空凉和吏部湘川之句政成而棠隂密訟簡而銗筒稀然當逺郊營壘之相望豈容明堂梁棟之小用右諸道之奏最隱若長城左一席之久虛行膺顯冊伏念某晚未見道窮坐為儒百戰蟻酣敢望錐囊之先露一朝臚唱濫叨鐺腳之後塵父氊尚青而復還毋髮已白而待養若以茍祿仕則僅可漫不知幕辨者為何幸以部封下之舊民而為油幢底之新吏始仕曰筮或者即初而覘終事長必忠焉敢以順而為正惟矜其臭味之似而許以帡幪之歸庶逭官針可諧親養烏公鈇鉞之下倘見禮於溫生和相衣鉢之傳竊有心於范質瀆尊冒昧拊已凌兢賀鄒帥給事啓緑邸藉綸紅牙易閫煩公護太子久焉思羽翼之功借君重淮陽示以歸禁闥之漸湘靈起舞嶽后前驅恭惟某官道傳至聖大賢之心文續先秦古書之脉虎榜首登鳳池身到固地位之宜然鰲頭寵重鶴髮恩深尤人生之鮮儷付科名於餘事守節義之大間方鼠穴權門趨者成市而螭坳直筆屹然如山及調更化之絃時方多事獨衛出疆之璧義不辭難入還班行進掌封駁誰不批敕鮮有如何郯之力爭因此結知故每見鄒浩而輒喜居中未久丐外即行國事日新比貞觀初年之何若君子一去覺貞元朝士之無多心戀闕以常丹髮憂邊而漸白惟有甘棠之蔽芾逺到海頭最宜叢桂之婆娑久留春腳歡聲無地可著最課為天簡知太史夜占喜長沙之星見行人朝發趣衡嶽之雲開寶閣升大學士之班輕車奉太夫人之養衆皆爭先而稱賀僕知大用之有階蓋當夷夏消長之交未决戰和依違之䇿春秋復讎之義大乃素學之欲行英俊在朝則本强正善類之所屬有以中書何無冦公為問者當以吾國即相司馬而答之初立本竒更好黃花之晚節儻來不計直垂汗竹之芳名伏念某讀書不多合世更寡比奉槐楓之對空臆盡言不知草茅之踈轉喉觸諱甘輸三籌而不悔僅忝一命以進身冬已及於瓜期夏方趨於蓮幕始仕曰筮或者即初而覘終事長必忠安敢以順而為正竦聞元帥來鎮此方幸以鄰壤之諸生得為油幢之末吏雖素於左右本無介紹然見之方冊不昧平生况進士題名既接鳳雛之武而小人有母敢希燕喜之榮儻推老吾老幼吾幼之心當無中不中才不才之間曲憐臭味俾託帡幪待我不以衆人倘少垂於異眄因主可以信客竊自激于懦𠂻上王侍郎啓少而抱槧久瞻魁宿于璇霄壯也彈冠行覩德星于珂里雖素於左右殊無介紹然見之方冊不昧平生敬飾訥詞僣干嚴分恭惟某官任重而道之逺表粹而裏則剛方在韋布之時已負搢紳之望紫府㸃頭碧雲章句號閬苑之謫仙素王喜色黃甲科名協湘川之佳䜟剔蠧藝館含香錦闈翠節朱轓幾沛黍苖之雨紫薇紅藥曽依香案之雲方為景從以小留乃厭承明而丐去十連為帥力蘇凋瘵之氓五嶺皆炎變作清凉之景胡然為衆所忌正坐其名太髙一壑來歸六丁莫挽髮為憂邊而半白心思報國以常丹冦公不入中書莫答氊裘之問裴相方遊緑野其如柱石之衰佇下綸音徑司國柄伏念某弱惟殖學貧只賣文固嘗感慨于事功其奈間關于場屋大廷對策妄陳憂國之孤忠末第書名何惜避人之三舍來傍蓮池之漫仕已驚瓜戍之過期胡遲其來蓋恐素宦之無譜或贊其决以有逹尊之可師惟願矜憐臭味之同庶有終始帡幪之托俾遂親養得逭官針楊儀之無材力之可稱正深凛凛宓子賤待老成而後决尤切拳拳上趙漕啓汝陽真天人久遡髙風于臺表湖南多賓客乃容下士于幕中以拳拳尊敬之年深而僕僕趨承之日淺撫躬幸甚投贄先之恭惟某官氣蓋諸公眼髙四海守清獻之節風流醖籍之猶存游晦公之門師友淵源之甚正自摘髭而收巍第即榮足而上華途一進屬于曲臺洊升班于列寺仗正論以主天下之善類持定論以决國中之大疑皎皎然特立而獨行謭謭者旁觀而相忌把一麾于漳水即日請行渺萬頃之恩波至今遺愛煮摘遍持于三節平反最審于五刑太倉粟紅以義為利圜扉草緑使民不寃此皆平生學問之設施是以所至規模之卓偉况西北之妖氛未洗而東南乃財賦所須萬竈雲屯千艘雷動咄嗟辦事已通木牛流馬于淮甸之區慷慨澄清直掃封豕長蛇于河洛之表使盡忠為國皆執事比則何至以賊遺君父憂給餉第一功論封當先于蕭相弄印凡纍月熟視無易于趙堯伏念某地寒無媒天賦不韻精神耗于半生之燈火習氣磨于百戰之文場叨第僥踰繆處陳樓之右量才短暗慚非溫石之流父氊方青而獲還母髮已白而待養駸駸迫戍凛凛面墻居常慕我公于方冊之中今乃陪屬吏于旌麾之下惟俯憐于臭味庶稍逭于譴呵未識劉士安已習教條數千里之外既見趙文子或陪管庫七十家之聮上陳漕啓伏審庾臺奏最計傳升華昔長沙星聚之年翹英金甲今衡嶽雲開之旦增煥繡衣夤緣三紀之符鼓舞百城之下敢裁吉語敬候前驅恭惟某官表粹而裏則剛人今而道則古出處語默安行大易之中清任和時見謂聖人之耦及直明昌之更化不緣介紹以立朝士如羣蟻之慕羶皇皇人爵公若飛鴻之避弋落落權門不然胡勇退于中流而乃甘斜飛于外補重湖千里在天一方發廪賑民志慮固詳于田里乘軺察吏精神鎮壓于山川歡聲溢于道路之口碑實政紀于山林之野史時適轉輸之擇使重其權乃重其人上知斂散之有方易其節不易其地惟是嵗饑人困川竭谷虗節以制而弗傷財乃執事平時之素學不斂民而足用度亦前賢此地之遺規惟人心既久于相孚雖皇華未至而先喜福星照耀非一道之宜私時雨沾濡又四方之屬望伏念某癖惟嗜古樣不入時每持直道以事人安敢大言而忤世諸大夫之唯而周舍之諤見者忌之一齊人之傅而衆楚之咻嘻其甚矣方未見先生而親炙深有疑或者之肆讒及三薰三沐以來前荷載笑載言而加拊既有師門之歸倚何虞宦路之險巇寒士之依主人倘許一瓣香之請小人之有老母庶諧三釜粟之謀賀陳倉啓比從郎省出建庾臺帝曰湖南九州之民其生寡遂公為江左諸賢之望宜往周諏嶽后擁英蕩以前驅湘靈聞先聲而起舞恭惟某官道髙而立於獨器厚而養以和學易通神三畫曽吞於天上著書擬聖六丁屢下於人間雖場屋之文而金石可鐫自科第之後而燈火不輟徘徊州縣綿歷嵗時所至皆清而人推髙在我者大而官無小及時更化乃肯立朝鳴鐸碧流恍憶爐亭之舊橫經朱邸平分講幄之功著庭凛直筆於秋霜省眼閲人材於氷鏡但從平進立要路之津以何難惟不茍因辭光範之門而徑去間有動色而咨惜誰能為王而留行與其員枘方鑿扞格於中孰若大纛髙牙從容於外况在衡湘之地重當金穀之權屬弄印者踰時乃出綸而臨遣東南之力竭矣上下焦熬西北之事紛然江湖唇齒為時一出寬上隱憂褰帷皆起廢之方攬轡即折衝之略必有偉舉以悚羣觀富貴浮雲固萬鍾之不屑蒼生霖雨非一道之得私伏念某學古多拘與時寡合比奉昕庭之對空臆盡言不知書生之踈轉喉觸諱甘輸三籌而不悔僅竊一命以進身來傍蓮池茍營菽水始仕曰筮或者即初而覘終事長必忠焉敢以順而為正才踈而意廣位卑而言髙不惟同列疾視其旁甚至上官亦嫌其訐所幸鄉先生之出使得稱門弟子以通名諒䝉軫念於遺簮必不興疑於投杼俾諧鍾釜之養敢昧邱山之恩中人以下皆惡林宗正不免耳國士之遇如有知伯尚庶幾焉賀李倉啓出綸閶闔乘傳湖湘屏風録良刺史之名就升英蕩安輿奉太夫人之養增輝輶軒部民舞手以交歡屬吏舉杯而相賀恭惟某官道髙而立於獨器厚而養以冲鄉黨一篇之中從容踐履中庸千載之學出入誠明雖場屋之文而金石可鐫自科第之後而燈火不輟徘徊州縣綿歷嵗時所至皆清而人推髙在我者大而官無小及改絃而更化乃澤笏以立朝不緣介紹而結眷知肯事詭隨而同流俗屬時有邊陲之警自許參謀長揖出光範之門了無靳色早奏勳於淝水旋坐嘯於衡陽藹然政聲得之道路字民則催科寧拙拊士則甘苦與同思溺由溺思飢由飢紅粟活萬人之命曰暘而暘曰雨而雨蒼穹感一念之誠以至延賓客則北海之樽不空待寮佐則南樓之興不淺醉墨豪吞於星瀨新詩清迫於雪車舞綵袖於輿春遂蔡端明便親之志鳴木鐸於石鼓尋朱紫陽講道之盟豈近世俗吏之能為皆平日學力之小試闔城卧轍人心直願借留因地建臺天意曲為從欲惟是年荒民困川竭谷虛公將以施一州者而惠九州人亦以試前日者而信今日還峴而粟可賤乃賢相之遺規用悝而年不饑亦常平之始事必遵家法以寬帝憂隂德無邊耆夀合延於鶴髮清朝有命宴詩將賀於龍津伏念某學古多拘與時寡偶昔吐危言而對䇿以訐見排今持直道以事人似狂未醒才踈而意廣位卑而言髙逹甚於鄰境之諸生晚乃為崇臺之屬吏先世同文靖之第一榜得人賤子登元禮之門通家有舊倘軫薄雲之誼冀沾覆露之私事長必恭佇俟察父哲兄之教將母來諗願推仁人孝子之心上趙帥幹啓斂袵槐庭之相種莫遂望塵綴員蓮幕之下寮行將受察禮莫嚴於事長書可後於通名恭惟某官威鳳九苞瑞麟一角學傳歆向而得其髓文追賀白而拍其肩維昔上台為國元氣展咸池洗日之手了不言功格列廟在天之靈固宜有子初露厥頴已雷其聲乃不汲汲問津臺閣之登而肯翩翩斜飛江湖之上排紛理劇而目不瞬飛書走檄而筆不停夜雪貂裘慷慨辦太原之檄春風杯酒嘯歌發嶽麓之竒時方多艱公豈久外與其以一賢佐方面致吾帥於羊杜之間孰若以重望居專城使逺人知韓范之至旋復登庸之衣鉢益光勳績於旗常伏念某以有書癡幾為儒誤著鞭不早每憐髀肉之屢生捧檄而游自笑頭顱之可揣宦海方航於一葦面墻誰指於三隅賴有名勝之依歸出示誨書之一二併寬鞭䇿俾託帡幪仕大國而並英傑之游預知幸矣敬長官如在父兄之側願進教焉上趙帳幹啓天族柬英霜臺贊畫蘭茝衆芳之所在雅稱浮湘芙蓉八月之方酣驤迎入幕已辦慶箋而未貢敢圖謙牘之先施恭惟某官胸吞石渠舌㵼雲漢追河間于千載上得禮樂之盛心夢太白于三生前傳文章之正印日未東即收于上第斗以南莫載其英聲不汲汲問津于臺閣之登乃翩翩斜飛于江湖之上平章漕計清規照映于昭潭觴詠賓筵俊語增雄于嶽麓臺府以之為重寮屬賴其有師畫諾笑談暫此分木牛之寄功名迫逐歸歟侍金馬之班如某其人何用于世宦海方航于一葦面墻誰指于三隅聞公之來何啻似鄉人之喜規我以善庶不為吾黨之羞上潘帳幹啓星臺重望皎然連璧之相輝雲幕下寮甚矣獨竽之濫吹行澡身而受察預貢牘以通名恭惟某官寶婺儲精珠庭挺異蜚大聲于斗以南之地聞者驚霆收巍第於日未東之天易于拾芥游戲文章之三昧呈露政事之一斑人方慫慂于要津公獨雍容于賓佐飛挽之無虗日畫婉婉者居多書檄之如飄風才恢恢而益辦以霹靂之敏手佐賢明之主人氣類胥感則霜降鐘鳴聲實相扶則珠明淵媚賓筵觴詠名章發嶽麓之竒漕計平章清節映湘潭之底紛薦書其盈篋推英轂者載塗畫諾笑談暫此贊木牛之算功名迫逐歸歟侍金馬之班某門地伶俜性天啙窳著鞭不早每憐髀肉之屢生捧檄而游自笑頭顱之可揣宦海方航于一葦面墻誰指于三隅惟憐其臭味之同而許以帡幪之託茍逃瘝曠詎昧依歸小巫之見大巫宜周章而失指先覺之于後覺願誘掖而來前與湘潭監酒右辨啓為米五斗而漫來何禆婉畫有醖三升之可戀獲綴英游賀上滯遲先施倒置恭惟某官沉酣方虎之略糟粕孫吳之書暫韜厥光來隱於酒雖養髙此地不妨弔靈均英魄之獨醒然右武之時誰肯持將軍告身而易醉小而投醪士卒大則作醴廟堂行且見之非為佞也某寒酸可笑艱苦備嘗來傍蓮池陋矣斗筲之器粗營菽水茍焉鍾釡之謀幸甚同僚之得賢先拜髙文之有味自此作乞漿之請願一中之何時定飲酎之交永為好也與醴陵劉宰啓行役三千里來依幕府之芙蓉入境第一程首訪河陽之桃李先睹為快以名自通恭惟某官籍甚月評穹其天分七略總百家之緒世美可尋千年六一翁之鄉風流未泯褁以冠裳而不任直於翰墨以䇿勛神人換鼻而許以正郎朱吏㸃頭而畀以上第洊游邛莋慨然忘蜀道之難繼董布泉去又作雪山之重合即坐三館之上矣乃亷取百里而宰之今士夫厭湯鑊之焦熬相顧瑟縮明執事施硎刀於肯綮了無留難寓撫字之意於琴中息嚚訟之風於棠下蓋大馮君宜春之遺愛今猶思之而魯仲康中牟之政聲雅亦稱是一同幸甚三異藹然行膺黃紙之除書更與青氊而出色有如某者見謂斐然文埸曽被於百瘡僅收末效宦海方航於一葦未識前津幸假道於名區有指蹤之素宦願出緒餘以告用為畫諾之規豈無同僚之盡心不若先入者為主仕大國而交英俊快平昔之襟期在武城而聞弦歌動書生之技癢與湘隂李宰啓子來幾日方依幕府之芙蓉彼美一人賸種河陽之桃李未敇墨卿之敬乃為籖府所先恭惟某官閥冠雲霄胸羅星宿家豈不置文選恥爭寒士之科名世皆稱有天才宛似謫仙之風骨自初膴仕總是名藩勾稽餘閒詩思蜚敡於滕閣平反一笑隂功瀰渺於吳江慿鐡甕以餉師向金閨而徹籍便合在六察之上矣乃亷取百里而宰之今士夫厭湯鑊之焦熬相顧瑟縮明執事施硎刀之肯綮了無留難錦愈濯而愈鮮琴一彈而一韻政異遂雉雛之樂官清任馬骨之髙政聲滿湘之南作諸邑樣名節自天而下登要路津某讀書不多合世更寡元龍空有湖海之氣司馬倦作山川之游仰破屋以哦詩嘔肝不悔俯大廷而對䇿空臆盡言儒科僅竊於還丹世味殆如於嚼蠟冬已告戍夏方抵官胡遲其行蓋恐面墻於涖事或贊吾决謂有大邑以庇身倘能矜臭味之同必不吝針規之誨公餘交贄已窺君之一斑何日盍簮併授我以三昧與湘鄉林宰啓君乘車我戴笠憶輦轂之相逢客遺魚中有書喜湖湘之共仕入蓮幕方數日許望華封隔一水間修敬辜遲先施倒置恭惟某官望高胄子學到儒先崔嵬雙闕之家聲不斷書種呼吸三山之秀氣發為文詞固嘗於科目以䇿勛乃恥與孤寒而爭進取名亷甚不妨蘭菊之芬芳公論歸之合看蓬萊之步武乃飛雙舄來宰一同今士夫厭湯鑊之焦熬相顧瑟縮明執事施硎刀於肯綮了無留難錦愈濯而愈鮮琴一彈而一韻政異遂雉雛之樂官清任馬骨之髙朞年報政之優作諸邑樣一札自天而下據要路津伏念某讀書不多合世更寡大廷對䇿妄陳憂國之孤忠末第書名何惜避人之三舍冬月戍瓜之已及夏初行李之方安胡遲其行蓋恐面墻於涖事或贊吾决謂有大邑以庇身倘矜臭味之同尚記游從之舊必有忠告俾逭官針想弦歌之聲忽動書生之技癢俟騶哄之至拱聆官譜之緒餘與寧鄉黃宰啓居桑梓鄉相去一牛鳴之地入芙蓉幕孰知雙鳬舄之聲告至辜遲先施倒置恭惟某官識髙胄子學到儒宗筆搦虹霓呼吸鼎山之秀氣名懸日月峥嶸璧水之上游漫以毫芒見之施設雲深紫邏大所居一尉之官草鞠圜扉少亦活千人之命蟬蛻七階之選調鵬騫萬里之修程今士夫厭湯鑊之焦熬相顧瑟縮明執事施硎刀於肯綮了無留難錦濯水而愈鮮琴含風而有韻歡聲無地可著溢為薦禰之章最課自天簡知行有徴黃之寵有如某者見謂斐然仰破屋以哦詩嘔肝不悔俯大廷而對䇿空臆盡言收科輸鼎甲之三籌初仕乏錐囊之一頴面墻必矣指蹤誰歟惟大邑可以庇身而鄉人喜於見似願出忠告俾逭官針想弦歌之聲忽動書生之技癢俟騶哄之至拱聆縣譜之緒餘與新攸趙宰啓湖南多賓客漫來著從事之衫汝陽真天人何尚墨男邦之綬未辨赫蹄而展慶遽䝉緑綺之貽音恭惟某官𣲖接天清名垂斗燦去河間東平千載得其盛心追太白長吉諸人與之並駕游戲文章之三昧呈露政事之一班鸂䳵灘頭早協竒章之瑞䜟松槐叢裏優為斯立之清游諸公挽之亨衢薦墨紛乎盈篋便合在六察之上矣乃亷取百里而宰之今士夫厭湯鑊之焦熬相顧瑟縮明執事施硎刀於肯綮了無留難簸揚而糠在前更張而琴有韻官清如水不妨馬骨之髙最徹於天好布鵷行之武有如某者見謂斐然弱惟殖學以代耕貧止賣文而為活忤時對䇿分輸黃甲之三籌竊祿養親無補碧油之一畫所賴臭味之無間當有教詔以相規見君子心則夷預知免矣况大邑身所庇竊有望焉與益陽尤宰啓佩服家聲願識梁溪先生之裔講聞縣譜熟知連城茂宰之才彼此因王事之塵勞往來略世俗之苛禮將謂相詔以肝膽胡為未忘於形骸一箋先施百拜後誦恭惟某官秀無可揀敏莫能追宦學典刑世有甘棠之笏風流藴藉人如濯桞之標篝燈誦有味書下筆作驚人語歷仕皆膴馳聲甚休諸公挽之亨逵薦剡紛乎盈篋便合登六察之上矣乃亷取百里而宰之今士夫厭湯鑊之焦熬相顧瑟縮明執事施硎刀於肯綮了無留難訟息而缿筒稀政成而棠隂密官清如水不妨馬骨之髙秩滿朝天好布鵷行之武有如某者見謂斐然仰破屋以哦詩嘔肝不悔俯大廷而對䇿空臆盡言來傍蓮池苟營菽水惟是平生方介之癖不學時樣嫵媚之粧幸大邑可以庇身而素官宜於問政必有忠告俾逭官針想像弦歌頗覺癢書生之技闖聞騶哄願降見君子之心與長沙陳宰啓入幕依芙蓉方陪州從事之後滿縣栽桃李喜聆鄉先逹之來昔願見而未能今相值則甚巧敬慿尺鯉往白雙鳬恭惟某官天分穹然月評籍甚呼吸三山之秀氣發為雄文婆娑百尺之髙樓俯視餘子取科名如囊中物試政事有肘後方綵筆平反少亦活千人之命剡章吹送多其吐三語之工趣覲清光徑升華秩便合坐三雍之上矣乃亷取百里而宰之今士夫厭湯鑊之焦熬相顧瑟縮明執事施硎刃於肯綮了無留難行將寓撫字之意於琴中息嚚訟之風於棠下府邑甚淳古必有三異之可書朝廷半老成非久一同之借重有如某者見謂斐然少嘗慷慨於事功壯則間關於場屋大廷對䇿妄陳憂國之孤忠末第書名何惜避人之三舍來謀親養已過戍期胡遲其行正恐素宦之無譜若有所恃必得大邑以庇身倘忘年許以締交則暇日必有忠告一畫一諾僕焉方俯仰於人有社有民公也當施行所學與攸縣權宰周簿啓依芙蓉而泛水方陪諸從事之游去枳棘而栽花知有貴公子之政辜遲告至顛倒先施恭惟某官敏手莫追清標特立傳濓溪之學源流河漢之深長生清獻之鄉氣類霜鐘之感召方露厥頴於政事已雷其聲於搢紳人之為言以立身矮屋而稱屈事當其㑹有不善製錦而見傷方當路弄印而熟籌謂執事改絃而可理果能支欹補罅頓使易聽改觀簸揚而糠在前盤錯而器愈利縣自有譜想得諸家法者甚詳時正需材當置彼周行而後快有如某者見謂斐然仰破屋以哦詩嘔肝不悔俯大廷而對䇿空臆盡言分輸黃甲之三籌無補碧油之一畫面墻必矣指蹤茫然幸已締好於棣華獨未一瞻於芝宇闖聞騶哄願降見君子之心想像絃歌頗覺癢書生之技回湘鄉黃尉七舉啓原注黃未第時招米舟濟饑得賞既第用此關升從事郎輦轂相逢猶記灑慈恩之墨湖湘始仕同來著從事之衫以幕府文書之方殷為少公翰墨所先辱倒置太甚不敏何言恭惟某官天分穹窿學力宏毅使國人有所式太學稱為官樣之文思天下猶已饑微時已試活人之手科舉惟垂於蝸餌場屋如擲於雉盧妄男子僥幸成名一戰而霸真將軍偃蹇不偶七縱乃擒方以格拘暫焉仙隱五色棒定優於巡檄一縣花必預於栽培鸂䳵雙飛好報金灘之瑞孔鸞齊列行通玉陛之班某讀書不多合世更寡向嘗吐危言而對䇿以訐見排今復持直道以事人似狂未醒所喜聮事而有同盟必不金玉其音時出藥石之誨州縣徒勞耳俱未免俯仰於人富貴何有哉要相期逺大之業回劉縣尉啓蓮池水緑方為異鄉異客之游梅市風清喜有同年同官之好未辦赫􅕭而展慶遽䝉緑綺之貽音恭惟某官天分本髙月評增重世有甘棠之笏家法典刑人如擢柳之標風流醖藉自摘髭而收上第合䇿足而登華途胡以格拘來為吏隱五色棒定優於巡檄一縣花必預於栽培早晚好音喜報鸂䳵灘頭之瑞權輿大用頓增雲龍閥閲之光伏念某讀書不多諧世更寡忤時對䇿方輸黃甲之三籌竊祿養親何補碧油之一畫既素無巧宦之譜又不為時樣之粧正賴同盟時賜忠告州縣徒勞耳俱未免俯仰於人富貴何有哉要相期逺大之業回縣丞啓命錫芝函權分穀璧鴈鶩以行進方驚二令之威鯉魚從逺來忽拜尺書之寵先施倒置函謝反遲恭惟某官續昌黎似經之文生江淹夢筆之地負鄉先生之望私淑者多奏子大夫之篇成功則一倒蔗既入佳境寒花賸有晚香俯為涉筆之游來贊鳴絃之化哦藍田之松而有味紉楚澤之蘭以自馨余不負丞丞負余能使花封之重已不即人人即已趣歸柳院之班如某其人何庸於世少徒有志文場親被於百創壯不如人宦海才航於一葦朅來蓮幕密邇槐亭不徒降識君子之心且有見似鄉人之喜州縣徒勞耳俱未免俯仰於人富貴何有哉要相期逺大之業與彭簿啓熊湘水緑方為異鄉異客之游鸞枳風清喜有同年同官之好相值甚巧先施過隆恭惟某官育秀孝子之門蜚英詩人之社誰不登第鮮有書黃甲於弱冠之年等是榮親爭似舞藍袍於重闈之下膏粱及身而願學衣鉢對面以相傳合便䇿足於要津胡為低頭於矮屋必以素官大所居宅洞庭嶽麓之清竒正需吟詠茶竈印床之間雅可養經綸當路必刮目而器之鋒車不旋踵而至矣某雖在團所略識英標未握臂以論心久望風而引領幸甚先登堂而拜名父繼而又倒屣以接英游依於之日猶長益者之友可託州縣徒勞耳俱未免俯仰於人富貴何有哉要相期逺大之業與林簿啓入幕幾日方嗟混鴈鶩之行有鄉同年來此栖鳳鸞之翼九牧之來仍是其一四同之契好有其三巧哉相逢愧甚先辱恭惟某官襟懷犖犖不俗翰墨字字有香天山三箭之歌笑談得雋燕嶺一枝之桂陸續相傳燈火收功之甚優膏粱祝身而願學既換鼻則當在正郎之選何低頭而又居矮屋之中豈洞庭嶽麓之清竒正需吟咏而茶竈印床之間雅可養經綸當路必刮目而器之鋒車不旋踵而至矣某雖在集所略識英標未握臂以論心久遡風而引領比過江西訪芝蘭之友知於門下為瓜葛之親此來龜篆之方交已喜車音之至止州縣徒勞耳俱未免俯仰於人富貴何有哉要相期逺大之業
