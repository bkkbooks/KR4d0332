body:
  text: 臞軒集巻八宋王邁撰啓按此巻調南外睦宗教授作上鎦經畧啓西洛耆英嘯傲三台之府南宗冷宦依栖數仞之墻先上日以通名望下風而起敬竊以先逹之於後進世族之於素門勢分固殊投合亦寡惟元城之在宋問業有徒與了翁之居淮及門者衆而况三朝元老之嫡嗣一代人物之宗師稍有知識皆思歸嚮恭惟某官文章奎璧徳望華嵩忠孝通於神眀出處關於世運故國謂有喬木稱到于今後人猶愛甘棠何况其子方春秋之鼎盛歴中外以游揚郎省陞華風采耀嗚珂之列金庭出使笑談䕶完璧之歸持麾把節於湘中易地建臺於江右仁心撫字山林野史之屢書隂徳平反道路口碑之交誦開十連之帥閫屹百粤之長城惠行而龍户驩呼威肅而鯨波恬静奈外地去天之逺而浮雲蔽日之眀一壑來歸六丁莫挽葢韓吕家傳之清白素所服膺而金張勢焰之薫蒸耻于炙手勁草當疾風而不改寒花於晚節以尤香種樹山中白傅倡風流於九老植槐庭下晉公付事業於二郎傲睨軒裳追隨觴詠勝事園林清時鐘鼓如許清閑上天將相平地神仙孰為輕重此固衣冠之羡慕其如旒冕之簡懐欲副巖瞻行膺枋用伏念某癖惟嗜古様不入時對䇿廣廷徒有空臆盡言之直校文列陛乃罹疾聲大呼之讒比求宗邸之冷官隨得翹材之化筆未能適道敢好為師幸大州本父母之邦而年家忝子弟之列誘掖之以藥其失推輓之以玉于成既有耆徳以依歸庶免生徒之嘲訕薫和染教期為王孫公子之範模舉滯㧞淹全賴察父哲兄之提挈上陳招討使啓龍門髙峻屢容寒畯之攀躋麟序荒涼復受使華之容察豈造物憐其困躓使末路有此遭逢敬飭墨卿晉干籖帥恭惟某官清融氷柱峻埒斗杓古靈夫子之文孫學問有本北山先生之嫡嗣名節傳家方當杲日未東之時已有伊吾以北之志披肝許國掉舌籌邊雪夜貂裘慷慨辦太原之檄風聲鶴唳笑談却淮甸之兵草木知其威名讎冦問其年貎屬者鼪鼯之為梗羣然鴻鴈之離居嗟懦俗之脂韋仗元戎之鈇鉞毅然以身任朝廷責誓不以賊遺君父憂卯受命辰即行有崇文之勇决申上奏寅報可從充國之便宜南州嚴保障之雄西帥習號令之素如醫王之治廢疾半劑而蘇如國手之救危枰一着即活凱奏紛綸而載路夀祠突兀以連雲上甚念功就畀以繡衣之命時方謀帥復假之茸纛之權兵刑之脉絡相通臺府之風稜益壯所以寛宵衣之顧慮豈徒誇晝錦之熒煌如聞邊頭交馳露布知取勝而不知持勝易納降而不易處降安保今日饑鷹之來歸不如曩時猛獸之反噬金亡可待韃勢方張當趣公入覲之期要佐宋中興之烈濟時方畧已優南渡之諸賢葢世功名要了北方之大事伏念某老之將至鋭者已磨一罹語穽以來三閱嵗筩之久仕不得志宜追誓墓之風貧能驅人至草問鈞之賦無力可營於熱屬抗顔甘就於冷官若何免越雪之嘲所恃有蘇天之庇腐儒無用宜束髙閣以待太平來事可為當磨石崖而頌大業上西外宗使啓弭節西臺正仰長庚之次舍司文南邸獲分太乙之光輝敬飭墨卿晉干籖帥恭惟某官清凌沆瀣和毓鈞倪學問工夫窮伊洛横渠儒先之秘出處氣節有慶歴元祐君子之風早從文屋以䇿勛旋歴宦途而恬進春風鳬舄清閑鳴單父之琴夜雪貂裘慷慨辦太原之檄耻皇皇於人爵甘落落於權門徧試民庸不留朝蹟舂陵監郡平分濓溪霽月之華炎嶺拜州肯受石門貪泉之汙實政紀山林之野史隂功溢道路之口碑嘉名已録於御屏褒詔分司於仙籍昔逺今近上方注意以用功内重外輕公亦何心於擇地然而風濤如此人物眇然衛社稷則無如朱虛之精忠尊朝廷則孰過李勉之徳量所謂通國之望正在同姓之卿難兄法從之舊氊好為出色宗相登庸之傳鉢重見調元伏念某様不入時癖惟嗜古一第十六年之久歴官餘三考之書帝城風月之無邉方来贊諾宦海波濤之叵測嘖有繁言然浸潤之由來皆踈狂之自取天子臨軒以䇿寒畯從臣簪筆以主文衡衆皆阿意以曲從已獨執方而不變或校短掄長於程尺之下未免有之謂大聲疾呼於廷陛之前亦何至此一歸蓬蓽三易葛裘肆求宗邸之冷官隨得翹材之化筆所謂寒儒活計者此耳其為炎官熱屬者笑之學殖久荒冒犯為師之戒心茅滋塞殊無事長之能頃襆被以東歸擬摳衣而北靣久覉逆旅莫候前驅襟期雖企於門墻名實未孚於左右惟告戒之以藥其失而提撕之以玉于成敬薫心香願假鄰燭近而皇甫逺而居易既次第以搜求北曰石洪南曰温生敢覬覦於羅致上宗使啓斂袵詩壇乆剽古錦囊之譽横經宗校獲依青藜杖之光敬飭墨卿晉干籖帥恭惟某官道探聖賾氣㴠天和學問工夫窮西洛横渠儒先之秘出處氣節有慶歴元祐君子之風鼔琴著書以自娯焚香讀騷而有味游嬉翰墨咳唾珠璣舂容正始之典刑灑落晩唐之標致以此飾吏其諸異人壯縣蜚聲棠䕃清風之未改京畿主畫蓉池緑水之猶香遄入綴於周行得預聞於國計使其少貶立要路之津以何難惟不茍同辭光範之門而徑去人嘆横舟於野渡公惟砥柱於中流稽閣題輿問訊籠鵝之沼豐湖剖竹嘯歌白鶴之巖嘉名上錄於御屏優詔分司於仙籍清節足以亷貪而起懦厚徳足以雅俗而鎮浮司舶則氷蘖以自持領郡則繭絲之不急豈特武穆文昭之裔屹巖維城抑令召父杜母之謡驩然載路惟是舉國之望正在同姓之卿首揆久虛已入金甌之柬記修名不朽留為玉牒之芬芳伏念某様不入時癖惟嗜古一第十六年之久歴官餘三考之書帝城風月之無邊方思贊畫宦海波濤之叵測嘖有繁言然浸潤之由來皆踈彺之自取天子臨軒而䇿寒畯從臣簮筆以主文衡衆皆阿意以曲從已獨執方而不變或校短掄長於程尺之下未免有之謂大聲疾呼於庭陛之前亦何至此一歸蓬蓽三易葛裘肆求宗邸之冷官隨得翹材之化筆所謂寒儒活計者此耳其為炎官熱屬者笑之顧才踈無事長之能而學淺犯為師之戒幸偕棣萼聫南宫進士之名况在松㕔識東閣郎君之貴愛以及所不愛中也養其不中正有望於儒宗庶息嘲於士友收名定價甞䝉大戊子之知噓枯吹生自賀雌甲辰之遇與馮監務啓堂堂人傑肯思關市之征碌碌書生謬董宗庠之教均為聫事敢不通名恭惟某官閥閱雲霄襟懐湖海韜謀神授不泥孫呉之兵書議論風生更有孔桑之心計來司筦庫見謂亷平商咸願於出塗市自無於二價所樂不在乎此其志有大者焉好度玉關赴可乗之機㑹徑標銅柱垂不朽之功名如某其人亦甚不武行赴冷官之戍得交當代之豪市立之平書立之師莫非王事文為之經武為之緯倘契襟期上鄭漕啟矯首計臺藹五色慶雲之瑞抗顔宗校依一道福星之輝敬飭墨卿晉干籖帥恭惟某官學到聖處氣涵天和文獻猶存籍甚南坊之大鄭經綸未了付之東閣之郎君方在盛年已負逺畧三仕為令錦每製而愈鮮千里監州輿一題而增重入司奏邸遄貳理庭神中有醫國方舌底出冰人語不為枉尋直尺而屈甘請髙牙大纛而行剖竹兩藩棠䕃婆娑而籠畫司泉九路李蹊拍塞以酣春召以潛郎迫於熱地使其道之少貶顧何官之不為去矣莫留重歌今袴迨其再入即復舊氊芳菲菲兮彌章道落落乎難合雖以此起諸賢之愛敬然亦能來羣兒之中傷晚節自是而益香物論翕然而歸重七閩善地屬有弄兵之虞一札起家來任登車之寄䇿勲摘運將指轉輸足食而又足兵易節而不易地褰惟問俗出隻手以活民攬轡澄清炯雙眸而察吏甚盛之舉不一能言之類皆知惟是國事日新善類星散如公徳望宜還簮筆之班結上眷知行喜履聲之近伏念某癖惟嗜古様不入時待問廣廷徒有空臆盡言之對校文列陛乃罹疾聲大呼之讒一從沙汰而歸三閲嵗華之久朅來倚席寒甚無氊静惟外邱之冷官實𨽻皇華之末屬見聞甚淺易招雪日之嘲名實未孚凛有風霜之懼比因假道幸甚登門誤䝉倒屣之迎宛似摳衣之舊諒俯憐於氣類必力賜於提撕持一瓣香願定價墻屏之下有三品筆覬叨名香案之前與劉舶啟琛臺作屬至煩萬人敵之才朱邸司文徒抱一巻書之拙均為聫事敢不通名恭惟某官江左世家山西將種龍韜勇畧不求紙上之孫呉燕頷雄姿殆類禁中之頗牧才當八靣志在四方乃不卑於小官尤克勤於細物清閑筦庫歌紅槽滴酒之詩盤礴相卿賦蒻葉褁鹽之句暫屈齋壇之重望來為寳舶之英寮視象牙蚌貝之珍與瓦石等約龍户烏檣之至若符印然要之所樂不存焉抑亦有大於此者國方多事邊正飛塵行振旅於玉闗遄標功於銅柱紀燕然浯溪之石要與天齊貢東鞮北女之珍以充庭實壯圖未艾來事可為如某其人見謂不武亦有清中原之志所憾才踈不圖為冷宦之遊得交人傑儻不鄙緑衣之懦必預聞素畧之長焰焰北方當快觀於露布區區南物何足汙於圖書與聶監舶啟射䇿宸庭曾作龍門之客横經宗校獲交鳯穴之雛巧哉其逢喜而不寐恭惟某官雲霄閥閲冰雪丰標篝燈讀有味書下筆作驚人語名父之子名子之父經訓金籝難兄之弟難弟之兄堦庭玉樹絶唱冠江西之社一鳴空冀北之羣露厥頴於仕逵雷其聲於當路收斂凌霄之歩徜徉佐舶之遊視象牙蚌貝之珍與瓦石等約龍户烏檣之至若符印然吝出納於有司克勤勞於細物琛臺借重蜚英青剡之章瑶闕催班潤色紫荷之槖有如某者見謂斐然妄庸謬竊於時名迂濶不諧於世用壯而諾仕端如鮎魚之上竿老矣無能見謂鬬雞之已木朅來倚席寒甚無氊若何免諸生嘲所恃有契家在西清學士悵未親函丈之前東閣郎君幸可話襟期之地闕題金科肄業講眀臺閣之憲章玉牒繙書習熟祖宗之典故以此飾吏其諸異人恭惟某官方從栖枳以䇿勛不憚披荆而逺戍屈司筦𣙜見謂亷平商願出塗肯析秋毫而言利市不貳價更樂田宅之寛徴如聞當路諸公争出薦賢好語毋輕刀筆一代宗臣甞為之趣覲闕庭四輩召命將至矣某平生迂濶薄宦﨑嶇不能為桔橰俯仰以隨人所以如枘鑿方員之寡偶朅來冷宦得綴英寮一閧立平一巻立師莫非王事同氣相求同聲相應倘契襟期按此篇原本誤與前篇連作一篇起處闕題中間恭惟某官下脱數語謹註明與晉江鄭宰啓茂宰名髙庭有飛鳬之舄宗庠宦冷堂無繫馬之階以判袂之年多而盍簮之日近躍然而喜巧哉其逢恭惟某官天分穹窿月評芳美議禮之家如聚訟斷以片言天子之學曰辟雍藹其芳譽巍科得雋大器晩成宦譜愈出而愈竒學力隨試而隨效入仕九年而脱七選班筍其華去家三舍而宰一同栽花最便琴嗚風而有韻錦濯水而愈鮮今士夫厭湯鑊之焦熬相顧瑟縮賢令尹試霜鉶於肯綮了無留難至使鄉邦亦師縣譜西山來為牧守愛聽弦歌東觀正要人材行鏘劒履有如某者見謂斐然妄庸謬竊於時名迂濶不諧於世用壯而諾仕端如鮎魚之上竿老矣無能見謂鬬雞之已木朅來倚席寒甚無氊若何免諸徒嘲所恃有偉人在同鄉同仕行將託契以通家大邑大官先喜庇身之有地與都長侯官簿啟公侯振振皆遜滕侯之居長宦途落落自笑廣文之冷官告至未皇先施甚寵恭惟某官給露支風之敏手撑霆裂月之清才汝陽眉宇天人仙標㧞俗河間被服儒雅素履無瑕翛然類山澤之臞儒即之無膏粱之氣習早收科第傑出宗英長以貴而得民望尊麟趾士之髙者為簿見為鸞栖華刺鼎來修程軔發茶竈筆牀之清暇詩盟觴政之夷猶當路平章肯遺横道之寳留班清切以待同姓之卿某之迂踈世所姍笑仕不得志願追誓墓之風貧能驅人至草問鈞之賦朅來倚席寒甚無氊惟求密邇於家山最喜得交於名勝公如帥屬使皆知惟長之從僕可免嘲不犯好為師之戒回學正海陽丞啓挾䇿兎園自是書生之習氣横經麟校獲陪贊府之清游告至辜遲先施倒置恭惟某官學傳歆向而得其髓文追賀白而拍其肩焚香讀騷不類膏粱之公子硏硃㸃易宛如山澤之臞儒摘髭而収巍科䇿足而登皇路五色棒之警邏威名凛然三尺法之平反隂徳宏矣學力隨試而隨效宦譜愈出而愈竒不追趨逐嗜於權門乃容與徜徉乎雅道古槐鉅竹未遑嘯傲於藍田仙李猗蘭聊復顔行於朱邸况有東巖之仙伯時開北海之芳樽笑談川泳而雲飛唱和金舂而玉應行趨𤓰戍徑立筍班余不負丞寜久占名於紙尾天揖同姓佇㸔造膝於陛前如某其人寡諧於世學問醯鷄之在甕仕宦鮎魚之上竿既不及親何樂一行作吏早知有命悔不十年讀書備數冷官得交名勝安敢犯為師之戒姑自賀取友之端暗中之識曹劉慰平生之景仰胸中之多周孔何君子之勞謙實不稱名榮祗為懼回何丞啓出綸楓陛渉筆槐㕔頃仕帝京早識三何之風味兹游佛國重陪二令之吟哦展賀辜遲先施倒置恭惟某官人温如玉名重如山鍾淑氣於五公七相之門蜚大聲於千英萬俊之藪䇿勲塲屋遜郊祁兄弟之同登對䇿殿廬皆晁董諸賢之忠告倒蔗漸逢佳境寒花賸有晩香露政事之一斑發文章之三昧金灘􅗌䳵之舞方爾呈祥藍田鴈鶩之行又還竒徑况今棣萼正位栢臺諸公推挽之亨途薦墨紛綸乎盈篋已不即人人即已爭願賞音余不負丞丞負余行將召擢如某迂濶與時背馳贊畫京畿自掇中都官之怒談經宗校莫逃貴公子之嘲所幸知已之來必有相規之益既見君子則喜敬在下風不與執事同心有如皦日與劉知錄啓侯藩熱屬頡頏三語掾之名宗校冷官寂寞一巻書之學喜卿英之聫事望涓史以馳誠恭惟某官濯栁風標芳蘭聲譽偉哉名父宜居一䕫一卨之間籍甚難兄肯在三孔三曾之下自家庭而師友異世族之膏粱方露厥頴於仕逵已雷其聲於當路花城司警能來鸂䳵之祥蓮幕畫籌不效鸜鵒之舞薦書盈篋推轂載途小淹萬里之羽儀來董六曹之綱紀治劇理繁而才益辦滌寃雪枉而獄無留萱草正長堂上動平反之義嘉禾合穎陛前催清切之班某之迂疎人所姍笑學問醯鷄之在甕仕宦鮎魚之上竿既不及親何樂一行作吏早知有命悔不十年讀書莫能誓墓以為髙竟至出山而求仕朅來倚席寒甚無氊若何免諸生嘲所恃有鄉英在眀刑弼教之事脉絡相闗忠告善道之言始終有望賀新南宗啓鎮領房山司宗睢邸伯父心在王室自宜與四輔以通班天屬生值聖時爰以第一人而為長潔蠲吉櫝登進賀床恭惟某官學問得聖處之工夫文章有作者之風骨淳熈之末射䇿耿魁宿之甚寒嘉定而後還班屹靈光之獨在忠勤一節佐佑兩朝以經文緯武之長才任觀化宣風之重寄古庸巨鎮价藩揚六纛之威徽省華階跬歩眡三台之秩聖化方新於調瑟宗盟尤重於維城欲信厚之風成宜訓齊之選遴時維族老方堅戀闕之心常有恩言亟下建臺之命地位穹則事權增重力量大則教令易孚㑹見文昭武穆之英益習淮易楚詩之化惟是通國之望正在同姓之卿衛社稷則無如朱虛之精忠尊朝廷則孰過李勉之徳量鈇鉞方欣於南下衮衣已趣於東歸天下逹尊有三師言允穆宗室為相者九前軌可尋㒺俾忠定之賢専美紹熈之世伏念某癖惟嗜古様不入時對䇿廣廷徒有空臆盡言之直校文列陛乃罹疾聲大呼之讒來倚席以何顔嘆無氊而獨冷見聞甚淺易招雪日之嘲驕貴與居凛有風霜之懼所幸耆英之至止庶幾晚末之有依教誨之以雅言提撕之以巨力一時遭際幾刼修來仙李蟠根固可使猗蘭之蕃茂小草有志亦期附叢桂之芬芳黄侍郎再知泉州啓渙號宸廷申符佛國昔歸無南物雞碑猶植於虛堂今起自西山馬跡已諳於舊路波神起舞岳后前驅况叨材館之知宜羾賀床之敬竊觀壁記歴數藩侯前二百年名世僅兩三公而止後五十載何人稱二千石之良惟梅溪之王公與苕州之倪老時賞洛陽之勝不忝前修日凝安静之香可無愧色然皆一至孰是重來恭惟某官自許臯稷忠嘉不作漢唐人物班居豹尾正在日月獻納之初諌犯龍鱗欲扶天地綱常之義上亦和顔而受人已側目其旁鴻㝠㝠而髙飛犬狺狺而猶吠裔夷每問潞公之年貎兒童且識君實之姓名公是公非人心秉彛之不冺一出一處吾國元氣之所闗逃名而名益歸遯世而世不捨彼譖人者尚何靣於班行歸我公兮久傾心於朝野夷險一節首尾八年幸天日之開眀鼔風雷而出令即家起廢領郡仍前民忻吾父之來褁糧以迓士喜吾師之至動色相誇蠻賈抃於海堧餉婦歌於農畝户持牛酒巷擁旌旗若非心悦誠服之自然難以利誘刑驅而至此但觀近事大異曩時當焚山竭澤之餘有剜肉醫瘡之嘆民亦勞止天甚愛之乃㑹聚於福星以照臨於下土東巖攝郡斷無容盂水之規南舶建臺了不受貪泉之汙痼疾雖可以暫起生意未易以遽回葢自軍興至於事定用度廣而廪無儲粟楮幣輕而地乏流錢吏胥肆弊之無窮兵卒索哺之尤横用平平䇿未易以左支而右吾下急急符或議其前寛而後猛惟中和可以為政惟誠實可以感人是亦不謂之難抑亦有大於此世道日隘時事鼎來近聞邊頭屢馳露布知取勝而不知持勝易納降而不易處降安保今日饑鷹之來歸不如向者猛獸之反噬金亡可待韃勢方張我弱而何以制人内輕而何以服外要知國本全係人才大厦豈一木之能支危枰非一着之可活如將大用若何罄諸葛之血誠殆恐不然反有累龜山之晚節此又其千慮之過非止為一州而言某愚不可移戅常妄發中宵憂國盖不勝婺婦之情指日趨隅庶盡觧門人之惑望公如嵗以日為年上袁建寜兼漕啓建牙藩邸疊組計䑓江浙數州久被齋長先生之道化甌閩七聚竦聞皇華使者之風聲愉企賀榮敬羞吉櫝恭惟某官出處闗乎世運忠孝貫於神明濓溪浚其源象山𨗳其流㑹心有印慈湖作之師絜齋為之父交臂傳燈早甞以正論之緒餘發而為大廷之奏對魁躔炳耀要路横陳乃於前經古史以䇿勲期與元聖大賢而合轍相卿巧宦争趨金張許史之門郎省髙潛自許召杜龔黄之政亦既中和之奏最居然諏度以觀風數百條荒政之疚懐元元命脉十五所儒官之講道字字精神谷其腹所以遂天地之生牖其衷所以示子弟之誨以辯志片辭而起廢以諭吏一章而警媮舊染咸新宿酲頓解幽室之中指迷者燭此譬最精萬物皆灰不燼惟瑜斯言有味福星次止時雨沛然幸甚丹山碧水之區得借玉節銅符之重民厄於兵復饑於嵗翹首騶麾士誦其書願見其人傾心誘掖固將以仁心而行仁政又必以斯道而覺斯民然清朝聽斷之一公諸老牽聫而嚮用有以中書何無冦公為問者當以吾國即相司馬而答之初立本竒更好黄花之晩節前猷益大永垂汗竹之芳名伏念某讀書不多諧世又寡殿廬校藝踈狂貽怒於要官宗邸横經習嬾見嘲於羣弟捫壮心而猶在處逆境而甚安載瞻龍門嘗有蟻援間闗一第幸經先太史之品題骫骳四箴復辱小申公之印可曾謂强顔於令席獲從受察於使車人憐蹭蹬之何堪天使遭逢之甚巧有三品筆誰無收名定價之思持一瓣香敢作嘘枯吹生之想賀徐倉啟輟班郎省掌委閩都公道聿開方睹鳯閣舎人之様遐氓何幸驛迎軺軒使者之來敬飭墨卿晉干籖帥恭惟某官清凌冰柱峻埒斗杓去南州孺子於千年典刑猶在得慈湖先生之一𣲖傳授最親更閱理義之多從容出處之際久於補外晚乃立朝繙帙仙蓬夜對青藜之杖横經王邸朝吟苜蓿之盤發揮石室之秘儲敭歴錦窠之清選使其道之少貶則何官之不為昌言諤諤而不茍同直節堂堂而難於進仕之巧者爭趍金張許史之門公獨凛然自許召杜龔黄之政以安定之學淑於千里故苕溪之最徹於九重果錫召環垂登𦂳地不屑枉尋而茍合爰持英蕩以遐征維時七聚之區適當多事之日震疊摇撼者方定流離蕩析者未歸白粲價翔誰與發倉於河内牢盆禁宻殆㡬為穽於國中碩䑕之貪不除帶牛之習難革諒已闗於諏度必可釋於顧憂然聖朝聽斷之方新諸老牽聮而嚮用有以中書何無冦公為問者當以吾國即相司馬而答之磊砢喬松合作棟梁之用芬芳汗竹要垂宇宙之名伏念某讀書不多諧世又寡殿廬校藝踈狂貽怒於要官宗邸横經習懶見嘲於羣弟撫壮心而猶在處逆境而甚安念昔為尹幕之逰幸嘗下宗師之拜曾謂強顔於冷席復從受業於崇䑓人憐蹭蹬之何堪天使遭逢之甚巧提撕之以巨力教誨之以雅言庶乎孤寒得所憑藉有三品筆誰無收名定價之思持一瓣香敢作嘘枯吹生之想上知宗辨學事記問何足以為師况不賢於弟子市井與言則以利豈冝凂於先生事有係於觀瞻人能言其曲直不平甚矣無辨得乎竊觀聖賢之門每謹義利之戒賜貨殖則謂之不受命求聚斂則責以非吾徒原其本心之可誅貶以一字而若撻而况學校至重禮義尤嚴守道守官並行不悖曰教曰養相須而成以名分則有師生以事權則有長貳雖有學職豈皆志於簟食豆羮然在家居亦仰給其俸錢廪粟統屬固冝歸一規矩安可不遵今乃以大族之搢紳為宗庠之領袖羣然進退不疑其間隙之生遽爾呌呶誠出於意料之外於漏下五六刻取計司數百緡凌轢公堂刼持族類鷹饑而攫徒誇利爪之强羊敗其羣豈勝羸角之狠初不甚訝其此舉退而徐詢其平時盖在閨門素虧孝友京城太叔之不弟義莫之行於陵仲子之避兄㢘烏乎在此而可忍靡所不為煑豆燃萁所厚者無不薄矣操戈入室此物何為至我哉事未發則監謗諱言迹已暴則飾詞强辨悖而入悖而出吾如彼何反吾禮反吾仁自責而已伏念某猥以末學來為冷官季考月書毎得寸長而必喜人稠坐廣至誇吾學之多才取之寛其常員養之加其稍食以文藝来者輙為指摘有朝暮見者罔憚應酬凡在同盟未見嘲於雪日獨此横逆乃肆起於風波前官姑聽其侵權它屬多容其撓政顧如么麽素守剛方不能委曲以見從遂致侵陵之太甚小人之為不善固知清論之莫逃君子可欺其方深懼䜛言之易入所頼正人之在上能為吾道之主盟伏惟某官當代儒宗斯文司命好樂如自其已出公族化行直清深畏於人知懦夫志立愛而知惡義以制情膚受譖愬之不行皮裏陽秋之自定即墨不善佞而得毁未求齊國之封馬謖既撓法而負恩宜正街亭之戮此他時進退百官之大者自今日訓齊九族而先之某得以克卑厥心自振其職泛駕之馬已漸失控御之宜瑞世之麟當見為薫陶而出此非饒舌盖以全身
