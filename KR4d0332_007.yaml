body:
  text: 臞軒集巻七宋王邁撰啓按此巻起自潭州觀察推官至調浙西安撫司幹官作謝趙侍郎送自著易説語孟洪範老子書解啓老子杖青藜方䇿勲於羣籍孺子拜黄石乃受教於一編幸見人間未見之書如得天下難得之寳斯文增氣後學有師恭惟某官一代宗工三朝夀雋出處名節朱虛侯衛社稷之忠㳺戱文詞太白老鳴國家之盛身握陪京之管鑰秩崇廣内之圖書每於凝香森㦸之間不廢滴露研朱之樂神機一泄六丁曾下於霧中人爻已通三畫併呑於天上謂羲文孔子無二道合京費王弼為一人訓易而以神明發千百餘年之闗鍵得意而忘言象付六十四卦於筌蹄既精研六籍之原乃大放羣書之作于洪範則首及君臣之正分於中庸則先明忠恕之同源渾融一貫於胸中脱畧諸家於紙上讀論語知趙中令願致太平談孟子異王荆公恥規近利造好學力行之地位下精義入神之工夫上而續伊洛之正傳下亦窺柱史之衆妙夫子言文章性道又得而聞元帥閲禮樂詩書於今親見著述尤多於丁部敷陳上逹於乙觀吟六藝之文披百氏之編大儒事業舉三代之隆建萬世之䇿宰相規模某猥以謏聞恭承大恵非桂樹聨芳於二陸而蓮池誌羙於季方鉅册髙文方進徹細旃之上牙籖縹帙何縁到圭竇之中方精神昏耗於吏塵使心目開明於理窟既獲多聞而又多見未識異人先得異書心愛太𤣥莫預弟子侯芭之列手編文籍願書門人李漢之名謝趙漕啓父生師教之身僕不輕於所託徳進言揚之選公何取而見收既不常親炙於朝夕之間又不能借助於左右之譽惠出非望始聞猶疑乃以剪拂之過情竟謂强毅而有立玩誦至此感慨久之直道而行寡與世合中人以上好與已同鄭公良臣尚恨義方有太直之操曲江賢相且嫌挺之負過勁之名如某其人何足比數昔嘗吐危言而對䇿以訐見排今復持直道以事人似狂未醒斗升之禄粗奉甘㫖方寸之地可質神明位卑而言髙才踈而意廣圓為卿方為皂豈不知流俗之皆然直如弦曲如鈎亦各随中心之所好涖官雖久無志可行居常咄咄書空見者往往下石諸大夫之唯而舍之諤誰或助之一齊人之傅而楚之咻嘻其甚矣敢謂囊錐之末露亦䝉銀管之特書向非大量過人如王文正之待冦平仲盛徳容物若婁師徳之于狄梁公則將不免於見尤何况敢望為知己兹盖伏遇某官名節皦如霜日氣義薄於雲天將觧佩以還朝猶焚香而薦士懸鏡於此媸妍凡閲幾人落筆之餘精神在末一㸃此舉庶幾公道髙風可激懦夫於養痾之際得之其起廢之功大矣抱茂宏之羸疾猶幸耳堅得淮南之仙丹頓欣骨換寒谷暖生於吹律親庭喜至於加餐某敢不勉所飭修加之涵養所不背師門之訓惟勵初心願言開賔閣之時無忘今日相期者逺槩見乎辭回林監倉啓宸扆出綸帥藩司庾見者謂名卿之子肯此盤旋今而後倉氏之官不為卑冗罪遲展慶倒置先施恭惟某官胄子英游清時偉望呼吸三山之秀氣發為詞源崔嵬雙闕之家聲不斷書種講聞素官之譜佩服教忠之言翩然斜飛來此小試盖乗田有職雖素王猶屑為之而治粟名官以國士亦嘗親此偶司出納可養經綸况當疆場之多虞正倚積貯以為命自今紅腐必無年饑用不足之憂不日緑綈趣奉嵗入榖幾何之對有如某者見謂斐然仰破屋以哦詩嘔肝不悔俯大廷而對䇿空臆盡言决科輸鼎甲之三籌入幕乏錐嚢之一頴比於江西訪芝蘭之友謂於門下為𤓰葛之親略相先後以之官或可牽連而託契豈惟暇日共觀鄴侯三萬軸之藏祗恐匪朝已預文子七十家之薦投帥辯謗啓㣲官幕府忽罹市虎之䜛大字通衢至有蒼鷹之戒自反無慊旁觀謂何竊以下僚之事長官也至難小人之陷君子也常易惨惨劬勞燕燕居息敢謂不均皓皓易汙皦皦難全動而得謗莫能加之以贓汙之迹則必誣之以苛刻之名肆為譸張隂結寵眷諸大夫之唯而周舍之諤寡與固宜一齊人之傅而衆楚之咻相攻太甚伏念某癖惟信古様不入時為饑所苦而來稍足亦甘於隠員為卿方為皁豈不知流俗之皆然直如絃曲如鈎亦各随中心之所好謂欲盡忠於所事何忍相率以為欺茍有知未嘗弗言欲通壅蔽未見信以為謗已自取踈疑遂令狐媚者旁觀乃以蠅營而加汙髙明過聽約束嚴攽然某粤自蒞官粗思及物嫉奸吏以浸漁而舞法時行直舍之笞憫窮民以衣食而遭刑量減公庭之杖倡優下賤抵憲不赦書史典謁請間不行大則爭於階除小則筆於簡牘睚眦之怨交結膚受之愬果深有如墻壁之文甚如市朝之撻羣憸竊笑善類驚心固不止為一人言非所以令衆庶見無羞惡之心非人也尚何顔而坐曹如左右曰可則殺之寧有殞而無辱仰惟某官以四方霖雨為一道福星雅志平反喜動慈闈之笑粲卑躬吐握許通屬吏之欵私顧此謏儒待以我輩書門板以旌孫戊之直諫是能容之指棗枝而謂斛律之滛刑豈得已者每於議政之暇誨以有味之言謂心貴和平毋若昌黎之好勝謂吏師法令冝佩元城之良規某敬以服膺力求捄過願以十目所視者不待浹日而斂之中人以下皆惡林宗方立危疑之地國士之遇既有智伯冀全終始之知此情不孚有去而已上葛撫屬啓望紫樞之府早聆蘭砌之芬芳入碧油之幢晚竊蓮池之餘潤先辦赫蹏而告至將收縞帶以乞交恭惟某官天分本髙學力又到丰標如玉英精奪婺女之輝咳唾皆珠文采對天孫之巧維時幕府為國重臣安石之薦謝𤣥才能是舉呂相之知夷簡公輔相期不應露頴之初屑辱司征之寄方禮樂詩書之帥妙簡乃僚謂風流藴藉之賢宜寘之幕排紛剸劇而刃不頓飛書走檄而筆不停宜臺府之賞音羡家庭之有譜筦庫七十家之薦日即留中扶摇九萬里之摶風斯在下某居今以屈嗜古而窮黄甲同年半是雲霄之雋武青燈共夜依然山澤之臞儒百憂熏心一貧到骨葵邱之𤓰已熟雖喜及期輦路之栁可攀自慚寡援所幸締年盟之末必不靳忠告之言専衽有期喜遂一斑之覩含毫莫斷願求三昩之傳與鄭給事啓諾仕京畿為碧油幢之下吏主盟寒畯有青𤨏闥之正人昔薦墨之未乾今師門之孔邇倉皇告至俯伏投誠竊以貴賤之分固殊氣味之投亦寡君乗車我戴笠命實不猶子鼓瑟王好竽物難茍合悠悠古道汩汩頽波或已隔面於紫陌之春誰肯動心於綈袍之舊焉有如夕郎之貴顯尚猶記暮子之姓名同心皆四海之人獨思眷顧十年無一枝之信不責踈狂吹嘘已送於上天植立且期於異日嵗云暮矣訝𤓰戍之來遲予日望之見鄉人而輙問俯念梁園之後志曲為材館之先容如許殷勤實難勝荷伏某晩竊一第繼罹百憂頭顱如許而心自憐髀肉已消而名未立豈不汲汲於仕胡為遲遲而行盖回思捧檄之時哺烏望絶况未有應門之嗣䑛犢情鍾加以聚糧之難重以負薪之疾何其久也止或尼之駑馬頗困於脩程今方税駕去燕來尋於舊壘好為捲簾兹盖伏遇某官古大臣之盛心新天子之舊學黄扉丹地凛杜公封駁之詞廣厦細㫋負范相温淳之氣結知宻勿跬歩登庸乃力遜於軒墀真大耐於官職久負儒者給事中之望行展魁然真宰輔之才尊主庇民以存心用闗宗社薦賢報國必有後慶衍子孫某是以不願出於他門惟亟投於大造一力成就三生遭逢桃李無言所望先華而後實松筠有節誓當老壯以窮堅謝宣㕘政啓丞弼地嚴手握量才之尺度孤寒路狹身歸播物之陶鈞惟大儒為吾黨所宗故孺子以是心而至輙陳梗槩上瀆尊明竊以周公下白屋之禮衰鄭國歌緇衣之風廢凡懐才而抱藝皆無地以托身攷漢史於元朔地節之間曰儒相則公孫宏魏相而已然仲舒不用而用張湯之酷吏望之不薦而薦龔徳之樂工故西都兩百年非無材能而執政二三人莫為宗主小不自愛則甘心田蚡之客大而無耻則俛首石顯之門使善類至於失身亦當國不能無責惟我本朝之諸老有古王佐之盛心文穆取人材多夾袋之所蓄元獻待寒士至樽酒以相歡祁公用則所舉必名世流司馬出則其徒有行道志或薦能於選調或引類於經筵盖祖宗擢台輔於儒科協心共濟故人物皆國家之偉器同氣相求每三嘆於前芳幸一逢於今日恭惟某官學到聖處氣涵天和爾雅文章瑞麟掣黄金之鑰倫魁聲望威鳳儀白玉之聲通經博古以為髙尊主庇民而自任始者鑾坡給札之對後來𤨏闥批勑之詞鯁論危言凛凛主張於國是忠肝義膽昭昭對越於天心旋陟政塗預㕘宏議髙著眼力審時觀變之慮深竪起脊梁扶顛持危之責重翊太陽而東出領衆星而北朝寧王寳龜列聖在天而相佑我家柱石重臣悉力以維持方將啓沃上心緝熈帝學收召端人正士恢張美化宏綱於小毖求助之時為車攻復古之計此勲既集無官可酬罔俾前朝専美魚頭之㕘政將繇亞相徑躋鴟尾之三公伏念某殖學代耕賣文為活頃奉昕庭之對空臆盡言不知書生之踈轉喉觸諱甘輸三籌而不悔僅竊一命以進身漫逰蓮池茍奉菽水豈無膏沐耻為妾婦之容纔奉㫖甘遽奪阿彌之養春秋之窀穸已畢霜露之怵惕猶新杜曲之田無以給桑麻河汾之廬不足庇風雨乃勉趍於京輦本擬注於銓曹以闕少員多需次如河清之俟而家貧累重闔門有轍涸之虞不量力而乞漿敢希榮於吐哺雖素於左右初無介紹然見之方冊不昧平生儻以氣類而相憐庶乎枯槁之立振駑才無取將何裨一代之經綸駿骨先收亦足勵四方之寒畯上薛樞宻啓宥宻地嚴手握量才之尺度孤寒路狹身歸播物之陶鈞况當龍興虎嘯之初輙動蟲鳴螽躍之想敬陳梗槩上瀆尊明竊惟右府本兵之權實分宰相薦賢之責如天聖之晏元獻如元祐之范忠宣維時二聖之臨朝圖任元樞而共政晏待寒士至樽酒以盡歡范儲人才如橐艾而理病琦仲淹首蒙汲引軾汝礪俱入薦聞後皆為數世名臣此可見二公相業每讀國史而竊嘆不謂明時之親逢恭惟某官四海宗工兩朝元老魁磊英竒之氣可塞堪輿嬉戱怒罵之文皆入金石自為州縣小官之日已有經理當世之心不縁介紹以立朝直以精忠而許國剸裁邦用耻為管晏淺近之功恢拓中原出於王謝經營之表每當事機之有肯綮處以談笑而無留難先期决意大用之近比如公一人耳髙著眼力察時觀變之慮深竪起脊梁扶顛持危之任重幹斗樞而北運扶日轂以東升漢無百參其於時事以何缺宋得一薛庶幾王所之有人方將啓沃上心緝熈帝學收召端人正士恢張美化宏綱於小毖求助之時為車攻復古之計此勲既集何官可酬首揆尚虛佇正靣槐之位脩名不朽留為汗竹之傳伏念某殖學代耕賣文為活頃奉昕庭之對空臆盡言不知書生之踈轉喉觸諱甘輸三籌而不悔僅竊一命以進身漫逰蓮池茍奉菽水豈無膏沐耻為妾婦之容纔奉㫖甘遽奪阿彌之養春秋之窀穸已畢霜露之怵惕猶新杜曲之田無以給桑麻河汾之廬不足庇風雨乃勉趨於京輦本擬注於銓曹以闕少員多需次如河清之俟而家貧累重闔門有轍涸之虞不量力而乞漿敢希榮於吐哺謀之心口而有禱願以氣類而相憐倘留夾袋之榮當露錐嚢之頴自知甚審將何裨一代之經綸借勵其餘亦足勉四方之寒畯謝制置辟制幹不就啓精舍聚徒方逺需於𤓰戍制垣有命將收買於李蹊得此於常人不足多受知於名世何其幸敬裁尺楮往白前茅伏念某樸不合時癖惟嗜古初入緑水芙蓉之幕實在芳洲杜若之鄉不知其他惟忠所事慘慘劬勞燕燕休息敢嘆不均皓皓易汙皦皦難全幸能免謗奈遭家之不造遽啣恤以來歸不能誓墓而保宿心竟復入京而千㣲禄繫匏已久食蘗良甘黄甲同年半已乗風雲之㑹青燈共夜依然為山澤之臞敢謂元戎特貽嘉命將羅而寘之幕使錐之露於嚢誰為髙明之期有此特逹之眷兹盖伏遇某官出處之節皦如日忠孝之誠通於天方在妙年已負逺畧寧皇㧞於常調付以邉城嗣聖賞其雋功陞之帥閫䕶風霜者十載凛氷雪之寸心居無一念之忘君入具八珍而將母属殘敵釜魚之假息而强藩檻虎之猶哮義不顧身風鶴助謝𤣥之㨗士皆用命江淮知萬福之名猶不忘寸長片善之捜羅盖將兆登明選公之事業致令么麽亦玷品題某竊謂人豈不自知才各有所限吟詩固不能却賊作檄亦未必愈頭弱不勝衣而豈解驅馳暗不睹墻而莫知機變况自上求下雖君子之盛心而以身許人亦小夫之難事張文昌所以有節婦之嘆陳後山所以有薄命之吟非敢以雙明珠而見還惟别於一瓣香而致敬欲望察其由𠂻之懇寢其飛辟之書力賜保全少寛訶譴公修程未艾四方皆願於攀鱗僕來日猶多萬里尚期於附驥謝鄭給事應詔薦賢能才識啓鄉校㑹文不作華途之夢禁林薦士俄飛青剡之章誰為之地以使然殆若自天而下者感深言淺施重報輕伏念某讀書不多合世又寡初入緑水芙蓉之幕實在芳洲杜若之鄉每持直道以事人不敢茍禄而為養豈無膏沐耻為妾婦之容纔奉㫖甘遽奪阿彌之養殷憂熏灼壯志蕭條居嘗誓墓而出苦辭竟復入亰而干㣲禄戍𤓰尚逺食檗良甘乃開門而授徒姑賣文而為活青衫素髪消磨十載之光隂黄巻短檠感慨千年之治亂世道隘甚人物𦕈然父生師教之身為士者鮮知自愛徳進言揚之舉在上者多及其私遂安分以固窮忍徇人而失已敢謂朝廷之法從猶念山澤之臞儒飾敝帚以千金韻啞鐘於六律謂生涯盃水假之㢘介有守之名而習氣草茅加以直亮敢為之譽不特借品題之一字又將期植立於異時道義合則靡待介紹之求力量大則實異他人之薦古之所謂知己詎不其然士而茍有烈心皆思自奮兹盖伏遇某官學到聖處氣㴠天和在韋布之時而有志廟堂為塲屋之文而可刋金石自搴芳於巍第即䇿足於周行司馬無求功名迫而後起敏中大耐官職即之若無新天子學而後臣先皇帝留以遺我談經旃厦陳義格心載筆螭蚴有文緯國陞華青瑣跬步黄扉竪起脊梁自任天下之重髙着眼力博觀人品之精致使么㣲亦叨收録某敢不益鞭庸鈍自勵操修若何報塞於恩私惟有堅持於名節此心歸向湜輩安敢叛於師門不日登庸案公决無書於政府謝京尹舉薦啓垂登政途預聞大計回顧幕府猶有遺賢乃函上於薦書頗見駭於衆聽謂如某者獨何人斯様既背時宦又無譜盡忠所事妄希一鴈之鳴直情而行久犯羣狙之怒才踈而意廣位卑而言髙徒恃方寸之無他不枉尺尋以茍合直鈎落落分甘月滿於空船翠袖怦怦誰念天寒而倚竹寧人不顧耻已自媒此心常質之神明一語不謀之妻子敢謂袁公篋櫝之寳尚歎未盈顧如王儉橡樟之材忍令終棄不求而獲始聞為疑及觀寵遇之過情乃謂持論之不懾伏讀至此感歎久之昔嘗以子大夫之對而見褒兹又以老門生之名而併録裴度賢相猶忌劉蕡之直言曲江名臣且嫌挺之之苦勁今執事屢優容於一介其徳量殆逺過於二公兹盖伏遇某官昔大臣之盛心新天子之良弼八年京兆棠隂正濃一時門人李蹊幾滿懸鏡於此妍醜凡閲幾人落筆之餘精神在末一㸃不必論非聃之同傳姑自喜晏范之全交某力尊所聞自許不叛敢望先華而後實惟當老壯以窮堅三十年讀書幸已入士林之目千百人執贄不忘下白屋之心賀趙京尹啓羽儀卿寺彈壓帝城人望翕然知尹京之有趙上心簡在果弄印以授堯輦轂肅清紳緌交賀恭惟某官學精六典名冠兩科文章太白老之瑰竒氣節朱虛侯之耿介早登華貫屢獻皂嚢肘後有醫國方舌底出氷人語不能枉尺為清要地而少留甘請一麾指瀟灑亭而徑去自上輔畿之最入陞台佐之華振領挈裘糾正列曹之淑慝調胹肋鼎習為宰相之經綸新天子居然器之先寧皇留以遺我眷皇畿之千里畏帥閫之十連少尹舊㳺回首平分於風月神京新領致身已逼於雲霄行將懾鴈鶩之玩而以威繩狐鼠之姦而以法寛一分之民力散八郡之陽和簫鼓行春驩迓碧油之元帥鈞衡虛左佇看緑鬢之中書伏念某淺學得皮赤窮到骨初筮征行於湘水聊爾棲身至今悵望於衡雲不堪回首十二載未書於三考二千里來效於㣲官直道事人安敢肆幕中之辯剛腸嫉吏不能依紙尾之書幸曾出元樞之門墻猶未入羣憸之陷穽敢期機㑹獲事仁賢受容受察之方新一喜一懼之交集竊傾心於教誨更借力於提撕莫為之先儻少異衆人之待當忠於主其忍效妾婦之容權教謝京尹啓随郡幕府愧無賛長之謀共二京庠冒犯為師之戒十載李蹊之猶舊一朝芹水之復春士論榮之徳念深矣惟王畿之學校近天子之辟雍爰自邇年允為遴選矧當大比尤異常時英俊滿門皆願卿大夫之勸駕師儒有闕詎容妄男子之代庖如某者位置最卑迂踈尤甚十一載未盈於兩考二千里來效於㣲官碧油幢下之多才如鱗斯集白面書生之不武乃蝨其間累月於兹一籌莫畫燕燕休息豈不謂之素餐斷斷無他正宜束之髙閣獨於朱墨應酬之暇猶及丹鈆校勘之功忽䝉金管之特書俾即黌宫之代匱豈以遺簮之與墮履曾出門墻故由濁渭而入清涇獨私造化嘉與吾黨獲預斯文園活計之久踈依然入夢鴞泮好音之見遺應者同聲静言思之孰主張是兹盖伏遇某官經綸道大康濟功髙七八年尹衆大之都㡬萬戸拜生全之徳拯饑救溺善推禹稷之盛心擿伏發姦不用趙張之小智虛懐以接寮屬刮眼而念孤寒致使么㣲屢經題品某敢不誓堅素履用答洪知人之患在好為師自知過分友既信乃可獲上益務盡心通袁京尹啓昕庭對䇿濫陪玉筍之門生畿甸效官復玷紅蓮之幕府三重翰墨百拜帥籖恭惟某官一代宗師四朝碩徳挺身任重六鼇背上之擎山定力鎮浮萬馬羣中而駐足自仕京國至位文昌華途清要者幾何鞅轍周旋之殆徧賛籌台佐異時相業之胚胎琢玉仙源一代帝墳之潤色容與功名之㑹更閱理義之多逺略濟時振起過江諸賢之弱精忠許國對越在天列聖之靈尹正神京榮躋版使東南之力竭矣帑藏焦熬西北之事紛然符移旁午戚婉貴臣之盤據豪民巨姓之根連得地大而雖可回旋去天近而尤難展布今之君子悠悠畵餅之空談付以事機往往蠟鞭之無用任國重寄如公幾人當紛紜澒洞之衝每閑暇笑談而辦輦轂之下必先彈壓與列郡殊錢榖之問不知廟堂有地官在如聞訪落欲即登庸若劉沆在天聖初自尹而入為相然張敞為京兆最繼後者難其人屈壯猷旬月之間積蒼生霖雨之望世道隘甚人物𦕈然首揆久虛行看黄麻之宣布脩名不朽要垂汗竹之芬芳伏念某殖學代耕賣文為活比奏槐楓之對空臆盡言不知草茅之踈轉喉觸諱向非借九鼎之力當不止三籌之輸副本既不上於中書賤刺亦羞通於知己及星沙之賛畫俄風木之銜憂年踰四十以無聞於顔有靦禄縱三千而弗及此恨何窮人憐十載之栖遲天畀一朝之遭際低頭入幕教條必惟命之恭觸事面墻官學頼得師之益寛為程而督責大出力以提撕庶㡬遺簮墮履之㣲或有大呂黄鍾之重横寳在道敢祈袁相國之知倒屣出門自賀王仲宣之遇上陳漕啓奎閣陞華日畿將漕調胹助鼎久煩左右之分司輓粟飛芻最係東南之大計凝霜持節喜雪兆祥竊以京輔之建臺尤重轉輸之命使民力已竭况更年飢用不足之餘邉事方殷誰識嵗入榖㡬何之數急之則元元告瘁緩之則往往愆期必有通儒方堪計相恭惟某官風采儲英於婺女文章分巧於天孫先正負宇宙之大名經綸未了有子習家庭之宦譜出處尤髙自飛壯縣之雙鳬入綴明庭之羣鷺不能枉尺直尋以茍合徑請髙牙大纛以有行出守九華就馳四牡雙瞳察吏精神鎮壓於山川一飯念民徳意周詳於田里外民庸而奏課入台佐以宣勞挈領狐裘紏正列曹之淑慝依光鳳沼習為宰相之䂓模新天子居然器之先皇帝留以遺我屬神臯之擇使就宰椽以疏榮得地大雖可回旋去天近而尤難展布今之君子多為畵餅之空談付以事機半是蠟鞭之無用任吾國之重寄如執事者幾人行將轡一攬而清濁自分鞭不用而公私兼裕嵗計既優於租粟河潤併及於京師簫鼓行春共喜福星之臨照鈞衡虛左沛為霖雨之沾濡伏念某淺學得皮赤窮到骨初筮經行於湘水正欲娛親至今悵望於白雲不堪回首十二載未書於三考兩千里來效於㣲官直道事人安敢肆幕中之辯剛腸嫉吏不能依紙尾之書惟臺府本同體之戚休而寮屬如一家之子弟教誨之以藥其失提挈之以玉於成是所望於尊明庶少逃於瘝曠一臺近水餘波倘及於蓮池小草出山和氣願回於黍律與史監税啓疏渥宸廷司征畿甸毗陵地近不妨時戱於綵衣韋曲天低尤便日親於衮繡潔蠲告櫝塵徹賀床恭惟某官敏莫能追秀無可揀名父之子名子之父椿桂同芳難兄之弟難弟之兄芝蘭競秀耻以膏粱而習貴力於翰墨以䇿勛肯為筦庫之官來養經綸之業惟大農泉布之經費係中國闗市之常征豪家戚畹之互作梯媒富吏猾商之相為嚢槖往往闊疎於巨槖區區捆摭於細氓公定不然方勇除於衆弊民亦勞止必能寛之一分力量大則志可行名實孚則人自服多行好事正在妙年仁者安仁立使蒼生之蘓息相門出相行看華轍之飛騰如某其人見迂於世朅來入京兆之幕了不入時様之粧援寡力㣲滿眼莫為之道地才疎氣直知心惟有於老天所幸名勝之可依必出宦譜以忠告道同氣合何當陪暇日之㳺施早報遲僅免作隔年之債與黄監酒啓出綸天陛董醴日畿碧油九鼎之重言辟書甚寵良醖三升之可戀官况最清展慶滯遲先施倒置恭惟某官沉酣周孔糟粕莊騷毓秀九華鍾清淑中和之禀沂源雙井得風流藴藉之深妙三昧於文章露一班於政事家傳清白不隨世味之醎酸宦業芬芳賸得名流之膾炙惟神臯𣙜酤之利闗大農經賦之須逢鞠車口流涎人皆圖於倖得飲醇酎心自醉帥獨念於舊交厥選至榮其言有味正可品聖清而賢濁不妨笑人醉而我醒名下無虛人暫樂清時之日月樽前有此客行班紫漢之星辰某之迂踈世所姗笑吟詩無用生涯不直於一杯逐禄何求親養已辜於三釜朅來賔幕不入時粧所幸名勝之來遂托寅恭之末既見君子則喜敬在下風不與執事同心有如白水通盧司户啓出綍宸庭彯纓天府玉川春秋之學經世所闗珠曹版籍之司得儒為重辜遲展賀倒置先施恭惟某官敏莫能追秀無可揀襟懐浩乎湖海師友萃其家庭經術精明早已束三傳於髙閣才名超卓方將臥百尺之巍樓宦譜愈出而愈竒學力随試而随效肯來帝里少試民曹未甘俛首於簮裳必欲䇿勛於朱墨賔興充賦餘子盡避於一頭鎻換登名神人將易其隆鼻可大吾府須看獨班某之孤寒世所姍笑書生强項不堪受鴈鶩之欺直氣填膺正恐犯蠭豺之謗滿眼莫為之道地知心惟有於老天幸甚納交何以教我既見君子則喜敬在下風不與執事同心有如皦日與黄司法啓疏榮宸陛司讞帥藩喬木世家久挹清風而起敬紅蓮幕府今依緑水以同㳺展慶辜遲先施倒置恭惟某官雲霄閥閲冰雪丰標汪洋萬頃之波淵乎似道呼吸三山之秀暢而為文早以徽聲騰於膴仕謩有祖之烈威得父之清胡屈英躔來㳺賔佐有一命者皆知及物素宦可矜持三尺者尤易活人隂功所係必能援經以斷可以使民無寃素熟丹書好下平反之綵筆行膺剡牘要須潤色於青氊如某其人何庸於世向嘗吐危言而對筞以訐見排今復持直道以事人似狂未醒所喜聨事而得偉人畧相先後以之官庶可夤縁而託契見似鄉人亦喜敬在下風不與執事同心有如皦日回陳司法啓仰止徳星喜託通家之好暗投明月恍驚横道之珍陳誼甚髙拜嘉降嘆惟世禄之家鮮由禮為大賢之子難其人鳳穴而長䲭鴞蘭畦而生蕭艾相誇紈袴皆淪胥富貴之波細數衣冠誰克衍詩書之澤恭惟某官襲芳家慶傳𣲖古靈咳唾成文陣馬風檣之敏快精神滿腹冰車雪柱之清髙考徳質業於家庭蜚英騰茂於庠序姑自象賢而入仕不過寄徑以進身師元城看條貫之言首司法掾佩純仁輕禄食之訓忍離親旁力於翰墨以筞勛束以冠裳而不住已搴名於鶚版尚㸃額於龍門綵衣侍養之餘鐵硯磨研之久黄金榜上便須炫羙於世科白玉堂中更要增華於國典某聞名惟舊締契方新每因得豚犬之遲常見羡麒麟之種士伯同寮之好實始自今太邱有子之賢願常過我回范仁和啓帝以名流宰於畿甸紫㣲舊事許令東閤之代綸赤縣新除良便南陔之戱綵潔蠲吉櫝喜徹賀床恭惟某官胷貯石渠眼空泰華生四明仙佛之里萃一門師友之賢學易通神三畫併吞於天上著書擬聖六丁曽下於霧中不妨㳺戱於詞場更到雕蟲之末技横經留鑰招諸生立而誨之董醴神臯笑餘子未知趣耳淋漓薦墨慫慂通閨便合留中好設雲屏而隔坐云何補外要追塵甑之清䂓惟是薄俗之鄙談每以作邑為難事縮頭退避争言湯鑊之焦熬好手從容優試霜硎於肯綮力量本大名實又孚不惟自見撥煩治劇之才正可力行學道愛人之志雙鳬之來葉縣見謂斜飛五鳳之入翰林行當首擢某之無似世以為迂既不及親何樂一行作吏早知有命悔不十年讀書朅來贅幕府之員了不入時粧之様書生彊項不堪受鴈鶩之欺直氣填膺正恐犯蠭豺之謗信天任理愒日玩時於門墻無半面之知何書翰似同心之素先施是愧有味其言政事文章公過以歐陽之長而勉我後先憂樂我敢持文正之美以期公行矣納交喜而欲舞與京教啓正坐横經公方見士於芹泮低頭入幕僕來依人之蓮池宦㳺清濁之雖殊官期先後之不逺敬裁鯉素往白鱣堂恭惟某官早以文鳴紛其内羙胷次貯氷壺之瑶璧筆端垂金薤之琳琅學易通神三畫曾吞於天上著書擬聖六丁屢下於人間舍選芬芳科名岌嶪直上宜徽階之侍斜飛亦黎閣之逰惟神京學校之崇在天子辟雍之側天下攀鱗附翼之士多㳺其間年來凌清遡紫之班皆由此選必得哲匠以主斯文肘後良方不惟授諸生速化之術心中有印抑將續正學未墜之傳多士填然附之先生自此升矣夾袋之記人物簡注方新䑓閣之繼諸公經綸可展某辛苦一第間闗十年讀相牛之經分甘襏襫圓得鹿之夢誤綴簮裳平生耿耿者猶存與時落落乎難合初筮經行於湘水聊爾棲身至今悵望於衡雲不堪回首京幕戍期之已迫書生官譜之未閑若何免司敗誅所恃有師儒在短才有限豈堪飄風草􅊾之忙暇日㳺從共和細雨簷花之句謝浙西王憲薦舉啓幕府底寮甘守雌甲辰之拙職司薦剡首膺大戊子之知士論榮之徳念深矣惟今當薦舉之路夫誰無故舊之交升潛既殊氣味隨改一貴一賤而情乃見望望去之須姦須媚而位可求滔滔皆是在上者徇情而忘義為士者屈道以從人未有方持繡斧之新而乃重念綈袍之舊必居名下方在選中如某者獨抱古心熟諳世味挈來京兆之幕逺引王公之門凡同年而同官多得時而得位君乗車我戴笠命實不猶子鼓瑟王好竽物難茍合寧人不顧恥已自媒此心常質於神明一語不謀於妻子敢意雲天之髙誼不忘湖海之竒人每與丁寧輙相唯諾謂正倫附杜曲之族支𣲖不殊而謝莊從康樂之逰嵗時已久此吾意氣所許者不待干求而予之故澄清之轡方還而破白之章已至在昔文正雅愛沂公豈獨以譜系之偶同私相延譽盖觀其器識之逺到預有相期公子援故事以舉行僕自顧菲才之莫稱兹盖伏遇某官文得雙巖之正印學障百川之狂瀾駐足於萬馬之羣不移定力論事如獨鶻之擊凛有英風乗軺察吏而山岳摇懸鏡閲人而涇渭判謂薦賢所以報國而行道非以市恩揚清激濁之風聲作興一道登明選公之相業根本此時致使妄庸亦叨收録某敢不秉心介石厲行飲氷縱未圖即報於隆知决不敢自叛其素學升沉有分安能計遲速於榮途名節自持或可附聲光於青史上鄭樞宻啓擢用儒宗參持樞筦地嚴鼇嶺被三字之恩榮春近鳳池跨十年之身到廷紳歆慕公衮增華竊以宥宻之司安危所寄長貳雖分於四等綱維同主於五符或累年濡滯而竟不遷或久任劇煩而後得拜未有春入比扉之直冬陞西府之崇雖執政猶吾之股肱廟謨均預然惟卿為朕之心腹聖語尤親恭惟某官氣質得於天成出處闗於世運温純爾雅追還姚姒之文章重厚端凝不作漢唐之人物先皇帝用之而未盡新天子學焉而後臣龍邸䇿勲光洗咸池之日螭坳記事宻依香案之雲翠帷犯風雪以談經青𤨏凛氷霜而封勑方大制誥之有属非老文學其誰為乃以一條氷之衘付之五色雲之手方當多事屢驚夜響之鈴絛非比平時卧看日移於磚影發徳音若時雨起詔草如流泉作宋一經同風三代久簡知於旒冕就寵畀於樞機得君如此其専報國將何以稱在昔君子任至重則愈憂立人本朝道不行而為耻矧圖回於初政尤倚仗於近臣聖徳方新如羙玉之未琢事機多壅如積水之不流何嘗罪言人不敢言居多避事誰肯任事間有舛政靣是之而背違豈無正人心忌之而貎敬化嘉橘之種而成枳斂祥鸞之翼以為鴞此於元氣以有傷所以外邪之交作一脛如要一指如股難與屈伸五大在邉五細在廷莫權輕重我既每事之示弱彼亦謂吾之無人惟公憂國之忠寘位本兵之地昔中書未有冦忠愍若得為辭今吾國已相司馬公豈容生事必欲正本最患尚同召不恱周之留而何害為周房能用杜之斷而未嘗忌杜相辨如争相與如眤和氣不傷見惡必遏見善必揚至公無我一正君而國定四張維而令行訏謨造命於一堂精神折衝於千里機㑹最易於蹉跌嵗時每畏於因循今猶曰五府之合謀有可諉者設或為一相之處内則何以哉某叨出師門喜摇心纛既賀夢符於凝碧更期名在於汗青鄭公勸仁義之行願言加意王褒慶聖賢之遇因頌獻䂓盖出於忠遂忘其僣回譚廵檢啟原注習春秋曽進列國傳因申觧賭博軍人咆哮事為之從公書擬䝉師斷治號令譚以啟謝制軍者司馬之法不恭自有常刑禁暴者連帥之威為屬惟知從長初無絲粟之力忽辱瓊瑰之投竊謂博奕無所用心戱謔反以為虐刁逵坐赤族於馬栁慕容卜大事於蒱神博銀鎗之營中未幾召釁反鍾離之盧子寧有幾人於王法在所不容彼狂卒胡為冒犯牧豬奴戱耳况敢當公庭而咆哮執䑕輩尸之盖斷自元戎之霹靂為有公在何謝我為恭惟某官東國大夫之故家延康學士之遺直序春秋於吳冦始平之際奏徹九重讀左傳於延安方戰之時才當八面乃淹警邏未展經綸行膺宸綍之攽即据殿巖之任兹小人狃積習之弊故一旦啟玩侮之謀已正典刑立伸威令權皆由於大府恩敢受於私門遇悍卒於㣲行莫損裴晉公之逺到抱遺經而請質何當玉川子之辱臨
