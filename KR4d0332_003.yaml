body:
  text: 臞軒集巻三宋王邁撰論髙帝論一人惟有所不為也而後可以有為惟能忍於其小也而後可以成其大古之人有行之者髙帝是也何謂有所不為也而後可以有為天下之大非利於小者所可圖也匹夫匹婦之争止於簞食豆羮而已也於此而有人焉不惟不爭之而且遜諸鄰而不受則一鄉之人莫不畏服之矣為一鄉之所畏服則一鄉之事彼固可得而辦之也推而上之其不取者愈大則其所辦者愈逺無他人以其所不為信其能有為也項羽以盖世之氣直欲摧岳岱而傾河海然觀其心度之所安大抵知有楚而不知有天下故其貪戀故國之榮不啻如晝錦之快是其志已可悲也宜其天下不得而有也髙祖㣲時貪財好色之心本錮其中及至入秦之日至玉帛子女曽不以動其痼疾是何貪於前而㢘於後也其心今日之所欲固甚於前日之所愛者也前日之所愛者溺焉今而能果敢决裂以求自出焉此其所挾持者甚大氣量甚髙志趣甚逺秦闗百二之險帝固得而隘之矣楚衆百萬之强帝固得而弱之矣范増之徒方且刮目於其旁其敢以平昔在山東者而藐之哉劉項成敗吾不决於垓下之圍固已决於項羽眷戀歸楚之日髙帝入闗無所取之時矣何謂忍於其小而後能成其大天下之大非有以容之則天下皆吾敵也少年豪傑之徒㧞劍而起挺身而闘此不足以言勇也天下有大勇者有上人之志而能甘心以下人有集事之謀而未嘗與事争勢忍小忿而成大謀屈一時而伸於後日此則勇者之所畏也方天下發難之初秦兵常勝逐北羽獨破秦軍虜王離走章邯降欣翳兵鋒所加至必糜潰及聞髙帝先入闗則瞋目裂眥忿如驕鷹猛虎之不可犯是故毎與漢戰有勝無負吁亦壯矣而髙帝則惟恐其戰之不力而勝之不亟也鴻門之役鋒刄蹈前而不之忿也彭城之敗睢水不流而不之駭也失衆於滎陽跳身於鴻門中弩於廣武生死患難迫其前而其心則休休如也置太公於髙爼而不以為辱棄二子於後車而不以為憾南鄭之遷屈節從之鴻溝之約强顔受之寧為之摧挫困躓而不願較其是非曲直也寛之使不吾疾狃之使不吾慮豢之以飽其慾驕之以昏其智示其弱而殺其怒待其間而乗其斃然後全其鋒而破之於垓下雍容談笑遂置羽於死地前日之摧挫困辱者於是乎一洒之矣嗟夫唯天下之至亷者為能貪惟天下之至怯者為能勇帝居項氏於貪而自處於亷故彼之貪反為我所利帝居項氏於勇自處於怯故彼之勇反為我所敗藏貪於亷藏勇於怯帝之術神矣其事偉矣髙帝論二子房髙帝之蓍龜也帝以聰明精敏照臨臣下蕭曹婁酈不足以望清光然猶時出一謀一畫以為助帝皆開奬容納之至於臨大事决大疑處大緩急未嘗不以質之子房甚矣子房之大有造於漢也自今觀之南陽之㨗帝意欲西良乃力陳危道之諫遂得以敗秦㧞宛設無良言則秦攻其前宛制其後能無失機之悔耶武闗方入帝欲擊秦良乃設為益幟之計於是大破秦師設無良言則以我之寡犯敵之衆能無覆師之懼耶既敗秦兵西入咸陽即欲止宫休舍樊噲之諫不從遂以問良良則曰願聴噲言是以灞上之師遽還否則蠱於聲色沮撓軍氣禍孰甚耶衆口盈庭請都雒邑帝乃唯唯從之婁敬之言未入遂以問良良則曰敬言是也是以闗中之都遂定否則形勝一失進退無據危孰甚耶楚兵方張力非其敵闗東之地孰與守之使帝不以問良則遣三大將之計無所聞將恐咽喉之地先為敵據天下安知為我有耶刻印苴茅封六國後事已垂成誰敢言者使帝不以問良則八不可之説無所聞恐賢士解體勍敵並興安保其不長亂耶韓信䟦扈難制守地於齊假王之請驕色可掬帝之怒極矣使良不悟於躡足之頃則信不軌之謀立談而泄况肯終身為帝用耶封賞方行人懐怨望沙上聚首良可寒心帝之慮深矣使良不出先封雍齒之言則此曹機械日深或有倒戈震主之事何以制之耶凡此數端皆切於成敗存亡之大計者子房能為帝言羣臣之所難言知羣臣之所不知故曰子房者髙帝之蓍龜也天下已定之後帝溺於愛欲立如意劉氏之業昔以艱難辛苦而得之者幾嘗試於一擲叔孫通儒者嘵嘵於口舌間而周昌且欲以死守之子房是時若無預於此吕后使人以髙枕而卧之言責之彼豈茍卧者哉端居深念慨然有得四皓朝來而儲貳暮定矣盖子房從帝於患難中窺見帝之肺腑為甚精熟是以察其機而投之商山之老帝所願致而不可得一旦以太子故盥沐來前帝知人心有屬矣羽翼之成盖有所警而動也是則四皓者髙帝之良藥惟子房知其受病之處投之一劑而帝之宿恙即解其功顧不偉歟伊川嘗曰髙祖幾曽用張良良用髙祖耳吁有㫖哉髙帝論三自古英雄之君出而得志天下固其神機廟謨弛張闔闢有非淺智末議所可窺測然至於摧敗困衂倉皇窘迫之際智窮而無所施力憊而無所用而卒能宏濟艱難以成大功者此非人之所能為也天也秦失其鹿髙皇帝披荆棘冒霜露以與羣雄共逐之而驍暴强鷙與漢角立者楚其勍敵也羽奮百戰百勝之威西向以争天下先鋒所加飄忽震蕩如暴風凌雨髙帝無尺土之階獨以一身横當乎其衝徘徊反側不能以自定宜若不得遂其志而卒之破羽垓下成功若是之果者人孰不以為帝之智略足以辦此而奔走前後諸臣預有力焉余謂不然帝之於天下最無心於得之者無心於得而竟得之天盖有心於相漢也初帝起自沛中蕭曹皆文吏自愛欲稱兵倡亂恐事不就秦族其家獨以帝為人望所屬故共推戴之以為兵首此非帝有心於利天下也秦兵方强諸将莫利先入闗懐王與諸将謀遣長者扶義而西於是帝不得辭此又見帝初無心於入闗也自時厥後與項羽相持於﨑嶇戎馬間争頃刻之命者屢矣鴻門之圍彭城廣武之圍其備甚踈其力甚窘而皆能脱一生於萬死之中此非天有以相之漢之為漢未可知也方其入闗之初羽以百萬之師叱咤長驅目中已無闗中矣項伯羽之季父以張良之故為帝緩頰於羽羽至陸梁且䧏心忍氣與帝周旋於盃酒問及亞父之謀一發項莊之劍已跳躑而不可禁吁亦危矣伯獨以身翼蔽於前未幾樊噲得以攘臂而入一怒之餘羽氣已索帝得脱身於項氏垂涎之口羽之君臣始彷徨四顧吾屬為虜之言始不知其所從出人謂鴻門之圍項伯實脱之吾謂寡助之至親戚畔之天之奪項氏之鑒而䘮其魄也乆矣彭城一役帝方哆然髙㑹不虞楚兵之躡其後及一覆於睢水之上三匝之圍未解而大風冥晦帝僅得免此固天之相帝昭昭者不必深論至如滎陽一戰羽聴増言兵圍愈急是時漢之援兵未至楚全而漢孤事勢緩急不問可知紀信在軍中時碌碌無聞非有智謀勇略出諸臣之右者一旦乃能奮不顧身稱䧏誑楚帝既突騎而歸而信之肝腦已膏於楚人之斧鉞矣信之此舉誰實使之或者天心眷眷於赤帝之子則必假手於草莽之臣不然漢事去矣信之一死劉氏四百年社稷於此乎决是豈可以易言哉遲遲踰年而有廣武之役羽張其撫劍疾視之威帝非不知力非其敵而乃致辭問罪從容暇豫如平時今觀其責羽之辭義氣激烈天如不聞則已如其聞之寧不為之感動乎想夫伏弩潜發之時天地鬼神已森列於漢王之左右是則帝之所不能為者人也所能為者天也生死臨乎其前帝不為之少懾者亦恃其有此爾楚雖强其如天何哉垓下之敗羽始有此天亡我之言何知之晚也他日帝告吕后亦以布衣取天下歸之天命帝可謂自知之審矣髙帝論四楚漢興亡之事既歸之天及觀髙帝平日駕馭韓信與信所以自取亡者亦卒以天斷之何也前乎為帝之勍敵者羽其一也後乎為帝之所忌者信其一也髙帝終日惴惴然不得休息者盖其忌信之心尤甚於畏楚也然竊怪髙帝之疑信心迹凡幾形露信獨不自疑者天奪其鑒也帝知信之英特其志甚大非甘心處人下者故當其請兵自將之日帝已長慮却顧毅然舉兵畀之且知信於是時雖得兵未可以有為也及帝敗兵於成臯自稱使者入信軍中至其卧内奪其印綬麾令諸將而易置之疑信之迹已形露矣且軍中自當堅守不聞天子詔周亞夫尚能言之信獨不之悟乎越明年而信有平齊之㨗乃執其功以要主假王之請徳色可掬愈有以重帝之疑也帝雖疑之不即舉兵以攻之者强楚未平無信不可又恐信挈齊以歸楚合謀以并漢則彼全而我孤是故棄千里之齊以畀之使之自戰其地自兼其衆又自王其國為信者盍思夫兩雄不可以並立必求其終焉之計而後可以無恐乃入於籠絡之中而不自知王齊之席未煖而又引兵為帝擊楚武渉之説如水投石且念帝解衣推食之恩竟不忍叛吁信誠不忍於負帝矣豈知帝之忍於信耶及帝既㑹諸將於固陵與信期而不至帝之心皇皇如也用張留侯分封之説信乃肯來共成㓕楚之功楚既㓕則帝可以無求於信矣於是襲奪信軍徙之於一隅之楚是時疑信之心雖庸人孺子皆知之信猶不少悟也雲夢之逰帝以市井之計施之君臣之間信至此方知帝心之有他矣欲發兵自度無罪欲謁上恐見擒方且斬鍾離昧以求媚於帝且昧為楚亡將漢初捕之甚急信欲匿而終發之是自暴其罪也而可乎方信在齊之日誠知帝不可以乆處㩀千里之齊納交於楚且攻且守以為後圖則鼎足之勢成天下又生一敵國矣成敗之勢雖髙帝不能保其往也信不出此初謂漢王親信我不奪我齊既奪之齊又謂我無罪既見擒始知漢王畏惡其能以信之料敵制勝如彼其明審而獨拙於身謀顛倒於髙帝機械中卒為漢臠此豈非天奪其鑒乎觀其告帝之言曰陛下乃天授非人力也信知帝謂天授則然矣亦知天奪其鑒至此乎嗟夫項羽以㧞山之力及其敗也則以為天亡韓信以盖世之豪及其見擒也則以其主為天授曹操以暴武雄鷙之姿垂歿之際則以天命自解此三人極其力之所為何向不濟而竟止於今日所觀者是知天之不可以人力勝者盖如此髙帝論五甚矣利交之不可保也盜入主人之室主不能制有出厮役之徒奮臂而力馳之主頼以免一旦執其功以徼主予之千金不足以飽其欲也於是日夜不肖之心生主悟其變則必拘之有司而殺之嗚呼始以其有利於我也故賞之以為恩終以其不利於我也故殺之以為仇既以利合必以利睽人心之可畏盖如此君臣以道合者也湯武之於伊吕成王之於周公其事不可得而見矣末世君臣之始交也上以利示其下下以利徼其上上下各狃於利自謂其赤心相保永矢不叛天地鬼神實臨之一旦利盡隙開事或非望則養虎養鷹終日勞人主之機而為臣者亦自懼其兎死狗烹之禍於是乎岌岌不相保矣亦孰料世變之降髙帝君臣之交曽市井要約之不若乎且楚漢紛争之初彭越首以人傑起兵未肯以身輕屬乎人也及漢兵敗於梁北奔于睢水帝使人以將軍印綬賜越越乃肯來彼固有所邀於帝矣英布負九江之險身雖楚臣而附楚之心則未堅也及漢興兵不利於彭城而後隨何緩頰於布彼乃仗劍來歸帝於一見之頃以王者之禮待之正所以餌之也韓信以一世人豪雖在窮阨無聊之中而猶不輕托身必擇主而後就﨑嶇自楚來未知帝所以處之者何如一拜登壇具禮之賜信之血軀固不得不以許帝也夫以信之善戰自負其能謂天下莫已敵譬猶神龍虓虎不可羈紲制而豢養得方其三子之身未有所屬也使之從漢則無楚從楚則無漢兩無所從則可與楚漢分天下而立髙祖將以得志於天下不得此三子為用則項氏終不可得㓕是故予三子之賞不得不優封三子之地不得不厚天下已定之後越反於梁信反於楚布告變於淮南勢利窮而機械生間隙開而疑忌至是故誅夷斬艾之禍有不得而免然則由前日而觀帝之厚於三子者非帝之褒也利誘之也由今日而觀帝之薄於三子者非帝之忍也利奪之也故君子於賜越印綬之日已知其有葅醢之變於供帳飲食之時已知其有發兵坑孺子之事於擇日拜將之日已知其有鍾室之禍方三子之未為帝用也帝不得不極其富貴既極其富貴矣三子不得不反既反矣帝不得不誅事變之來何有既極勢利之拘雖髙帝之智不能保其往也然則君臣之問必欲情實相孚恩義交結哀榮夀考終始無間可不於其初而謹之髙帝論六國於天地必有與立三綱五常是也堯舜之所以帝湯武之所以王不能外是以立國矣余嘗怪髙帝之造漢也規模經畫莫不盡其精神心術而為之獨於綱常之大者曽不留一毫之念立國無本不知所以垂裕後昆之道豈其資禀雖髙不濟以學氣質之偏終不能以自克歟且君臣父子兄弟夫婦嫡庶昭穆人道之大綱也帝於斯數者莫不有遺恨焉其故可得而論也古人以君臣之典秩之於天曰職曰位皆以天名之其義精矣古之君臣純乎以誠相與者求其無愧於天也帝以羣臣戮力以取天下而既得之後疑臣下之心終始不置韓彭英盧反狀未萌帝先露其機以激之此猶可諉曰駕馭英雄不可以無術也蕭相國在諸臣間最為謹厚者與帝相從於急難之中何負於帝迨至末年韓彭英盧之血肉已盡而相國亦不免於囚此何為者乎盖帝於君臣之間終日以智術相籠以巧詐相遇一念之誠不加焉古人天秩有典之義掃地無餘是君臣之綱失矣經曰故雖天子必有尊也必有親也帝得天下於羣盜之手慷慨自負及置酒未央之日此正以天下悦其親之時也觀其告語上皇徳色驕氣浮於眉宇曽不思前日彭城之役乃翁㡬不免楚人之鼎鑊天不祚漢曷至今日方且挾所就之業與父兄較短長若閭巷之子驟致千金之産則施施然驕其妻妾焉帝王以天下養不如是之薄也擁篲迎門之際家令之言背道傷教不過以媚帝爾不惟不鄙之而且心善之彼知自天子至庶人同乎一本者為何等義理耶是父子之綱失矣舜為天子不念井廪之怨此固聖人盛徳事然人倫天顯之念誰獨無之帝既定大業苴茅胙土幾徧天下顧乃啣㣲時羮釜之讐其兄之子纎賞不及且英雄困躓之中庸人孺子因得而易之帝之心度如此按此䖏有脱訛崆峒之野曽謂一飯之忿尚得以芥蔕於其間乎以一人之私忿㓕萬世之義是兄弟之綱失矣立繼以嫡不以庶古之道也恩不能以奪乎義夫人之所知也帝至晚年溺閨闥之愛建儲之議一發殆將以艱難辛苦所得之天下嘗試而輕擲之在廷諸臣多方開説如以水投石之難入及用留侯計致四皓以刼其從太子乃得不廢方且引盃歌舞悲鳴躑躅不能自禁且帝最為易曉者一旦溺於所愛謬戾如此是夫婦之綱嫡庶之分俱失之矣古者定世系奠昭穆故曰繫之以姓而弗别綴之以食而弗殊周道然也帝以項伯有鴻門之功婁敬有闗中之説既裂地以侯之猶謂未足而又賜之以姓焉先王建國因生以賜姓胙之土而命之氏則有之矣未聞變異姓為同姓也殽亂其宗支顛倒其昭穆則其置宗正以叙九族者殆為何事乎是世系昭穆之别又失之矣夫君臣父子兄弟夫婦之義與夫嫡庶之分昭穆之别此其道非有難知難行者也以髙帝之明猶蔽於此盖其平日無學以救其氣質之偏而磨其聲色之好加之朝無格非之臣正救其失而彌縫其不逮遂使王道之純全君子竟絶望於帝厥後如文帝之兄弟武帝之父子絶㓕恩義淪斁禮法尤可憫笑哀平末祚公卿大臣駢首就戮舅后外姓肆為異圖皆髙帝貽謀不善無以示子孫之訓故應有此豈不重可嘆哉因是而觀我朝祖宗之立國張三綱以為綱建五常以為常其於君臣父子兄弟夫婦嫡庶昭穆之間可得端拜而論矣髙帝論七或曰髙帝誠有心為萬世子孫計也當時亦有王佐之才可以共此乎曰有之在朝廷則張留侯在山林則四皓其人也留侯四皓可與有為而不為者獨何歟曰此則髙帝之失也且留侯本心盖欲為韓報仇者初無意於臣漢也方其辭漢歸韓之初為韓之心一飯不置及至韓則其君已斃於項王之手於不得已又間行而歸漢矣而此時此心終未能恝然於韓也其後從帝於緩急之中一謀一畫必雍容暇豫為帝言之帝負知人之名熟識其人於進退間矣是故折節以下之而不敢慢赤心以信之而不敢疑委曲以從之而不敢逆帝平日之待諸臣無有不用籠絡之術獨於留侯猶有古君臣質實誠信之風而為留侯者亦徳其有知己之恩且知天下之心屬漢已乆帝之勢可以平天下也於是悉心竭力為帝成就之而平昔為韓之心至是始泮然氷釋矣是知留侯本心雅不為髙帝臣也韓彭英盧於帝有鷹犬之功疑隙一開駢首受戮蕭相國雖以功名自終而械繫之辱竟不能免留侯知其然也赤松之興一動於中見幾而作不俟終日脱去軒冕如棄敝屣鴻飛鳯舉矰繳不及其胷中抱負固有逺者大者帝竟不能盡用之也且帝之論三傑於二子則名之於子房則字之此可以見輕重矣而鄼侯之相國乃舉平陽侯以自代而不及留侯焉故留侯竟不果相是何帝於天下未定則有留侯而天下已定則獨不知有留侯耶使其翻然逺舉之日帝能待之以父師之禮留之以萬世之計如成王之於周公以公其以予億萬年敬天之休者告之留侯未必不以逺者大者為帝究竟設施也惜乎帝知留侯於始而不知留侯於終也若夫四皓之於留侯又有間矣先儒謂四皓救天下拯人羣之心本與髙祖同帝已定天下則四皓可以去此言得之矣竊謂四皓之才要是帝王之佐秦不能用故寜終其身於商山之芝不肯北面殽函之地帝願屈之而不能致者彼盖度帝不過以秦漢人物待之爾是以不屑於命駕也晚年以太子之故聞留侯之言翔而後集是其心何嘗一日不在蒼生哉帝於是時誠能以欲為萬世計者端拜問之願在下風而又托之以六尺之孤寄之以社稷之重吾知堯舜君臣之事彼可優㳺談笑而辦之矣柰何其儲位方定而白駒之足倐然長往有不可得而縶歟嗟夫留侯之去帝可以留而不能留四皓之來帝可以屈而不能屈髙帝之功名事業於是乎終矣君子於是乎絶望於漢矣豈天未欲斯民見三代之治耶
