body:
  text: 臞軒集卷十三宋王邁撰古詩題九鯉湖原注湖游洋勝境也有九龍運仙人丹竈至今存焉舊傳有巨鰲隠其中仙人蟬蛻幾經年山水勝處今依然長驅九龍叱雷電髙跨九鯉升雲烟武夷九曲此幻相靈砂九轉成丹鉛黄雞白犬得一䑛翩翩髙舉紅輪邊我家去此可三舍欲識仙竈無因縁朅來乞取方匕劑要使凡骨成飛仙羣仙駢頭顧我語笑指巨鰲在深淵覔丹他日來未晩且與一釣六鰲連立夏前五日出郊送春前囘馬首絡青春春我相逢皆故人今朝出門忽失笑春如五日之京兆鶯癡蝶騃不知愁惟有杜鵑啼到曉春到園林郵傳哉藤陰次第庇莓苔願春長在人長健何惜與春歸去來墨歌寄林明叔贈君古墨三寸許君知此墨從來處溧陽石化幾千年鋼鐵臼經三萬杵昔我得之於異人使我拾襲藏爲珍我今以半爲君遺物以少貴君勿嗔來嵗八月西風裏我曹忼慨辦行李書囊無底將不去檢㸃笥中惟有此用時須留一匕餘丹墀大對要煩渠更有浯溪紀功石待問君王乞墨書黄君任景伊西上杞梓非凡材騏騄非凡馬樸􅈪不入公輸門賞駿豈無伯樂者龍泉真寳劔焦尾亦名琴張華有眼識紫氣子期解聽流水音凡物時爲之否泰横寳在道衆所愛十年讀書得一友送之西征吾意快梅花馨雪花明仙霞直上逼雲津别君不作兒女語萬卷詩書早致身柳綿飛榆莢舞軟紅塵中花如雨逢君一笑上青樓破費黄金買金縷那時君已在瀛洲而我正爲京華游便教後舉入黄甲早是輸君此一籌送洪承信儒發西上詩賦不直一杯水明經談笑博青紫兩石爭如識一丁長槍得勝毛錐子夫君稽古嵗月深雕蟲童習素所恥奮身刀劔亦借徑未能免俗聊爾耳朝來免胄翰墨場妙發穿楊三昧矢神人換鼻許正郎朱衣㸃頭相行李仙霞絶頂雪漫天快上扶摇九萬里明春躍馬白玉京都人爭看龍燒尾應笑向來㸃額人方上橋門趨劔履便須破費千黄金邀儂一醉長安市送朱典卿履常㕘學文章久矣乏正氣作者付誰傳位置天庠晩乃得朱君鐘吕一嗚康瓠棄君看今嵗大廷魁一種風骨何尫羸吾曹此名未立耳立則萬口須銜枚君今乘槎問星漢名已籍仙政何患蠶繭工夫何足籌龍墀勳業須早辦作詩贈君當馬鞭梅花送春入冷邊與君同舍我無縁天其或者須同年和毘陵傳知録送其姪得雋廣童科渥洼驥子展足長朝發燕都夕夜郎一腹如椰貯夜光揮毫落紙爛成章誦書三筴無遺忘風采聳動中書堂伯父一見金玉相聲之以詩嗚鳳凰顧我外氏出義陽沗與此郎爲雁行竊效昌黎序送童子張期子更閲幾星霜姓名金榜相頡頏聞倪尚書赴詔老倪昔以戅去國時無一語爲王留自從醫國失扁鵲民之瘼矣矧可瘳滿朝爭慕舌爲柔忍恥戴天事世仇間有一念及王事祗能低頭效楚囚漢家朝得一汲直淮南即日干戈休夷甫清談倡薄俗坐視平陸沉神州殘㓂六年汙京汴羣魚假息釜中游陛下至仁一南北天假機㑹忍不投顧盻左右求所倚張仲孝友吾故侯亟下一紙起髙卧明堂一柱清廟球書生聞詔喜不寐江左有人吾何憂翻思死者不可生誰爲中興壯其猷未必軍中有老范且乞王所容居州賀表兄傅仁仲常後院生男昔君與我夜對床知君著意選專房爲言東鄰有女寳胡不貯之芸輝堂君時爲我一慫慂以斗量金買嬌寵小君有徳比孟光不妬不嗔迴盼重懸知仙菓結子遲三年乃字玉麟兒君家多産渥洼種英物生來骨定奇莫嫌外家不足數有子端能貴其母舊聞絡秀有伯仁今見英娘生阿武萱堂一笑顔生春從此含飴日㺯孫他日公侯當衮衮鳳將九子俱青雲犀錢利市人爭覔我獨流涎不能得假饒此事卿無功不道薦賢功第一西征艤舟清洲投宿野店夜漏下數刻主媪爲作粥與同行一飽成詩君不見淮陰徹侯未得志跨下從人真短氣漂母以食拱而前心許王孫當富貴又不見文叔宏濟艱難時大樹將軍身從之一夕相顧有餒色蕪蔞之粥甘如飴丈夫自負不草草剛腸似石那能拗得時要拯萬人饑讀書肯自謀温飽諸公兼我非窮人窮途謾爾君勿嗔他年五鼎享臺饋須記此夕清洲濱就許宰求雲岫倡和集原注侍郎有雲岫堂昔者杜老夜聽許十詩爲言風騷共推激如何汗青失其傳覽杜集者爲許惜我曾得倡和之巨編暗中驚喜拾拱璧泰岳之後無虛人宗派元自一家出馳筒往返者誰歟雲岫先生詩巨擘文鸞彩鳳迭應酬響撼翠梧徹金石血駒紫燕爭追馳容與蟻封中徐疾留卷把玩不忍歸痛快差類愈頭檄應知至寳疇敢私天下有目皆願識刋之堅梓廣流行作我縣齋大奇特詩名要與宇宙齊豈比五臺詩卷逸原注許十五有五臺詩自從秋孟授鋟工跂予望之朝連夕原本下闕闕題原本起脫五句拙成可抵萬金璧從古至今不偶合如何二妙一時出僕也若調烏鵲鳴斂翅甘受黄鶴擘自從手授大雅文孺子低頭拜黄石數韻未足寫形容先生響報何捷疾兒嬌勝拾隋氏珠母喜如捧毛生檄自憐生長通徳鄉每沐達尊垂異識爲題碑刻墨未乾招入詩盟筆尤特前無宋艷與班香奄有庾清兼鮑逸嵗晚家食誰與娛持此可慰風雨夕先生自取太勞謙提奬孤寒美多溢大匠旁觀自汗顔伯樂一顧價增百琴堂聞亦有妙賡迄遣奚奴爲物色當官多是廢言詩敏手何曾妨霹靂按此兩首原本誤作一首前首闕尾此闕題并起處五句因下兩詩俱用前首原韻故並存之許宰和篇至再用韻謝陶令束帶對督郵歸來髙興潛有激昌黎縣齋飽讀書自謂此日足可惜二賢詩留天地間千載寳之爲雙璧當官不妨文字樂似此人物不時出宦海風濤縣爲甚文書束筍紛莫擘許侯敏手良不難錯節居然逢匠石寛租農扈享豐登講學如流蘇廢疾筆力重於丈二殳詩筒敏似尺一檄句中之眼獨心知貽奪陶韓少人識鄉有達尊性愛士縣榻於堂賞英特原本闕兩韻冰車雪輾笑鈍遲不爾續題尤富溢窮冬四壁坐無聊渴思一字車渠百走僕乞取稇載歸底用黄金壯顔色祗恐天上六丁聞一夜取將煩霹靂陳侍郎見激字韻和以見寄復用韻謝先生徳量萬頃波撓之不濁無湍激文章亦如萬斛泉酌之不竭何慳惜滄浪亭下把釣竿雙筆堂前看蒼璧時逢問字客及門倒屣不要人扶出飲酣戲索烏欄書吟罷笑拈麟脯擘一詩直萬雞林金衙官坡谷奴劉石得者須熏玉㽔香覽而玩之痊百疾堂堂元帥坐詞壇餘子誰堪承羽檄許侯端是忘年交具眼朗然爲賞識雲岫詩卷盈錦囊自欣邂逅有勝特先生筋力似裴公侯比香山才更逸凉臺燠館富唱酬如見古人今之夕斐然小子謾成章所美信美安敢溢有來珍翰費吹嘘展閱再三感千百當偕巨帙什襲藏寒谷先期有春色新年更擬打作碑薦福莫教雷霹靂贈術士陳談天我生之辰日在亢斗牛之宿晻無耀獨有首尾二虣星角立昴氐爭繫標一生奇蹇良苦之已分青雲輸年少每逢星史說經躔探手止之頭屢掉談天一日叩齋扉信口陽秋天下妙數靈不用蓍草占機祕時將道眼照𤣥中巧奪君平胎聖處深入渾沌竅俗人籌星亂如麻蠡測管窺工竊剽聽君談唾如秦青字字宫商合腔調如何孤身無所賞萍梗風波任浮漂正縁苦泄造化機真宰忌之神所誚方知多技故多窮凡事皆然君莫笑雖然知己豈無人試往京城謁權要一絲莫久牛蹄灣滄海六鰲待君釣贈郭五星五陵豪家輕薄兒驕傲成癖不可醫揮金買笑紅塵市老死不曉寒與饑囊螢案雪單貧士杯水生涯北窻裏途窮山鬼恣揶揄命壓人頭提不起郭君昔從先人遊萬丈壯氣横髙秋天無老眼不見録匆匆白了少年頭一日訪余道艱窶杯酒未闌淚如雨揲蓍有術金不換鶉衣百結無人補我聞君語鼻亦酸誤身直是坐儒冠英雄未遇隠於卜時人莫作白眼看贈川官五星先生談星之士如星密得似川官萬之一牙籌到手疾如飛口觜翻瀾眼波碧相逢笑問雌甲辰掀髯慫惥曲江春自憐蹭蹬負嵗月敢謂渠儂許可真明時取士非唐比忠臆不空人所恥三籌交臂輸少年只較劉蕡差勝爾川官重來話榮枯聲言温飽非所圖他時散漫遊江湖未省還能訪我無讀誠齋新酒歌仍效其體先生出奇作新酒自作自歌自爲夀酒徒若欲舉吾盃先挽天河濯渠手誰知先生詩更奇刋落陳言付芻狗俗人欲誦先生詩先吸天漿潄渠口古來作酒稱杜康作詩只說杜草堂舉世無人傳得方奄有二杜惟一楊先生此味誰能嘗却曾見此糟蟹黄一片入口風韻長餘子祗慕大官羊天公生我太遲後不作先生牛馬走低頭乞取酒百壺嚥下先生詩萬首先生騎鯨上天遊問著許儂知味否蔡實甫能酒而道中無可口者見其吻噪成長篇戲之吾祖方平至君家絲麟談笑酌流霞麻姑綽約時在坐癢處思得姑𤓰爬我今與君豈其裔彈指又經千百嵗文采風流今尚存仙風道骨知誰繼今宵月明明更多有客無酒如月何唇乾吻噪甚背癢安得玉壺瀉金波白玉樓臺月如晝屋貯阿嬌車載酒元君再㑹儻可期我當起舞爲君夀送陳君保作喆赴廣漕昔我與君俱妙齡同時充貢鄉曲英君携令名遜伯氏天性好義甚好名薄俗斗粟有徳色君視名第鴻毛輕此事今無古亦少百鳥羣中孤鳳鳴老天相知苦不早囊書匣劔猶書生累年文屋提鐵騎共我掎角參齊盟我于再戰偶得雋君雖屢衂無弱兵長鬚忽持雙鯉至短褐欲訪五羊城紅粉蛛絲期已近金灘鸂鶒眼偏明知君圖南非左計九萬扶摇第一程疇昔韓蘇行脚處一草一木被光明鱷魚久出海若避白鶴詩留泉石清葛仙丹井未湮没伏波銅柱餘崢嶸君行窺奇摘海異澆沃磊塊氣愈盈閩士南征可車載間有鐵中夸錚錚商瑚夏璉只君是此寳豈久道邊横吹送鶚書風借便殿前奏賦摩空聲當家魁相衣缽在㑹趾前美大門閎夀母一笑春生頰繡輿錦誥來將迎牽衣兒女莫惜别爲君爲親在此行計程何日到庾嶺梅花雪片飛瓊瑛魁占羣芳差易耳相期心事在和羮二十韻寄潮陽宰余君實日華昔日潮守有昌黎恩波萬頃横鱷溪五百年後得余令棠陰上與韓本齊故家縣譜熟展布砉然牛刀優割雞朞年已報三異政節愛堂扁煥新題手摩民瘼心隠痛藥石其肯靳刀圭老農終嵗不識吏廢疇荒隴皆鋤犂邑有豪俠擅武斷缿筩告訴來髫齯仁者之勇一發露愛苖亟欲芟稗稊誰爲鼠輩巧道地周道如砥生蒺藜公車未采輿人誦端士先爲横議擠朝中有語稍辨雪言者愕立惜噬臍侯朝聞命暮就道束書之外他無齎出㕓五日纔百里截鐙卧轍相提携乞留有狀白府治辭以君命安敢稽香花隨乘推不去丁壯遮拜嬰孩啼不知朝廷聞得否天下貪吏濁如泥毁譽失真例如此狂瀾既倒誰能隄書生有舌不善佞今拜東野頭須低詩成翻恨天門逺何人乞我青雲梯謝陳尉宏父惠潮陽蕉絲碑刻因求宿諾韓文寒儒食貧面四壁更苦春寒寒到骨故人天末有書來不寄綈袍寄絺綌感君髙誼挾纊温况有石刻華吾軒何時揩拭眵昏眼待看昌黎玉潔文邵武山人楊夀卿臨别索詩楚峯之下有地仙隻手把握山水權青烏白鶴去不返此郎髙舉拍其肩年来海内稱絶倡眸子瞭然通意匠巧尋地脉如良醫妙畫山形如智將髙談曾折王侯腰湖海隨身一酒瓢僕痡馬瘦醉不省術工鬼妬窮之招龍眼豹晴休分别螻蟻侯王等同穴待儂回向心地初林下班荆共君說讀坡詩先生詩筆覷天巧國中往往無曹鮑一讀快如檄愈頭抓癢底用麻姑爪千古詞林有若人誰復庸中誇佼佼當年流落見丹心懸知世道終難拗玉堂豈不願公留羣吠其如尨也狡出入風波千萬里葛巾野服混蠻獠饑來隻字不堪煮豆粥一盂粗可飽䟦前㚄後竟何成嬴得清名占箕昴與公同時富貴人名字磨滅隨蟣蚤丈夫當爲不朽計方寸莫被饑寒擾題致爽軒詩明珠積斗滿金籝時人逐臭如蒼蠅公子一過掩其鼻長物何足汙吾清蕊珠午夜鳴玉珂五侯門下肩相摩公子有腰不可折勢利不屈惟髙歌試問公子何所欲有山數笏青如玉我將致之襟袖間山若肯來吾願足淵明靈運不再生青山白雲誰主盟佳哉公子有具眼終日看山無俗情我來假館翁不靳山下梅花動詩興一語刮破俗子盲兩字清髙用不盡贈林薪原注善表背丈夫惟窮不可諱僕妾于人真短氣一技能精百不憂有功翰墨尤足貴林生家世本業儒讀書不利改傭書計窮未肯與書絶又學裁翦兼黏糊就中頗得三昧訣翻騰碑畫更竒絶持此可療寒與饑十指便當張儀舌昔我于生義理明以我之困知生貧我今一字不堪煮生猶有技可資身鄴侯書堂髙不過好事人少俗人多把筆贈生以此歌有劔無廩奈生何謝政府饋金大廷昔日曾空臆時論忌人太疎直名公正色力主盟寘之甲科免居乙殿廬今日沗校文甘言如飴心所嫉或者欲植桃李恩慨然爲下雌黄筆原注時權貴私囑一人欲寘甲科余不從頭方直是不能圓入險固應陰下石我公天下盡門生僕荷知音心感激幸無贓墨辱門墻猶免語人顔發赤感公具眼照人才墜履遺簮猶愛惜臨歸多謝饋兼金何日能爲還白璧臂鷹詩東鄰年少養獰鷹置之臂上拊玩頻呼來麾去性日馴癡兒偶然見之嗔鷹張利爪挐兒身𦕈其隻目視主人主人初以鷹爲戲一日悔欲自斷臂非我類者其心異吾賦鷹詩所以志啄木鳥啄木復啄木汝啄抑何毒千株萬株端明松五月六月來清風木于汝何惡朝朝暮暮啄勸汝利觜宜少停戕木之生吾忍聽已有弋者在後亭微蟲初何識亦能對以臆天子愛元元宵衣念艱食連年值禾饑窮閭多菜色縣官急督租吏饕饑需索啄木比刻木何者爲可疾木生與民生何者爲當恤可彈者不彈爲我謝彼弋送莆守趙孟堅汝固司舶温陵紹定庚寅夏四月侯來守莆時羣盜蜂起剜臨汀輮昭武鏺劔之順昌將樂撇泉之永春徳化踣漳之長泰龍岩莆距賊壘三舍而近人惴惴不寧居侯明號令布方畧事有切於保障者不吝費不愛力治下有惡少乘間竊發者斬以㣘懸金募得賊間諜數十人夾以砧斧膾醢之盜聞風不敢犯境報政之五月被㫖移鎮温陵莆人欲借留不可得遮道祖餞者相屬水仙王某作爲歌詩拜于馬首以明稱莆氓之志云君不見有唐元結守舂陵湘湖一道盜縱横獨元所治一無犯鎮撫孤壘如金城又不見祁公曾作乾州牧移鎮鳳翔何迅速兩州之民境上爭先把州麾後鈞軸使君来莆全似元精明旗幟張轅門威風恵雨相劘拂䑕輩不敢闖吾藩使君去莆仍似杜截鐙遮留喧道路吾莆赤子方有依泉何爲者爭吾父我將軟語勞莆人此地幸與泉爲鄰刁斗相聞鄒近魯瘠肥不比越視秦使君風采壓人望莆亦倚泉爲保障渠魁縛致藁街前四野腥膻行滌蕩長淮以北多風埃社稷正倚經綸才出平西賊入衮繡一韓一范何人哉書生自顧老無力不能從公取俘馘願將詩頌紀中興濃墨大字書浯石惠安賴惟允汝恭乞崇清老椿芳桂四大字爲賦二詩混元盤古為之母汗漫安期為之友枝條上掛蜺連蜷刼火不壊其天全雷雨不驚其生厚春秋巧歴莫能知知我者有䝉荘叟君持此物為親夀老陳作字光摩斗人兮椿兮共長久蘂宫仙子携黄雲挼之成屑來繽紛百和天香兎爲擣蟾蜍竊之從月奔色香假合成此樹天上香飄天下聞花神乞種到后土䝉天一笑移其根知君腰有補月斤斫取髙枝揚逺芬留其賸者遺子孫代賀崇清陳侍郎正仲讜誕辰時年八十一曾夢乘槎泛銀潢不遇張騫遇東方爲言神仙事渺茫仙府不在白雲鄉丹台幻作儒珍閣蓬島飛來雙筆堂鶴車千乘集雲軸玉塵萬斛紛雪香是中仙翁永難老嘗侍香案近玉皇歸來手握山水印傲晲羲昊輕軒裳新詩醉墨美無度奄有元白兼鍾王身在巖壑心廊廟絲鬢垂頷顔蒼蒼與公同時一輩人半隨蒲荻零秋霜元老崔嵬獨山立嵗寒不改雪中篁九月十五夜未艾長庚伴月光煌煌台星夀星合爲一今夕何夕見此祥翠娥滿引九仙醖菊英入盞宫様黄珠明玉潤陪笑粲起舞璫佩鳴丁當李蹊森森密無縫佳句往往溢詩囊我於門闌最晩出瓣香致禱意則長如聞郡國事方殷須起老手爲平章待教衞武了相業方許潞公歸洛陽温陵萬安橋謁忠惠蔡公祠堂留題欲知公之忠須誦三諫詩欲知公之惠須讀萬安碑朝廷得公重天下失公悲騎􅚪今幾年悠悠人見思今人愧前脩風流不可追立朝無剛容突梯仍脂韋字民乏廉聲敲扑急繭絲不知富貴有磨滅芳名姱節無窮時遊子晩出公之鄉兒時斂袵公清規吁嗟九原不可作每於清夜夢見之所以今日拜公像浩歌出門雙淚垂和致政林存齋稚圭東鄰南極老人星音吐洪亮眼晶熒諸郎箇箇佳寧馨長者早占千佛經仲季銳如刄發硎三珠粲爛照户庭老人散䇿傲郊坰健筆哦詩驚六丁仰天髙唱雨霖鈴餐和毓粹養靈扄煉得元身如鶴形文堂縱談耳驚霆硬語盍作盤盂銘笑渠教諂兒懶聽只今人物混渭涇賢者聚散類梗萍報復未已况調停我狂畏暑卧風櫺日夕西望憂朝廷何時乾坤得清寧未信日月長昏㝠不必餔糟學獨醒不煩餐菊制頽齡支駕皇輿待騋駉問訊誰坐東西㕔老成自昔有典刑尚父須符渭卜靈贈蕭棠仲致政昔年鼔篋游膠庠集英同日曕天光金門初開獸環動曈曈曉日升扶桑宫簾髙捲開御扇祥風習習飄天香殿庭神麗冠劔肅巍巍玉几臨中央銀袍七百趨龍尾拜恩稽首心歡康晩從銀臺出廣陌寳鞍快馬爭騰驤國司涓日叙黄甲義比天倫鴻雁行瓊苑宴開慈惠浹宸章寵錫歌明良原注賜詩有相求自昔屬明良之句後來相繼隨宫牒東西南北遥相望萍開風轉有時合邂逅一見難預量非才叨竊愆咎積自顧補報無毫芒朝廷寛大不終棄領郡尚得來南漳下車問政訪耆舊知公辭榮歸故鄉神武衣冠已久掛㝠鴻羽翮方髙翔遺賢雖爲明時惜承顔獨喜私願償共驚嵗月何飄忽相對鬢髮俱滄浪至言不吝揮玉麈妙句屢䝉開錦囊已歎髙風激貪懦更敦雅契超尋常區區感慰豈有極聊寫一二成短章蕪音不足繼真作讀過幸勿留巾箱春月白鶴吟寄魏鶴山鶴去兮渠陽雪衣兮相羊啄芳洲兮飲碧湘如青城之棲兮流矢中傷鶴來兮錢塘朱頂兮昻藏浴太液兮下建章如九皋之唳兮聲徹上蒼鶴歸兮臨卭之崗嗥朔風兮立曉霜捫參歴井兮水雲鄉如遼東之返兮華表飛揚昔者去兮狂梟毒獍相賀乎偃月堂迨其來兮文鸞祥鳳相得乎漢未央今其歸兮馴鷗狎鷺相待乎午橋莊善類無依兮若空乎振鷺之行留行無語兮誰扼乎羣烏之吭歸去來於鶴何加損兮闗世道之否臧有雁兮南翔翼短兮心長避繒弋兮飽稻粱望胎仙兮天一方思蹇産兮結中腸此仙之夀兮未易量天若祚宋兮當復來而爲治世之祥按此詩語意是魏了翁既去官而以詩寄懐也考宋史魏去官在邁罷漳州通判後故叙次在此後題聽蛙軒詩語意畧同題聽蛙軒原注方審權詩人也以此名軒白杜詩人大方家詩兩牛腰書五車髙談世事坐捫虱大扁丈室名聽蛙我見東野低頭拜三年未了聽蛙債蛙有何好君賞音從黽得蛙自尊大君胡不聽髙岡丹鳳嗚又胡不聽華亭鶴唳聲答云二物不間出吾與此蛙别有情年來鳳去避矰弋梧桐其棲竹其食有時伸啄鳴朝陽反被妖烏豪鷂擊鶴亦逺引歸遼東無縁得近華清宫縱嗚九皋許嘹唳流矢傷翼愁天翁不如且聽蛙聲好喚囘夢覺春池早縱饒翡翠上苕蘭差勝蛩螿啼露草王子掉頭曰不然夫君標致如胎仙富家有子比雛鵷吾道豈得長迍邅不妨少待兩三年一鳴驚人飛冲天羣蛙蜿蝡何足憐棄置官池任啾喧栢梁體簡龔少益青山四面畫圖張溪流月下鳴湯湯山之下兮水之旁有人結茅作書堂誦聲灑灑流琳琅使我一聽樂洋洋應問誰爲師匠良風流相種如龔郎天孫付以錦繡腸一揮十紙爛成章上與奎宿爭光芒器成未售此焉藏吁嗟無地堪翺翔塵纓自濯歌滄浪床頭金盡羞慳囊山鬼吹燈夜恓惶蚊雷聚噪肆頡頏仗劔起舞涕泗滂勸君停劔無庸傷時平賢路如康莊鸞鳳引喙鳴髙崗時危此道隘且荒横寳在道暗無光運行如此休慨慷男兒立身當自强精金須經百鍊剛膜外榮枯等粃糠惟忠惟孝不可忘請君傾耳聽柏梁謂余不信來對床謝阮儒隠爲畫墨梅床屏畸人平生偏愛竒愛梅成癖不可醫書帶堂前忽見之相羊不去燃吟髭今夕何夕秋爲期芙蓉映日紅葳㽔籬菊傲霜紛離披南枝春信未有涯安得此粲對酒巵元是大阮解作無聲詩寫梅幻相爲娛嬉想當解衣盤礴下筆時吸取清氣入肝脾先融雪嶺作墨池坐變秋陽成春暉使我初見渾不疑旋覺風骨全是顔容非恍如臙支馬上坐明妃緇塵生汗白玉肌又如鴟夷船底載西子烟波慘淡雙蛾眉雪堂仙去𣺌莫追補之位置傳者誰君今此寳世間希芒端寒燠巧推移花神上訴真宰悲何爲苦泄造化機我有東絹滑如脂裝潢爲屏作枕幃平章衆畫何品宜笑我嗜好與君相背馳不愛崇桃積李鬬芳菲請君快掃横斜竹外枝嵗寒心事正要渠相知觀獵行落日飛山上山下人呼獵出門縱步觀無遑需屐屧至則聞獵人喧然肆牙頰或言岐徑多御者因追躡或言御徒希聲勢不相接或言器械鈍馳逐無所挾或言盧犬頑獸走不能刼余笑與之言善獵氣不懾汝方未獵時戰氣先萎薾弱者力不支勇者膽亦怯微哉一雉不能擒虎豹之血其可喋汝不聞去嵗淮甸間熊羆百萬臨危堞往往被甲皆汝曹何怪師行無凱捷嗚呼安得善獵與善兵使我一見而心愜梅花吟君不見山前山後雪成堆朔風撼地聲如雷孤根忍死受寒凍須作百花頭上魁尋春遊子不愛惜馬蹄踐蹂花狼籍芳姿不肯被消磨飽盡炎凉方結實實成始得主人知進登玉陛調鼎胹那時滋味甜如飴無忘霜風吹折時過建陽范氏桂林館見其向日娛賓亭館已屬他人詩以弔之桂林當日如春煖花木清妍差可款主人好事玉泉香行客留題錦囊滿桂林今日如冰寒頺垣壊壁他人管窮冬莫贈范叔袍過午誰餉子桑飯君不見李家偃月堂金魚玉珮嗚丁當冰山一倒扶不起月固無恙堂已荒又不見董家藏金塢翠幕珠幃貯歌舞誰知當時賞心事不救後來燃臍苦請君聽我吟桂林悲歡成敗更相尋人生富貴如郵傳古往今來幾桂林
