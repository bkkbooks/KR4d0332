body:
  text: 臞軒集巻五宋王邁撰序記真西山集後序先生壯年游蓬山直鰲嶺立螭坳每上一諫疏草一制誥朝大夫與都人士争相傳冩出而駕使軺暨開大藩府凡嚢封驛奏之逹於上若庭諭壁戒之布於下者鋟梓一出深山長谷窮閻委巷之氓烏蠻象郡風帆浪舶之賈競售之如獲至寳中間勇退閒居執經問難於共極之堂徴銘乞誌於學易之齋有来自岷蜀萬里者於是先生之文流布人間知味者皆得而染指矣某壮嵗從游今髪種種得所為文最多嘗口誦心惟而躍然有得曰窮理以致用者先生之學也修辭以立誠者先生之文也其陳仁義以告君也直而婉正大而不迂一片赤誠對越無愧其所謂上帝臨女無貳爾心者歟其代王言以戒百官也戒休董威意在言外或舉一以勵衆或嘉始以責終其所謂無有師保如臨父母者歟其頒教條於所治也本其風俗諭以理道歴歴皆肺腑中語其所謂心誠求之若保赤子者歟至於訓教子弟私淑其徒辨析理義之精微條列學問知行之次第叅之周程先儒之書又㡬於集儒先之大成者也先生言語文字足以感發人心皆其誠之不可揜者某分教眡邸乃裒所蓄數巨帙與寓客莊君元戍編類而是正之刋二十餘卷惠同志或難之曰昔人有削藁之義流俗有近名之嫌子之表章斯文得無以名為先生累乎某曰不然昔涑水司馬公自叙其文以為中藏之志造膝之言不自叙之他人安得知之不以近名為諱也先生脚踏實地如涑水公而斯集又出於門人弟子之編次四方人士之所願得於先生乎何累難者辭塞乃綴其語為甲集後序端平之元夏五月門人仙游王某書清漳文會録序禮有來學而無往教教而至於往道之輕甚矣拾經生之陳言綴史氏之腐説聞者望望而去則其取輕也固宜今吾友徳載之講本朝典故也紬繹乎瑶編寳帙之文採摭乎稗官野史之紀參之以元夫鉅人崇論閎議而以已見斷之所至臯比一設朋簪翕隨所謂不即人而人自即之者孰得以議吾道之輕哉漳為諸老講學之地風教所漸傑乂軰出德載毋謂邾小而易之解頥之譽折角之嘲二者必有一於此丙申臈月序胡文定張宣公二先生祠堂記道德性命之學自孟氏後傳者失其宗國朝周夫子始唱于道之濓溪程張諸儒廣其傳為關洛學潭於道猶洙魯而近獨未有䟽導濓溪一𣲖以澤湘人者崇寕間胡文定以提湖南學事道出湘鄉遷縣學於東南隅淳熈間張宣公帥桂林迂道訪文定舊迹進諸生而教之於是師友淵源泓涵演迤得眡關洛嘉定已邜邑宰林侯得中實来知所先務顧瞻芹藻為舊甘棠慨然嘆曰禮言祭有道徳者于瞽宗謂國學也傳言祭鄉先生於社謂鄉學也惟二先生既蒙謚於朝瞽宗祠典必以次舉而是邑典刑模範近接耳目若不以義起禮立祠學宫是忘二先生所以私淑者方與學職共籌之會邑士蕭君佐以其事白於計使趙公汝譡公忻然出帑金捐材木慫慂其决庚辰秋祠堂成明年林侯貽書囑某為識某竊惟文定之於伊川先生盖聞而知之者宣公之於五峯先生盖見而知之者其學以忠孝為本而敬以行之筆之於書授之於徒語小辨析義利毫釐必謹語大功用宏闊人紀頼以扶植當其時不惟學士大夫得所矜式而閭巷小民亦相戒不為不義至今經行之地遺迹未陳詩書之澤囦乎漣水不足言其深也教學之功崒乎鳳山不足言其髙也且自崇觀以来公卿逹官追趨逐嗜不知其㡬至今人猶羞稱之惟文定公在仕版四十年實歴不盈六考宣公蚤被阜陵知遇駸駸大用竟以排權貴去國一時禄秩視徳弗稱百世之下清風凛然士之藏脩息游於斯者盍知所擇矣侯三山人擢壬戌進士第雅志好修學之大成殿與從祀两廡悉更新之外植門觀尤壮偉是祠之建其詩所謂髙山仰止景行行止者歟昌化軍修軍學記儋去京師萬里聖宋承平時蒙被文教得與郡國俱立學學在州東南隅南渡初遷之城西紹興辛未太守陳侯適復於舊址參政上虞李公嘗記之又四十年葉侯元璘從邦人之欲即蘇文忠故居斥大之為新學樞宻莆陽鄭公復記之是時試于有司纔三四百人耳旣逾三紀士風日衍属永嘉潘侯来領郡簿書細故不暇省首以疇昔所得諸老先生之緒言進諸生而教之先之以孝悌之義申之以禮樂詩書餘力則及於課試之文眎其業之精進者時加賞異州民以家無絃誦聲為恥黎洞亦遣子来學每季攷不下二千人侯樂其教之成顧屋老若壓慨然更新之御書有閣三賢有祠外儀門内講堂旁直舎齋序下至廩庖帑湢百圮俱舉増光前規經始於戊子之春越六月告成糜緡錢若干命郡從事陶君髙董其役學職鄭振龍許震以書述顛末求某為記某復之曰韓昌黎不以十室之邑鄙潮人而為之立師儒之職柳河東不以九夷之居陋柳人而為之新先聖之祠厚之至也今潘侯以鄒魯待儋人而人亦以鄒魯待其身意度休美追二公而躡其蹤潮柳經二公品題文物得與中州齒儋雖海外郡泉石草木一蒙文忠公藻黼所謂我本儋耳民寄身西蜀州之句邦人至今誇詡之風流醖藉多所沾丐大觀宣和間已有登名春官官至二千石如符確趙荆者霜鐘氣類隨感輙應自今藏修息游之士誦公之文章可以當制誥而潤皇猷慕公之名節可以重朝廷而垂来世豈非侯所以期望爾儋人之意歟侯名子順儒雅好修一以惠飬為政郡舊有嵗發銀綱官以半强覈之吏吏轉以病民侯悉以官錢輸送聞之諸䑓永為定式力行好事類此而修學之役尤關雅道之大者是以喜而為之書仍系以詩曰曲江九齡日南公輔天之生才豈限鄒魯昔蘇長公戴道而南至今奎宿猶照於儋儋之學宫惟以舊宅誰其新之潘侯之力新學之遷垂四十年昔四百士今焉二千斯文之脉如地出泉愈浚愈有儋人勉旃書田有秋爰耕爰播藝圃有芳爰采爰芼龍躍雲從鶴鳴子和我歌此詩為儋人賀潭州善化縣尉司新廨記官無小茍以家事視官事者皆可書善化特長沙一寛鄉耳紹聖中始析而為縣因鄉以名之于是省長沙湘潭二丞為之令省長沙東尉為之簿至于尉則獨無所省于彼而不得不為之官夫以始立之邑剏置之官則其力必不暇致美于一廨今廬陵湯君克誠秋視篆而冬惟築非以家事視官事者其孰能之廨舊在定居門外浮屠逼于旁神祠殿于後于隂陽勿協且厥壌卑濕屋老棟橈居者為之不寕君始至僦屋以居亟請于州丐遷于閱圃中之隙地大帥文昌葉公可之建屋三十楹糜金錢五十萬郡邑無絲粟助編户無分毫擾皆君出力為之獨有樸士唐世英者嘗徳于君推吾儕猶有闔廬以辟寒暑之心以木之堪為杗棟榱櫨者四十株樂輸之以相其用廨之成實嘉定辛巳三月之朔也凡廨葺舊非難舍舊而圖新為難世之穹官顯宦月俸盈車尚間有視官宇如傳舍勿支勿補謂無預吾事者尉俸入㡬何雖苦節猶不足于用又其職比他曺其事尤夥警椎剽捕竊攘察訟繫長吏文檄無虛日居官者懼不給命不免于戾而何堪此役今君費已以寕人勞今以佚後其心犖犖與流俗不同于此可得其槩而世率謂官小者不足以行志自君視之其然豈其然乎余于此抑重有感也好善惡不善天下人情本不相逺茍一毫不安于心不改為之不止可欲之善最于此乎見之今少公之廨地則更淤洳而為剛燥矣室則更偪隘而為髙明矣湯君又能夙夜振職凡政之不便于民者悉禀于長而更新之後来者觀室則念君之恩勤一日必葺觀政則尋君之矩矱一利害必究心庶無負于君今日之所以遺後人者不然其室日新其政日陋玩愒書滿翩然而去寕不愧見于壁門之記云宜南亭後記赤湖留君肯翁之先世以宜南名其堂大丞相魏國公為之記堂乆而圮遺址尚存記亦無恙肯翁懼墜先志更而亭之且作歌詩與宗人及賔客相酬和一日以前記并詩巻授其姪玊汝示僕曰前記舊日堂中之觀耳今所謂亭者風景不殊而規模頓異子其為我申誌之僕不克辭乃言曰書著肯堂之訓易垂克家之文重繼志也留君先世剏敞斯堂棟宇宏麗雄視一方嵗月寖逺屋老且蠧視昔弗類君任幹蠱之責不求大于前人而必以有餘不盡之意遺子孫入窺其所藏則籯中之金雖貧而架上之牙籖森如也出視其所陳則盤中之苜蓿雖髙而砌下之芝蘭藹如也以今之亭方昔之堂雖不為侈而故家文獻則日新詩書禮義之澤則日衍也兹非善于繼志而又望後来者之繼其志歟吾知其後必有髙大門閭而增廣斯亭者且南為温厚之氣主仁為文明之方主禮君子以仁禮存心行之于已風之于閨門族黨之間而逹其道于天下仁之始也為父者慈其子為兄者友其弟禮之先也子之以潔白者養其親盡誠弟之念天顯者事其兄盡敬小充之則化一鄉為通逹大充之則薫一國為善良又大充之則可使天下被堯舜之澤而比屋陶曾閔之風也詩曰宜其家人又曰宜兄宜弟記禮者釋之以為宜其家人而后可以教國人其為父子兄弟足法而后民法之也宜南命名言外之㫖或者其在兹乎清芬堂記惠安謝桂卿娶赤湖鄭氏其氷翁于其所居敞一堂制度甚古下植桂一本甚蕃上書清芬二字為扁甚澤盖取鄧公肅巖桂詩清芬一日来天外世上龍涎不敢香之句鄭君知桂卿與僕厚善嘱之求文為記僕語之曰子不觀夫堂下之桂乎桂秋而花秋之為氣清花發而黄黄之為色正非松非竹而柯貫四時非蘭非茝而香聞數里吾嘗比徳于君子焉清者君子立身之本也芬者君子揚名之效也芬生於清身驗於名采薇餓夫髙風萬古胡椒八百斛聞者掩鼻而過之自立于世者宜知所輕重矣鄭君寺丞之後塚木拱矣其祖父以清白遺子孫是以其子孫愿而文其族緒衍以大清之功用于是乎驗鄭君學世其家有子為後来之秀繼自今必能力學攻文重班馬之香摘李杜之燄而為一身之芬必能取巍科躋膴仕采秘閣之芸握粉省之蘭而為一家之芬又必能仗節義報國家垂名畫龍之旂勒勲函牛之鼎而為千萬世之芬種徳有後子姑俟之仰斗堂記寺正孫侯守潮之期年重建思韓堂以復陳文惠之舊觀而竭䖍妥靈意有未竟復營一區名曰仰斗繪文公之像而祠之馳書京幕嘱某以記某竊惟文公以剛方正直之道不行於時而盛大光明於百世之下潮其所治之邦也始公以諫佛骨去國出秦關過商洛經繞霤之境渉樂昌之瀕記驛堠之送迎感瀧吏之酬答閒關萬狀甫抵於潮突未及黔首崇教事亟聘趙子為衿佩師自出餐錢以優廩餼崇孝悌之行興禮譲之風眎翁于蜀方兖于閩力勞而功倍之霜鐘感召氣類相求四百年間魁人韻士間見層出遡源揆本實公玊成潮人尸而祝之社而稷之禮眎經祠罔敢少墜韓木葱欝為公甘棠韓山岧嶤為公泰華異時杖屨經行之跡埋没于烟嵐荒草之墟必表章而出之殘碑斷碣片言隻字流落人間者雖庸儒亦知指為至寳而有民社于兹土者頋以簿書期會為急至于景行前哲尊尚雅道或以悠悠示之今孫侯為邦知所先後新泮水之輪奐敞四齋之髙閎於仰斗之旁為之翼室以名勝墨加龕于壁間與斗争光相扶不朽非以崇化勵俗為心其孰能之嗟夫維斗在天實司七政其在人也位輔弼職樞機公以直諫取忌于時不克致身此位然位也者雖非公所得而致道也者乃公之所獨任大歴正元間文士相望如繁星之麗天獨以身任道表表其間如衆星之有斗以彼較此所得孰多當時與公齊名柳河東一人耳序其文者亦以五星在天譬之其文同其不得位同其道何如哉使公少詘所學以伸其身上相台衡可坐而致浮雲富貴君子羞稱之然則公之所存與後人之所仰公者果在道不在位矣潮人徳公之深孫侯慕公之切竊意堂成之日侯齋明盛服帥諸生而拜之公其亦御風而来下乎侯名叔謹臨漳人名父之子博雅好修力行好事有惠教于潮人與某為丁丑同年既識其顛末而復系之以詩曰天有斗兮運帝車世有公兮握道樞異端孛彗兮吾道分公以原道一書開其愚羣邪熒惑乎君心兮公以佛骨一表觝其誣維潮壌地褊小兮盖斗絶乎一隅公掲斗柄以照臨之兮隋和簸弄乎月珠至今文物鼎盛兮與中都上國而齊驅有羙人兮公之徒為此堂兮置生芻公其騎鯨而来游兮去之四百年其如初朝陽齋記湘鄉少公黄君遇卿至官之三年出已俸治所居廨㕔事之東為齋面挹鳳山以朝陽名之貽書於僕謂耆老相傳嘗有鳳鳴其山因以取義且徴一言以申廣之按詩言鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽説詩者曰髙岡顯地梧桐嘉木鳯凰之所棲集而日出扶桑杲杲而上又其中心之所傾向引喙而鳴有不容遏止之者士君子秉清忠耿亮之操平居則愛君憂國如藿向陽立人本朝翔而後集則直言極諫表表然以風采厲一世皆此類也君蚤游帝學有志事功既第来尉兹邑不敢鄙夷其官夙夜振職行好事如耆欲爭人命如捄頭然僕在幕府時見邑民有周氏者誣其從叔以大辟又有蕭氏家二㓜子㳺水而溺或訐其後父弃殺之二獄一時併發君被檄往灼見情偽義形于色曰吾為囚求其生得之矣於是抗章䑓府力辯二獄之寃訐者以危言相恐君不為動後得實皆如君言囚拜於庭感泣而去嗚呼聖賢所謂君子之仕以行其義者非君之謂歟充君平反之心他日辯是非曲直於軒陛之前其有立也孰禦則其以朝陽名齋實君志也抑僕聞之鳯鳴於有道之國當漢時黄霸為潁川有異最鳳嘗一鳴及唐陽城為道州韓愈氏送何堅歸于道賀其邦君之賢亦以將見鳳而聞其鳴許之今毋自欺齋真先生出帥湖南以仁亷公勤勉属吏以孝友睦婣訓士民而為之僚属如黄君者又賢而有守如此鳳當為集而鳴焉僕於君同年同官同道而所見亦同故喜而為之記泉守真公申請宗子給俸記國家駐蹕江左以西南二宗舊在雎雒者寓于福于泉計其籍之衆寡而廩之所以衍皇支夀國脉也置司之初𨽻于南邸僅三百四十有九人嗣是若木之枝日以蕃楙按舊籍至慶元已四倍今日又七倍之方生齒尚稀而有僧牒之頒部使者有緡錢之助費出於州者無㡬迨仰食益衆供億之數宜加於有司者頋從而損之於是州之所出嵗凡十四萬緡矣方承平時號為福州通融相濟未覺其乏二三十年来公田多隐占而常賦缺商舶困誅求而課息虧異時使家移隣邦之財以補不足者又第朘减而計口需俸方日来而無窮研桑復生未易為計郡縣始以一切從事有預借有重催甚至罰平民之金籍富室之産以應期會紹定壬辰冬有詔建安真公起家臨舊治千里稚耄褁糗郊迎如赤子之見慈母公甫視事亟訪閻閭疾苦苗耨髮櫛之明年春吏白宗子俸頻未支雖殫諸帑猶不贍公為之憮然曰吾誠不忍坐視公族之嗸嗸待哺也而重斂以瘠吾民吾滋不忍焉亟馳驛以聞嵗丐僧牒百通濟兹費玉音俞之僅予其半公申言郡不可為之狀會上親政户庭無壅仲冬已未除公帥閩庚申有㫖悉如初奏徳施霈然財似天雨合邸内外驩呼如雷設道家醮以報上恩眡天聖中澶州佛老會故事屬前茅將啟行知宗正事彦侯招羣公子而告之曰千羞百體一時之賜也而不可常長衾大枕一室之樂也而不可廣常其賜廣其樂孰若今日之懿乎圖有以侈行葦之仁紀甘棠之愛盍立石于邸庸詔百世以某在愽士職宜書某竊謂時方多事軍國百費毛舉四方郡牧上計簿貢賦以佐大農用度廩廩焉懼不給於命今公以郡計之不充民生之不易反徼惠于上而報可至再曽無留難公何以得此於朝廷哉惟我祖宗以仁立國培固宗城愛養邦本無所不用其極而親親仁民之道公昔在經筵嘗為上懇切言之上知公心乆矣故至是而言易入始公之未得請也朝夕焚香黙禱寢食為之不怡暨命再下喜見顔色先是屬籍齒長而未益俸若嫠獨無所歸者今皆使之遂生生之樂然則上從公請愛枝葉以庇本根其仁如天矣繼自今相生相養於此仁之中要當體上之仁所以愛我者而厚自愛焉毋作非毋悖徳毋狎宵人其行已必慕間平之行義其事上必効旦奭之忠敬庶㡬無負聖天子賢方伯之徳意不然一飲一食寕不媿於戴履云晉江軍儲倉記晉江於泉為壯縣紹定初盗起潭飛磜七聚騷動永春徳化俱受兵晉江在二邑東南隅於是嚴保障警斥堠募兵卒以備禦之用度鉅而帑藏竭故有以傷錦去者仙遊鄭侯鼎新實来時盗方平而邑已凋弊侯乃紏覈版籍之缺逸檢柅吏胥之隠謾撙裁費用之浮冗朞月間僅僅有序會永嘉方公俌以官僚司庾事目擊民痍惄焉如擣嘘龢霈潤用補燒痕有寕化李君順甫請于䑓欲帥屬邑各立倉峙糧榜以軍儲為不虞備公下其議于四十八縣縣皆縮朒未之應侯獨禀承惟謹當縣計赤立百費毛舉圭積勺累得米若干列為廥庾别以仁義禮智信之號宇于㕔事之西偏出納則委丞佐值米翔貴减值以糶樁其鏹俟秋成復糴如初數雖不夥而意度休美能始善以勸来者是為可書盖自邠之積申之峙不見於後世縣鄙州里蕩然無備轉輸千里率十餘鍾致一石者有之近日桴鼔鳴官驅疲民輓餉于道頳肩雷腹纍纍相望盗得以甘言厚幣誘之為舟中之敵然則是倉之建先寒而索裘未雨而徹桑非為政者深長計歟然事功之難成非病於下言而上不行則苦於上作而下不應而原其上下交相扞格之故正坐於周官之以公滅私大學之以義為利者未嘗加明辨篤行之功爾今是役也一尉言之方公行之不曰謀不自己出而以下僚出位言之為忌也部使者作之鄭侯應之不曰衆皆遲於稟命我不可先衆人而犯其難也非明於公私義利之分者其孰能之侯乆游西山先生之門先生嘗傚朱文公之法立社倉于潭䂓畫燦然垂惠無極侯宰百里厥施未宏推而廣之良多善政縣廨有問政堂大書魯語言政二十二章於其間余一日登斯堂指其末章所謂因民所利而利之者以語侯曰軍儲有倉庶㡬此意其亦五美中之一歟侯曰子知余心冝為余識其事遂條顛末以申告後人増廣而輯續之俾勿壊侯繇太學登癸未進士第不七年脫選調盖所至有聲云息庵記大丞相正簡公之弟泉卿吉徳君子也晚作夀藏于府居之東附庸一庵名之以息崇清侍郎為書扁以其壻洪思義于余為中表求文識之余三以固陋辭不可乃申繹其義曰知息之説者其知道之所存乎東方既明憧憧而起朝名市利野耕道販及暮而歸百動皆止此一日之息也春律肇始世故一新夏暑秋潦動勩萬狀及冬而休優游卒嵗此一年之息也少而稚騃求欲無厭壯怙血氣與物為敵及老而安復命歸静此一身之息也雖天地亦然迅雷疾電俄頃交作飄焉歘焉觀不容瞬大雨且霽悉斂于無狂濤巨浪經由百川澎湃而來若號若怒及赴諸海寂然方平凡此者皆天地之大息也惟有道者能知之不以吾有限之身與彼之無窮者相剽相撃相靡相刄而不止也是故御神氣以游太和調天均以禦外物神動而天隨體充而宇固方其酬世接物不將不迎則雖不息猶息也及乎觀性之元求我之始復與造物磅礴為一則雖息猶不息也今葉某生長相門壯嵗就舉覔官輙不利乃頓悟而浩歎曰是皆伐我之樸素而溷我之清明者也蕉鹿存亡塞馬得失何足離跂攘臂于其間哉于是弭節此庵以娛暮日而以息名之非真有見於道者其孰能貫生死于一途等千古于一瞬乎人皆知公以息為息而不知公以不息為息若謂公之名庵止於莊叟失我息我之義是舟之刻雖存而劒已不可索矣謂余不信以問𤣥冥參寥之徒盤隱記温陵陳君磊於所居石城山之後斥地為堂名以盤隠又即山之腰而亭之以今崇清先生大書石城山三字榜其上斯堂斯亭之左右前後竒觀不一為清玉峽為清雲軒為山齋為雲谷為學稼為雙清為環翠為海闗取名之義或以物或以意或以水石而以山者居多其地四面皆山葱翠欲滴有騰而薄太虗者有俛而瞰重淵者有藏貯草木如飣餖者有吐吞煙霞如饙餾者水如鏡石如玊花卉異品呈巧獻狀怪松如蟠虯修竹如琅玕酴醿堆架芙蓉出水深紅淺白如妃嬙之粧繞砌芳蘭萬本異香襲人如佳子弟雪天梅花盛開清標雅韻又如羣仙綽約聨縞裳而朝蘂宫也陳君以瀟洒出塵之姿徜徉容與於其間自目曰盤隠主人王子一日見而訝之曰君真隠者也抑身隠而心未果於隠耶抑口隠而心未必甘於隠耶君族於泉為品丁舊家登巍第躋貴宦者代不乏人矧今栘蕚通籍於金閨葭莩䟽華於翠節閥望岧嶤如許君又春秋方富敏於才而豐於學功名富貴来迫君不相舍君焉得而隠僕敢有問陳君笑而不答王子抵掌而言曰大丈夫之所謂隠者我知之矣磻溪一絲風南陽一犂雨一旦投綸釋耒而興姬復漢如取如携此士之始於隠者也坐緑野而友化人游洛園而傲造物囬視貂蟬之貴鐘鼎之榮如太虗之一雲者此士之終於隠者也盤隠乎盤隠乎今日非君之蟠溪南陽乎他日非君之緑野洛園乎君毋誑我後三年石城山靈能移文以及君矣言甫既陳君未有以對適有客闖門曰王子之言然於是泚筆而為之記進士題名記清漳乙未進士題名郡判先立石之三日謁某曰是舉也子嘗與南宫校藝今丞兹郡冝有一言識之余謝之曰余贅丞也言之得無贅乎諸君請愈堅乃諗于衆曰士之致逺於當世者器識以先之文藝末事耳士之所為不朽於来世者名節以基之科第假途耳漳先逹繇進士位公卿侯伯如晴霄之星余獨於器識名節中得二人焉元豐之吳公可權與紹興之髙公彦先是也吳為張天覺莫逆交張當國或慫慂見之吳義形於色曰吾遇張公於放逐中相與言忠義事今可呈身求進乎髙對䇿忤君相上書陳十漸廩廩乎古之遺直嘗語其徒曰富貴有時或來名節虧則一身之事去矣吁壯矣哉自國初至今此州科目得士二百五十餘人獨二公所立光明俊偉一言一動可為千載矜式則今已第之羣英與方来之魁人韻士盍知所興起矣某始受教於西山真先生得讀好書作好人六字併以此與諸君勉之仙遊縣傅氏金石山福神道院記金石山福神道院仙遊傅氏所造也經始於建炎之庚戌績成於紹興之丁巳中間拓地増屋者不一淳祐癸卯而後嗣孫蒔囑甥王邁為文以識之金石山者何以少師公得名也曷名乎福神道院公之子䕫漕作堂祀先而寓名乎福神也初少師公未冠試廣文館為第一從古靈先生㐮游時墻屏問道千餘人先生獨曰傅元通金石人也以女妻之熈寕王吕銳於變法道路以目先生屢為神宗言新法撓民非便不聽則具䟽争之公所親告公曰時相得君方專上方舉國聽之先生力詆其非必犯九關虎豹之怒子於翁壻間宜諫止之不然禍將及子公正色曰吾師之道正道也彼相之説邪説也以正道闢邪説吾徒當相與張而大之矧可諷之小貶其道乎告者語塞公且為潤色諫䟽以明稱王吕之罪遂為所惡暨鄒道卿以諫官言事得貶章子厚使人極之於其所往平生故人望望去之公義形于色曰不負楊臨賀者何人哉竟厚贐鄒公之行坐是免所居官踰年鄒得生還公亦被召曽布牢籠之以助已公守師説不為之動布力擠之於是有亳州之命矣自是黨論日熾端人莊士之子孫俱罹禁錮之禍公以徽廟舊學僅免竄逐竟抱杞天之憂薨于亳葬於常之宜興朝廷賜善權山廣教寺以資㝠福䕫漕以公故浮沉州縣二十餘年不敢背教忠之訓以求合於權門也嘗仕括蒼乘桴而還遇風濤洶湧衆舟俱覆顧瞻對岸有北方正神之幟植乎其前若有物扶之以濟於險既歸仙遊毎食必下淚曰吾親松楸在三千里外雖蒙恩奉香火有所然為子若孫不能時展烝嘗之敬寕不見誚於馬毉夏畦之鬼乃捐俸割地剏堂於邑之北山奉少師祠以福神名之括蒼有羽士梅洞霄於六飛未南渡之前嘗言錢塘有天子氣既而言驗携與偕来是為開山之祖鑄鐘纍月不就陳夫人投金釵於爐而鐘成叩之無聲梅揮劒擊之聲始大震至今一釵一劒之痕隐隐浮於蹲熊盤龍之上故斯堂雖為祠先而亦為四方水旱禳禬之地此記之不容己也嗟夫生天地間非親何愛非君何尊師也者教之孝以事其親忠以事其君昭昭乎在三之義人極之所以立人類之所以蕃者其不在兹乎惟少師公事師盡道事君盡言不以時之燥濕而為趨背不以身之升沉而為戚欣盖不忍於叛師而忘君也故未嘗染劉輿之膩而汚元規之塵惟䕫漕公事生以禮事亡如存一飲食不忘南陔之蘭一跬歩必顧太行之雲故掲名妥靈於斯堂也恍乎音容之若見愾乎謦咳之有聞夫是之謂忠臣孝子萃於傅氏之門雖附益之以道家之説若祭之隣於非鬼語之渉於怪神然因親以寓名君子亦可觀過以知仁矣夫忠孝之後必大二公往矣出乎其系者露頴於童科充賦於國賔䇿勲蘭省而對䇿于天子之庭者代不乏人繼自今豐末以培其本䟽流以浚其源使錫類之孝體國之忠明可以刑善於鄉國幽可以對越於乾坤是又二公洋洋之靈所期望於百世之子孫邁傅之所自出故大書特書之使来者有考於斯文少師公諱某字元通䕫漕公諱謙受字冲亨道院之址載於傅氏之質劑嵗自輸租於官住堂聽自擇有司不與焉東偏舊有嶽殿今撤而新之迺傅知琳所董云
