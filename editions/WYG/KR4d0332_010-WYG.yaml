body:
  text: 臞軒集巻十宋王邁撰雜著天基節獻聖徳一頌六箴有序臣邁言恭惟皇帝陛下天姿英睿聖學光明仰紹列聖燕翼之謀躬受寧皇寳龜之遺不自神聖恪守謙恭翠幄親儒有日月就將之功端闈養性無聲色遊畋之嗜是以祀帝於郊而天祖下格饗祖於廟而百靈降歆猗歟休哉中興之景運有開而丕大之偉績可俟也臣伏覩天基聖節近在王春朝野多娛和薫萬宇慈闈加膳喜氣排冬寅陛需班驩聲動地臣疎賤一介生長明時来自遐方仕於京幕官品卑下大闕穹隆莫從一奉漢宫萬年之觴竊欲自附唐臣千秋之錄以表野芹獻主之義以寫寸草報春之心葢不止鋪張洪休藻繪景鑠而已也臣聞三極肇判人類泯棼天作君師以教以治羲農黄唐而後系姚更姒承殷接姬帝統王綱迭相修舉崇天普地頼以平成降嬴迄劉僅足以撑拄宇宙支持嵗月比方古先厥徳弗類末祚陵夷帝用嗇於眷顧有唐崛起積累蔑然祖武孫謀眎漢尤劣延及五季乍仆乍興維時三靈儲休閟祉以俟有道於是我藝祖皇帝實生焉聰明神武超軼百王叱咤指麾掃清八極神戈載戢天宇聿新五緯宣明八政順序垂二百載陽九乘之國歩問闗王途煙阨駐蹕江左已及百年敵勢就衰人心思漢於是天復以聰明神武之徳從而錫皇帝陛下焉葢以其數推之藝祖皇帝造國號為大宋改元為建隆實在孟春之端五陛下渚虹星電之瑞允同其時夫彼一時也而聖人造此一時也而聖人生皇天勱相我國家三百年間啓聖之期若合符節要非一朝一夕之故藝祖皇帝在天之靈所以期望於陛下者為何如哉記禮者曰有大徳者必得其位必得其禄必得其名必得其夀昔者藝祖皇帝所以得此於天者亦惟曰聿脩厥徳終始如一而已然臣觀藝祖皇帝脩徳之要其目則有六焉曰愛民以仁也事親以孝也臨政以勤也律身以儉也聴言以公也制事以斷也此六者是其得天下之根本也神墨靈式施於後王世世遵承其永享國陛下於羣臣百工稱觴上夀之時盍亦思夫藝祖皇帝肇有區夏之日不先不後神比天同則謹脩六徳以對越神天以中興帝業可不日新而又日新乎論道經邦之弼臣獻納論思之法從經筵鴻碩臺閣名流豈無忠嘉上資啓沃何庸小吏躐貢狂言臣實不佞每自惟念忠臣畎畝猶知愛君臣既食陛下升斗之禄非在畎畝之比而古之箴規告上自效愚忠雖工瞽不擇焉臣用敢預齋夙戒澡雪精神撰成天基聖徳一頌六箴跼蹐屏營俯伏百拜以投進於闕下庶幾涓埃或可為海嶽之助臣不任拳拳天基聖徳之頌天生聖人為民物主維時孟春日在端五藝祖皇帝肇造區宇國號載新天罅斯補子聖孫神瓞綿慶譜甲子五閱乃眷南顧皇帝之生實符藝祖昔星聚奎今虹飲渚日協時同重規疊矩節紀天基和薫率普玉殿稱觥登降拜俯㣲臣作頌爵抃鰲舞繼獻六箴願繩祖武愛民以仁之箴仁首五常元包四徳為天地心立生民極猗歟藝祖以仁基國鞘㦸櫜弧兼愛南北蠲賦輕刑與民休息列聖纉休祖訓是式一絲一縷為民愛惜螻蟻不踐况用民力與物皆春配天其澤三百餘年期過周歴皇帝之仁天姿隠惻固圉安邊藏鋒歛鏑當饋念甿賑饑救溺恩厚徳崇日培月植夀國萬年仁其命脉事親以孝之箴孝先百行徳適明神天子孝徳異於庶人猗歟藝祖立愛惟親嚴事昭憲惟恭惟寅飲食藥餌必劬其身列聖趾美有親有尊一飯㣲减憂懼晨昏乗輿將歸留戀宫門事戒從令義不奪恩繇上儀下美化厚倫皇帝之孝胚腪性真日奉三朝膳眎八珍粤嗣任音早正虞嬪養志為大阜俗康民儀刑四海孝其本根臨政以勤之箴夏姒勤邦寸隂必惜周文即功日昃不食於皇藝祖肇基王迹風雪夜艾寢不安席幸大臣第載謀載畫列聖思治焦勞如一平旦視朝至夕猶惕勤政有論百王凖的危竿有踰萬世藥石觴戒盂銘几書杖刻逮我皇帝惜時愛日初登寳位首監無逸不事遊畋不惑聲色靡不有初終其鮮克皇帝懋哉自强不息律身以儉之箴堯處茅茨徳化斯美舜造漆器諫者不已於皇藝祖節儉恭履内殿有簾純用蒲葦帟幕無文不尚罽綺列聖監成嗇於奉巳檻去青氊寢用絁被弊幄不更澣衣不耻嬪御無華珠璣不視剗偽返淳措世於理逮我皇帝崇樸惡侈稼穯艱難具知田里服御膳羞過自涼菲奢從儉難儉入奢易皇帝念哉謹終如始聴言以公之箴公聴並觀是非昭晰以私㓕公忠邪莫别藝祖初興求言如渴奏疏来上始怒而裂補稿復前天顔乃恱大哉聖心昭掲日月列聖似之户庭宏闊内降封還私謁自絶叩環大呼不嫌太訐明明皇帝大度拻豁養智以恬韜明不伐直諫宜容邇言宜察公道一開下情斯達成逺憸人湯戒女謁公私之分治亂之决制事以斷之箴制事非難其難在斷正固屹然何事不幹藝祖初興深慮長算懾伏强藩削平僭叛志意堅凝羣疑氷渙果哉聖謨天授神賛列聖似之有剛無愞干法者誅辭難者竄威令惟行誰敢狎玩明明皇帝淵衷獨見修我政刑强我屏翰政無多門令無反汗何憂殘鄰何畏外患果斷興唐優游衰漢疑斷之間興哀之判存心以公之箴厚姻婭近小人尹氏所以不平於秉均開誠心布公道武侯所以獨優於王佐故曰本心日月利欲食之大道康莊偏見窒之聴言偏則枉直而惠奸喜怒偏則賞僭而刑濫惟公生明偏則生闇吉祥九齋銘履齋培爾徳基修爾禮防素履潔如無替於常優哉㳺哉視以考祥謙齋名譽之来有道所忌守謙之一有益之四不然何六爻無㓙辭不曰吉則曰利也賁齋莫巋匪山有玉斯貴莫泓匪淵有珠斯媚人而不學其何身之能賁頥齋内外交養動靜以時歸而求之無舎爾之靈龜兊齋二水交潤而樂生焉相得則樂惟人亦然吁盍相與浚其泉源而逹之川乎益齋石有火擊之則明礦有金淘之則精其求益於而躬毋替斯銘井齋毋羸爾瓶毋短爾綆掘九仞而棄之吁其可忍也歟晉齋一塵足以揜鏡之明一翳足以損目之睛去過之不勇何咎徳之不明鼎齋衣之將敝必求更之徳之不新而乃安之吁盍亦先所重而後所輕乎殖軒銘殖乎徳其久也斯獲殖乎學其成也㒺覺惟孝惟友曰義與仁為吾殖之本根培之溉之務滋於厥身身忿外慾吝容驕色為吾殖之蟊賊夷之薙之毋害我稼穡行有餘力乃藝文園惰農自安胡取禾三百㕓晝斯宵斯真積力久厥報維何自今以始嵗其有筆銘在平世則䇿功龜圖在亂世則效勞麟史今聖明時維君子使毋曲以枉民生毋諂以事權貴書諫紙則犯而不欺釐史册則直而不諱設不遇時巻而懐之南山可移茂林之草不可為端硯銘硯則必端之求友則不端之取甚至於外無潤身之容中無介石之守見此石君亦顔之厚鏡銘胷中正眸子瞭然則其覽汝也貎恱神閑胷中不正眸子眊焉則其覽汝也顔如渥丹是則汝為吾之畏友豈但正吾之衣冠几銘發憤忘食勞且不息嚮晦見汝我心以懌嗚呼使其夢見周公則將矢辭以責曰我昔待旦思施四事子何人斯怡然熟寐其何辭以對跋陳君保作喆藏趙忠定公帖右趙忠定與興國判官林井伯君帖凡二十七紙今藏於其壻陳君保作喆家某與君保仲兄袁州教授為丁丑同年因謁而得寓目焉如為其先君子求墓表於陳正獻公則以泉壤不朽之榮為無物可諭之感至孝也如帥蜀日謂三邊幸無事然心念所及不敢不竭是非毁譽色色有之獨念上恩至厚當思補報不復敢為身謀至忠也如帥福州日遇旱則曰寧以一身受此衆苦遇火則曰誠無顔靣可見百姓至仁也至於崇儒重道之盛心班班見於行玉字金間尤可敬仰招致晦翁累書及之必欲得正獻一諾而後屈晦翁一来其拳拳於晦翁若此艾軒卒以書弔興國則以情如骨肉義兼師友至有邦國殄瘁之嘆其拳拳於艾軒又如此興國時尚韋布公與之交如敵已速其至三山則有何惜不見過之訝有一好文字欲得同觀之約前軰所謂公之求士急於士之求公者葢於此見之嗚呼章縫未遇時望王公如天人惟恐其不見招招必往而興國君能為公不可致之客亦今世絶無而僅有者矣丁丑臘臞軒王某敬跋温叔擬進指揮令至都堂分析温叔既擬進又奏曰恐狂生愈肆怪悖若罪之則適成其名不如天覆海涵置之不問上然之文公得免或謂温叔諫止忠定慫惥之力居多則知二公同心協力責難於君歴兩朝如一日也慶元黨籍固多君子亦有粗能自立於一時後来失友落節如黄子由軰者多矣時惟忠定公與文公血誠至公忠貫日月修名姱節如玉無瑕覧其遺墨想其典刑千載之下凛凛如生當時蠅營狗茍如曹蜍李志軰使人欲唾其面則吾曹盍知所擇矣漳倅到任告先聖文某學古而迂身謀甚左一第廿年方書六考貴豈不欲耻非其道富不可求從吾所好聖謨洋洋惟知充蹈拜廟之辰敢以必告告靈著王文某聞王威名如日杲杲今拜祠庭不敢私禱時事多難天步未妥川陕淮襄方罹兵火内地雖善安豈可保惟臣憂邊寸心如擣王於此時宜相天兆不獨著其靈於閩南自當昭其烈於江左告靈㑹妃文某日於家庭䖍奉香火此来佐州敢申私禱微臣憂國寸心如擣身其康强家可以保晚得一男方離襁褓子其承家父可以老富貴倘來耻非其道神之相之正直是好六野堂賦并序為林佀之作野有二義焉自野人禮樂言之則質朴無文謂之野自同人於野言之則廣大無間謂之野要之皆古君子事也親友紫洋林君佀之博雅好修榜其堂以六野以曰山曰郊曰田曰景曰興之野與人之野而六之自序其目余嘉其居今世而行古道為之賦以廣之山色兮蒼蒼郊原兮茫茫田疇髙下兮稻熟秔香景物周遭兮竒卉脩篁野興之来無極兮煙霞雲月相射而流光有美一人幅巾道服彈琴著書兮友五者以相羊榜其堂以六野兮意甚真而味長彼李愿之盤谷兮與子羙之草堂吾欲鞭吾驂以從之兮耿千載其相望一日盤礴乎君子之六野兮宛與二子參翺翔荷屋兮葯房芰衣兮蕙纕晞髮兮朝陽濯纓兮滄浪時趣於文兮犧尊青黄君獨從野人之禮樂兮外被褐而内珪璋人習於險兮羊腸太行君獨於野以同人兮心太虚而履康莊世翻雲而覆雨兮君獨為徐公之有常世偭矩而背繩兮君獨為元子之惡圓而好方吾不意閱盆盎而見罍兮厭喧啾而聞鳳凰惟世道之否泰兮闗斯人之行藏儻蒼生命未窮兮當宏此道於八荒返頑剗偽兮追還乎樸素之鄉含和飲醇兮蕩滌乎忌刻之場窮則以野善其身兮如養生者之珍稻粱達則以野捄斯世兮如大醫之治膏肓此野之為義其大兮吾所以樂為之平章愛方亭賦為鄭伯吕逢辰宗丞作環閩州兮多竒山品方山兮為第一如玉笥兮列洞天如金匱兮出石室有羙人兮愛山日流覽兮鮮碧結數楹兮為亭題愛方兮為額客見亭名恍然動色爰問主人於義胡得子昔立朝匪有言責匭奏囊封披寫忠赤唐突廟堂觝排宫戚持鑿納枘以水投石有圓而卿立乎君側嫉子之方肆為蜂螫子胡不削之以為圓猶有愛方之痼疾主人曰嘻請對以臆時有汚隆道無伸屈出處何常以方為的猗歟大哉方之為物莊士端人靈墨神式王咸舉之為救司𨽻之幡曼倩執之為止倖竪之㦸朱雲仗之為斬佞臣之劒秀實出之為擊逆賊之笏今予此山真大竒特如幡開張如㦸嚴直如劒横陳如笏端植此吾取之以名堂不避乎人之吾嫉王子聞而狀之曰惟剛故方不可撓而為繞指之柔惟直故方不可屈而為枉尋之尺彼時人之好圓猶四肢之無骨議政兮模味道之稜作史兮曲魏收之筆獻張禹之蓍兮神其欺握孔光之杖兮弱無力佞者依凴巧者鑚刺突梯兮如脂如韋反覆兮為鬼為蜮使其足斯堂而面斯山寧不甲其顔而芒其脊嗟我狂生久矣廢斥家雖無愛方之亭心已有愛方之癖流俗兮滔滔書空兮咄咄何當浮湘水兮問訊道鄉之臺過南都兮物色元城之壁抱此方兮終身瀕九殞兮不怵亂曰守初節兮非艱全晩節兮良獨難堅萬仞兮壁立保孤標兮嵗寒一生無愧兮方寸地千載流芳兮方册間要使方山之愛主人兮亦如主人之愛方山愛賢堂賦為叔正甫作臞軒一日倦於酬酢掃几焚香解衣盤礴乍爾欠伸誰歟剥啄闖扉而視倒屣而躍則吾叔正甫手携愛賢之篇謂得之於故橐詰堂之所以名則曰人皆愛珠玉我愛子孫賢之詩乃前修之所樂今從而賦吾堂非吾子而誰託臞軒作而言曰傳不云乎惟聖知聖惟賢知賢况知之而又愛之不賢者必不能然經不云乎人之有技好之若已他人之賢且好之况為吾之孫子今吾叔也世膩之不嗜生産之不營曰吾有書可讀兮足以藐南面之百城曰吾有子可教兮足以賤黄金之滿籯挟吾所有之二樂以居吾堂兮彼區區者曽足為吾之重輕若乃髹几兮晝净銀缸兮夜熒課羣兒之吾伊咀六藝之精英大兒引喙而髙吟兮如唳天之鶴小兒調舌而學誦兮如出谷之鶯吾傾耳聴之兮若不脛而造𤣥圃不翼而翔蓬瀛抑余聞之人之有生其欲逐逐食欲肥甘衣欲華縟暑櫺欲凉寒館欲燠至於愛子孫之賢則又人之大欲然或鴞􅙿兮鵷鶵或龍駒兮牛犢紛八品之參差雖造物者安得人人而饜屬則亦如彼何哉惟自求於多福故曰太上種徳其次種木又其次種榖木僅十年之需榖纔一年之蓄惟徳則享之而不窮酌之而不涸吾門舊有三槐其大如屋本之以孝友兮可以厚栽培澤之以詩書兮可以深灌沃不尋之以斧斤兮縱之以樵牧淮水之流兮未乾文正之芳兮可續如以吾之言為然則吾叔也異夫人之癡叔蚊賦暑風始至天宇將昏玉蟲甫掛於明缸銀蟾突出於游雲有喧於室有哄於門謳如亂雅之俚曲噪於不整之潰軍睨而視之徐而聴之則藐乎小哉其為蚊也於戱尤物之生有徒是繁大而猛者則豺豹狼兕貙貘麖麈小而黠者則蝮蛇蛭蝎蝍蛆蠭蠜彼惟肆惡於川陸兮避之則易汝獨入於堂奥兮去之也難彼觸之而後毒人兮其罪猶可貸汝求人而中傷兮其情不可原吾嘗觀詩人之傷䜛至援蒼蠅而為比蠅惟聲之可憎汝又兼之利觜吾欲改止棘之章獨以汝為䜛夫之刺葢自古之小人多不利於君子將聖兮䝉毁於叔孫大賢兮見沮於臧氏管蔡二叔兮流言於國之碩膚驪戚二姬兮欲摇乎君之冡嗣子椒之間行兮惡草可掩乎芳蘭歌奴之潛入兮白羽或移乎秋氣腹有劒兮伺人之可乘笑有刀兮襲人之不備葢此曹生則為囂囂嗷嗷之人兮死則為緝緝翩翩之鬼炙手附熱其故態兮故多出於炎天隂邪穢汚其舊染兮故每生於濕地或被人以痏瘡兮如長慶三楊之流或進身以纎巧兮如熙寧十鑚之類吠堯之犬兮同聲相呼食月之蟇兮同惡相比是何天宇之不肅清使汝得以陸梁跳躑而為祟也王子平曰嫉惡如仇展轉不寐我心百憂在床下者必焚之以艾火集幃中者必驅之以膏油欲吾心之屬饜罄汝族之䖍劉或曰不然疾之已甚者亂之端犯而不挍者徳之盛靡昏不明靡亂不靖維其忍之秉心無兢東方明矣乃時之定王子唯唯靜坐以聴
