body:
  text: 臞軒集巻十六宋王邁撰近體詩和宗姪朝望公輔賀生朝韵投閒久矣息心兵臺上饑烏又一聲湖海正須招隠士朝廷終不赦狂生剖開胸腹猶餘赤削盡頭銜越様清坐看吾宗後来俊西風再舉上鵬程生朝止客白髪蒼顔五十三北風不競又来南宦情於我蠟来淡世味從渠蜜様甘烏哺劬勞恩末報鴈行凄斷痛何堪記生縱有一樽酒忍與妻孥共醉酣寄延平史君馬徳大天驥二首日誦江干餞別詩端平局面改嘉熈調元金鼎人黄髪宣化朱轓君白眉否泰從来更代禪乾坤此去願平夷狂生迂濶真無用飽飯山中倒接籬君正青春我鬢絲春闈舊夢是耶非九方臯馬分眀瘦百里奚牛自在肥原注徳大善談相故云九方臯欲去尋盟談繾綣又愁鈎黨起幾㣲乗車戴笠俱隨分懐美人兮心奮飛送趙伯泳涯侍郎守温陵趙公過莆以書復某曰西山兩典是邦遺愛至今人思之故府必有可見子盍以語我来某謂清源自南渡後有梅溪之王苕川之倪俱以從官出守最後則吾西山先生兩出牧焉其再至則官侍從矣王倪之政則聞而知之西山則見而知之今趙公首以故府事實為問其有意於以曹隨為心乎某敬以戒吏諭民一􅁽申呈而以二詩將之因憶西山安奉倪公祠堂之文有秋菊寒泉配食之語公如能因泉民之思倡此義舉和者必衆亦可以慰西山疇昔之志謂余不信試以質之是邦諸寓公當亦以為然泉是梅溪遺愛鄉老倪復此種甘棠後来薦報西山政歸去全無南物装籍甚三賢皆法從勉哉一趙繼循良萬安橋上傳佳話七十年間四侍郎西山無物與泉民底使民如父母親凡日用間無不敬滿腔子裏盡吾仁我熏知見香猶舊公滌中和印一新願廣桐鄉依戀意寒泉秋菊祀千春寄婺倅張同年渭叟倂簡其壻黄元輔自然二首江峯映帶武夷青幾度携筇此地行韻士魁人鍾間氣氷翁玉壻並時名世方爭效十鑚巧渠自不貪三字榮料得平章風月暇家書一閲萬金輕同登當日鬢猶青宦路還如跛鼈行蒔藥山阿非貴相叩頭殿下得狂名著書平屋千年記堆笏盈床一餉榮安樂窩中無別法只將世累放教輕呈竹軒張史君二首竹軒治郡政成時却值王孫慶玉墀無吏下鄉民㸃塔捐田入學士礱碑平反陰徳堪娱母清白家風更課兒見説元宵燈不放為他百姓惜膏脂日晡齋閤響鈴絛鞅掌文書尚坐曹吏困行移愁脱腕侯勤剖决快揮毫維摩正為衆生病太守勝如從事勞願養精神需大用欵陪齊客醉醇醪和竹軒張史君来字韻二首金鳯傳呼紫馬来壺山真面氣佳哉朝天有路鹿呈瑞應物無心鷗不猜黍穋熟時農洗甑芰荷香裏客啣杯官穹職峻人俱羡最羡斑衣舞老萊一自都門拂袖来閒中嵗月亦悠哉填波精衛功良苦享樂鶢鶋心自猜老矣力衰難運甓偶然興到且傳杯君侯若使居王所片善還能采草萊再用韻和張仁仲史君五花入手眼増眀合主黌宫善類盟善教牖民師帥責婉辭玉女父兄情馬經定價増神駿鴞亦懐音避惡名從此心田去稂莠沐侯化雨及時耕用韻簡黄元輔二首不愛螭頭一㸃青片言枘鑿拂衣行但憂負我平生學豈願爭渠豎子名天駿出閑駑飽秣國蘭却佩艾敷榮想君記得西山語佳士從来去就輕髪今如此不重青醉後長歌折檻行老去一寒甘忍死古来幾士得全名稻畦蔬圃閒中樂藥禁薇階膜外榮所見畧同君與我不妨官小得人輕山居即事出處行藏不偶然何曽由我總由天收回紫陌紅塵足来結青山緑水縁萬籟鳴時仍瀑布數鴉起處忽林煙暮雲正爾商量雪却被催詩雨揷先秋夜對客旋燒香鴨剔銀缸風捲銀蟾上矮窗詩癖苦無竒藥療睡魔頼有建茶降回環蛙部疑成兩接續蟬笙不計雙好友相㸔寧惜夜滿懐秋思浩如江良月朔郊行問訊梅菊夜半漸驚風作惡朝来賸喜月為良知梅有意商量雪問菊何謀凖備霜和靖未吟先得趣淵明欲斷已無腸物情榮悴胡闗我獨酌悠然寓醉鄉山中讀誠齋詩萬首七言千絶句九州四海一誠齋肝腸定不餐煙火翰墨何曾着㸃埃錦瑟月中彈不徹雲濤天上㵼将来巴西社裏陳黄逺直下推渠作社魁夜讀杜詩契心喜成夜永如年眠較遲寒聲贔屭薄書幃静看香篆縈茶椀細嚼㯽榔當酒卮詩巻一開眀病眼騷人千載契心期偶逢㑹處㸃頭笑早被燈花聖得知除夕憶昔都門值嵗除髙樓張燭戲呼盧久依净社參尊宿難向新豐認酒徒天子未知工草賦鄰人或倩冩桃符寒宵別有窮生活㸃勘離騷擁地爐案此詩見後村千家詩今補入枕上復用道間鄉字韻呈同人爆竹聲中度嵗忙椒花杯上換春陽欠書元日神荼帖又看新年傀儡塲客枕方酣千里夢朝靴正踏五更霜主翁湏要惺惺在富貴何如歸故鄉元旦次日立春年從爆火暗中移椒栢迎歡上酒卮今日天晴宜麥熟明朝春到報花知好竒漫說雞千跖行樂都来黍一炊但得新年詩有料不妨貧似去年時案此詩見李伯璵文翰類選今補入清眀郊行年例清眀是暮春今年春事却平分故添一閏知天巧欲探羣芳奈雨頻烟樹對人愁脉脉暮山似我老陳陳感時莫灑花前淚不道中原漲戰塵西軒春坐容膝都盧屋一間圖書左右任披翻催詩急雨来迢逓吹面凉風過等閒生意無邉庭下草清香不斷畹中蘭日長無事真僊隠作甚辛辛苦苦官夏雨彌旬不雨懶龍乖乾我茅齋一畆苔火繖亭亭當午立雷車隠隠半天来催詩笑我孤吟苦憂國愁眉八字開池水甫能添幾許兒童已報可浮杯案此詩見李伯璵文翰類選今補入送方徳和大鏞赴漕好風昨夜作秋天吹送雛鵷上紫煙慈母整裘顔有喜難兄提鉢面相傳策勛胄榜特餘事努力巍科趂壮年直數重陽到端午快聆三㨗凱歌還送方栻赴銓笑提虹管試春闈大手何妨小出竒龍種嘶鳴喑萬馬鹿麑辟易避孤羆京城紙貴爭傳賦便驛書来賸寄詩老友生平識英物要看修竹拂雲枝和劉編修潜夫讀近報蔣峴被逐二首讀報欣然共賦詩古来忠佞各殊岐彼猶愧見蒋頴叔君盍自期劉器之惡草剪除雖一快芳蘭銷歇已多時懐哉康節先生語作事莫教人縐眉兩載相依笑陸沉鶉衣不羡錦為衾渠儂眩耀麒麟楦我輩翻騰駑驥吟朝去一㓙憂稍歇邉留五大禍尤深棟梁培植誰之責莫遣斧斤終日尋簡南劔倅趙用甫以夫同年二首原注時兼招司機宜元戎擇佐奏膚公君以宗英在選中紫氣發硎光射斗碧油草檄令飛風莫嫌假手事權小行拜真王位望穹老我相期猶逺大朱虛要立萬年功㞯亭邂逅又輕離時事更翻幾局棊㳺宦眀知同旦過出山聊復救朝饑屠龍笑我真何用躍馬追君已落遲却有一般劣相肖蘭階晩始長瓊枝和趙倅二首一樣風清共月眀平分那得外斯盟合将長與貳同傳正恐君嫌譽過情碑斷文昌須改制臺髙馬援却逃名色絲黄絹儂無分悔不文園着力耕二車人物漢三眀来主壺山夀永盟衆口是碑均詠徳片言如秤不容情斯文陰有扶持力循吏何求烜赫名早晩政成天上去舊㕓還憶老農耕呈趙倅用進退韻別駕從来頭沓髙非闗期奏壓宜敖推敲今日韓饒賈引避他年藺下頗螂欲當車觀者笑駟難及舌罪焉逃小詩贖過無佳句唐突西施又奈何再呈趙倅委齋坐我以春風不事拘攣邉幅中俗子語言藏攫穽丈夫胷腹等崆峒虛舟相觸何心在怒火雖炎一餉空到底不如歸去好扶犁戴笠作村翁作郡庠修學増田記成諸職事招飲頖宫輪奐一鮮眀多謝賢侯主夏盟雞白碑成慚淺識鵝黄酒滿認深情回頭二十三年夢接武千英萬俊名来事可為待卿等狂生老去合歸耕丹青閣盛年憂國鬢毛蒼諫䟽端堪銘豆觴行或使之苗膏雨心乎愛矣藿傾陽榮華不與羣兒競名節須留千載長試㸔丹青閣中句吾宗有此好元方䟦大庾令趙宗華時棣藏諸公帖戊戍夏約漁溪林推希逸白杜方尉巖仲之泰州載酒訪宗華酒半宗華出所藏帖數紙玩之程元公歐陽文忠公蘇文忠公趙清獻公蔡忠恵公張魏公皆兒童走卒識名氏者至他帖則指之曰某賢者某不肖者某賢否之間者宗華曰吾並藏之所以為賢者之師而不肖者之戒也余為之詩數帖凡經幾世藏字漫黒暗欠装潢孰賢孰否人千載遺臭遺芳紙半張憤世疾邪成怒罵懐忠愛直轉凄凉吾曹留面要相見莫使人能議短長原注王梅溪云吾曹離合不常要湏他日留面相見偶書警俗大雅吾無望古人有常猶愈翟公門貪榮但可驕妻妾死義方堪托子孫董生雞哺寧求報元子雉媒莫少恩俗物茫茫隨野馬英雄千載赤心存師心主人作飛錫巖巖頭古佛留心印巖下髙人新受持佛亦本来無隠現人於悟處領希夷莫嫌夢裏還談夢且看竒中更有竒他日證成羅漢果相逢不必問伊誰聽九座鈍菴禪師端午日外堂說法詩人在塵中醉玉蒲師於瓶裏㵼醍醐傳来雙徑清香逺喚起叢林病骨蘇炳炳毫光爭日月琅琅舌本有江湖他年泉下相逢處觧得龍山舊事無輓趙東巖簡叔彦侯四首已矣東巖不憗遺年来雅道日陵夷臞儒得似顔徒幾良吏能為結輩誰此老清修如玉屑當官懇惻念茅茨可憐一夜長庚隕空使人懐殄瘁悲建炎戎馬滿神京殿撰横身活一城時宰忌功無表勸老天福善自分眀人稱簪紱一門盛公是瑛瑤間世生珍重西山遺事跋他年收入史官評夔州歸後聖於詩到墨池来字更竒嶽后前驅䕶丹竈湘靈起舞聽朱徽經行一夢遊僊枕遺愛千年墮淚碑俗物茫茫留不住化為遼鶴入雲飛召節飛来湘水濵牋天乞取自由身懸知夀杖宜扶孔縱有蒲輪莫致申老去最能堅晚節復来應信有全人朱虛不作更生死誰為蒼生問大鈞輓邱制幹二首功名入手太匆匆匹馬沙塲氣貫虹詩好可能却敵騎檄工不自愈頭風死須厲賊言猶在生不封侯命果窮四十九年蘧伯玉是非往事轉頭空曽見端平進士評邱君磊落榜中英忘形爾汝同年集馳志伊吾即日行舉子能談真将畧元戎誇得好門生可憐書劔渾無用才力如何與命爭輓漳守鄭都承子敬四首饕相當朝舞大權故将旌節博金錢公嘗勇去三千石天與閑居十六年清苦膏粱餘子笑孤髙雲水一僧然如何赤嶼丹霞地夜半騎鯨上紫煙端平衆彦起彈冠公作樞庭第一官君似仁皇從諫易相非荘敏汰兵難齊人一傅楚人衆趙氏幾危劉氏安君面更新風色惡回思往事為悽酸壺山閥閲例多賢雪玉風標憶眼前正獻風猷復齋繼蜀公素業肯亭傳人於故國悲諸老我為吾州惜二僊在昔靖康人物盡却教老蔡雪垂肩當日曽同鵷鷺羣清漳風月又平分輪囷肝膽憂時事紬繹諸書洗吏氛悔不佩韋成造次幸猶掛劔答殷勤隻雞斗酒来行酹三十六灣生暮春輓陳直學二首領袖鄉庠四十年被書誤得到華顛玉川大用不及試東野古心常自鞭抱疢二詩知命語遺骸一偈小乗禪修文地下非公願生則當生兠率天原注公病中二詩臨歿一偈皆知道之言飽看布褐與軒裳識破都如夢一場失鹿蕉間空咄咄騎鵬天上去堂堂命真不遇才何負人已無存徳未忘珍重騅甥歌挽些他年有淚灑㯽榔輓趙南塘尚書汝談二首屈賈文章蚤善鳴長楊制誥晚尤精天僊一念墮塵世屬籍千年誰老成賀表眀眀規寶慶諫箴字字砭端平不堪耆舊凋零盡淚到南塘覺盡傾一自黄臺詠摘𤓰傷心吾道竟非耶病来陶侃少獻替老去謝安㣲誤差萬里長江饒一曲連城白璧略纎瑕太𤣥草就無人識付與知音弟子芭輓武剛方録參世科赫奕登相續官守端方石介如無節能開河内廩進身耻覓帝城書秩終九品人稱屈善積千年慶有餘馬耳家聲無失墜二雛努力大門閭輓致政朱司戸二首枕上功名淚不乾鏡中勲業老猶看起家喜有千金子入手纔沾九品官衮衮天朝来錫賚匆匆人事異悲歡最憐當日稱觴處桂茂蘭芳萱草殘一生鐡硯費磨鑚老去耽書廢食眠不惜空門求利果只将心事博長年思賢已矣悲行路福善昭然有老天他日兒孫湏鼎貴燕山陰徳賸流傳輓鄒帥母葉夫人二首詩書教子昔鄒母燕喜寜親今魯侯石窌䟽封時陸續魚軒迎養嵗優㳺精專十念湘山佛髣髴三生閬苑儔方擬繡輿扶上殿不堪丹旐楚江頭昨依緑水芙蓉幙得傍華堂萱草陰座末識裳䝉眄異羮餘分潁念恩深巢廬正灑萊衣淚傳驛俄驚楚些音二母生榮雖迥別天寒陟屺一般心試五墨五首雪齋凡數種此種出清漳或作西齋號南州許擅場長沙㳺玩地多有墨工竒舊說胡光烈今誇鄭子儀柯山葉茂實膠法頗精堅潘李今何處斯人得正傳齊峯何處是似亦出柯山此是西山物研磨雙淚澘墨上署臣字必曽經進来一年磨一寸須作墨中魁暮春即事雲頭紅上三竿日烟際青来數㸃峯桑柘熟時鳩喚雨麥花黄後燕翻風歸舟過桐江晚風不順長江𣺌𣺌雨濛濛自在扁舟一葉中欲識此行無可意往来俱被打頭風丙子詔後需㨗四絶一面飛来打叠秋農場已築管無憂吾儂種殖三年學未省書田還有收促織墻陰唧唧吟早催衣褐上寒砧砧聲似助蛩聲切勾引征夫萬里心戰罷歸来月再盈懸知得失繫心旌應門稚子占蛛信刺繡佳人聴鵲聲勝負相持日已多㸔棋人已爛僊柯淮淝非久㨗書到還折門前屐齒麽自贊善相三分相士七分非又似枯臞又似肥好待功成名遂後煩君只畫着蓑衣畫工又作道装揚州節鉞非吾愛肯要腰纒十萬錢只願天公多與夀道巾野服伴胎僊贊彦廣兄喜相數珠在手鹿隨身一笑陶陶滿面春天地知他心事好百年饒與作閒人送人紙筆阿連詩語已通神玉版霜毫不厭珍老我簿書安用此自應回施與青春香山聞杜鵑雲膚似膜千山暝雨脚如麻四面飛㳺子何曾動歸興杜鵑故故喚人歸山郭檢踏途中聞杜鵑已成客裏清眀過更聽山深謝豹啼衮衮春愁無處着試􅂸一飲醉如泥海棠梅太清臞桃太肥不濃不淡此花宜何人筆下有香字為杜陵翁補逸詩菊花忙裏何曽把酒卮一秋心事付東籬等閒應被西風笑寂寞黄花未有詩案此詩見李伯璵文翰類選今補入元宵觀燈元宵燈火出遊敖闘巧爭妍照綵鰲官府只知行樂好誰知㸃㸃是民膏和馬伯庸尚書四絶句晴瀾金色漾琉璃日落春風拍岸時鷗鳥不驚人去逺掖垣南下樹參差歩障隨車起暗塵畵羅難隔艷陽春水邉争羡春陽栁一嵗東風一嵗新玉泉山下水潺潺不比温泉洗玉環濯罷九龍池内錦纔教流出到人間絲絲垂栁拂金溝學就宫娃舞態柔莫遣落紅飄一㸃長門春色不禁愁觀風堂觀叢刻古碑真贗逓相承俗刻紛紛滿笥縢最是可憐越山石不應只弔剡溪藤蓮花蓮花出自淤泥中過眼嫣然色即空争似泥塗隠君子褐衣懐玉古人風又送地栗螃蠏簡趙倅詩鏤玉雕瓊飣餖中盃行到手莫辭空詩僊比作西湖藕俎豆蘋蘩入國風送筍菰與方徳潤大琮右史仍求霜毫玉版丰標清更臞紫姑道味頗甘腴遣渠問訊紫薇老後省厨供有此無狂吟不覺兎毫枯偶探嚢中笑子虛欲覔管城何處是中書君自有中書監試衛通判送桂花一枝得四絶句以謝花映眉間一㸃黄笑将文字共平章髙枝定不輕分付自有花為知見香天女吹香到酒邉不須更著水沉煙明年正月披香殿人在玉皇香案前君家結得此花縁盛事龍頭四十年書種至今香不斷馨兒俱作廣寒僊原注貳車二子皆浙漕風月堂中傾國姝别來風骨太清臞良宵夢裏殷勤說王兔還能擣藥無原注貳車自言有寵姬得疾院中合藥與之參部至三山簡王宗教子文埜二首仍寄觀潮拙藁子文舊詩名為碧雲樓集昔艤歸舟傍淺沙逢君躍馬㸔梅花匆匆相見還相別三十六灣天一涯別来雙鬢忽驚秋一笑哦詩寛百憂草舍繩樞聊爾爾如何比得碧雲樓臘肉霜蹄削玉慰饞涎却退腥葷不敢前水飲一盂成軟飽隣翁當午息庖煙問邵武守劉無競克遜求邵武紅硃三首見說歸装只載書書嚢拍塞載紅硃不知滴露研磨剰恵我刀圭㸃易無閲君吟稿日頻哦句法金鎔字玉磋自是集中多好處從頭㸃滴費朱多自憐凡骨本難僊安得泥壇七返丹欲使身輕生羽翼乞丹須是問劉安讀王伯大都承奏䟽讀王㓜學兩䟽痛快大呌曰快哉快哉家人輩以我為病風喪心而余不覺喜之至此極也滿飲一白輙成十絶先呈吾友方徳潤右史劉潛夫編修且囑其和毋曰吾畏禍愛官職不比狂生無藉頼也去非前日在端平我以為兄不敢名若使去非觀此䟽須饒㓜學作難兄原注王遂字去非端平初第一臺諫屢下絲綸喚不来来時已作去安排吾宗有此好兄弟欲往從之天一涯首䟽明眀㸃敗棊次篇字字比元龜人中龍定子瞻是殿上龍非安世誰曵紫腰金滿闕庭被渠喚作集𤓰蠅適從何處来居此面目人嫌鬼亦憎金鏁難羈五色麟行藏如减國精神可憐張禹孔光輩氣息奄奄泉下人直道年来冷似菰西山去後有人扶王郎此叚真竒特又喜三山出介夫原注此章專指三山言佞夫茍賤糞甘嘗餘子危言襲故常若使秉彛猶未滅也須泚顙細思量朝犯雷霆暮即行竈間老婢莫猜驚湏知堂裏飣頭肉不似山中野菜羮近得故人盈紙書却将取辱笑吾徒世間自有可羞事曽見歐陽責范無聒耳喧啾厭畢逋朝陽忍聴鳯凰孤朝廷若貶饒州老我亦甘心拜尹洙感歎時事十家生聚九無聊雞犬驚惶避使軺昔日青苗猶出鏹如今俵紙作青苗聞說永平全盛時如雲冠盖㑹京師新来逐客令嚴甚肉食滿朝無李斯贈無諍和尚四首佛祖曽經幾罵訶却稱無諍意云何寒山拾得哈哈笑更有人癡似汝麽稽首叢林無諍師我因有諍落便宜問師無諍中三昩笑指巖前沒字碑學道參禪空自忙郭郎鮑老各郎當不如卸取戲衫子甘與人呼作啞羊逹摩西来長子孫不徒無諍且無言後来鼻孔撩天漢有眼何嘗看世尊詩餘水調歌頭夀黄殿講母天上一燈滿引起萬燈眀不知今夕何夕平地有蓬瀛西母瑶池稱夀南守鋒車催覲二美一時并一㸃魁星現長侍老人星心事好天與夀鬢長青不将鐘鼎為樂念念在朝廷此母宜生此子須有醫時良策夀國福蒼生子自坐黄閣母自課黄庭沁園春尹和靖宣政間不為權臣詘隠於洛中及兵起全家受禍老先生獨以身免賢者之不出如此楊龜山屢出不合又去未幾又出靖康之變以諫議大夫從駕入金營賢者之出竟如此謹詳二先生出處之節求質正於西山真先生遂成此詞以呈人物眇然蕙蘭椒艾孰臭孰香昔尹公和靖與龜山老雖同名節却異行藏尹在當年深居養道親見兵戈興洛陽楊雖出又何畀於蔡何救於章公今為尹為楊這一着須平心較量正南洲潢弄西淮鼎沸廷紳噤舌舉國如狂招鶴亭前居然髙卧許大乾坤誰主張公須起要擎天一柱支架眀堂賀新郎呈劉後村時自桂林被召到莆又遭煩言出了羅浮洞有多情梅花雪片殷勤相送見說翛然琴鶴外詩壓牛腰較重又管甚羣兒嘲弄嶺海三年持翠節料無時不作家山夢馳玉勒歸金鳯原注金鳯池乃所居也一門朱紫環昆仲看堦庭森森蘭玉慈顔歡動宰相時来須着做且舞萊衣侍奉却不信大才難用時事多艱人物少便中興誰辦浯溪頌更大厦要梁棟前調丁未守邵武宴同官此是河清宴覺朝来薫風滿入生綃團扇太守愁眉才一展且喜街頭米賤且莫管官租難辦遶砌苔錢無限數更蓮池雨過珠零亂儘買得凌波面家山樂事真堪羡記年時荔支新熟荷筩齊勸底事来尋蕉鹿夢嬴得乾忙似箭笑富貴都如郵傳做了豐年還百姓便蓴鱸歸興催張翰看卿等上霄漢前調送趙伯泳侍郎守温陵憶昔同時召正青山親提玉尺量材廊廟當日班行比元祐北玉西珠照耀一轉首宫商移調君自烏臺登騎省覺精神風采増清峭數賢者一不肖酒酣耳熱惟長嘯便翩翩輟班荷槖一麾閩嶠堪笑狂生無用處垂老雲新月釣這富貴非由人要疇昔評君如玉雪好翛然琴鶴風塵表清獻後又有趙
