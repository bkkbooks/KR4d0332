body:
  text: 臞軒集卷十一宋王邁撰墓志銘莆陽方梅叔墓志銘莆品丁之家方為著姓端人紳士層見疊出有位公卿立修名姱節於朝者有任牧伯連帥揚仁風義槩於方外者餘挾一能一藝多奮拔於鄉於學於天子之庭故莆人有無方不成榜之謡獨梅叔君懷瑾握瑜足跡半湖海而天無老眼命壓人頭偃蹇不得志賫恨下泉唐人所謂直教桂子落墳上生得一枝魂始消者非君之謂歟君少受知於叔祖少卿公銓仕衡陽日君以弟子為賔客自書札外未嘗毫髮預他事少卿去衡君以衡人士多執經授業於其門者不忍捨其師去相率裒金買宅一區以家之余庚辰辛巳入潭幕於衡為近一時臺府如俞公徴趙公善踐孫公得輿李公東皆持節與梅叔交爭館粲之余每欲沿檄游石鼓與君瀹泉煮茗相叩擊不能得君亦欲至潭訪余而諸公之在衡者恐其為有力者奪去竟不與行壬午春余以憂歸聲問不相接者十有八年己亥夏有以衰絰造吾門視其刺不知為何來使介者詰之知其為梅叔之子也亟出迎之坐定且泣且言曰棐不夭先君家衡三十六年壬辰歸故里葺先廬為終焉計不幸戊戌之閏月下世矣葬且有日棐哀先志不就大懼嵗月久且沉泯無取證於來世求夫子之文刻墓石以傳則先君為不朽矣於是系其譜而銘之方氏自光之固始來十有四代祖金紫公庭範宰長樂治産於莆遂為莆人君大父有為父冲卿潛德弗耀毋林氏君生而岐嶷家貧無書借於鄰族一目數行俱下終身不遺忘長為諸公要人客所為文操筆立就世有業進士不習為外學至目之為屠龍無用之技亦有専攻詩詞駢儷而不屑作原夫輩語以是為童子雕蟲壯夫恥之者惟梅叔兼其所長故自少至老挾耿耿者以游四方而嵗得子弟束修及青雲貴人餽遺以自肥其遁家衡日買姬妾數十人吹笙鼓琴歌舞以娛賔客感時撫物念家懷土酒酣作樂府付歌者清婉可愛暨返故居出所貯蓄市田園以供粢盛得眂中人之産且過之每語子棐曰吾辭家出游時無半菽之疇無卓錐之地今有田若干屋若干非有俸祿以置之田吾筆耕之田屋吾書中之屋也雖然吾豈為吾身及汝曹溫飽計哉吾少讀書有志當世謂得百里為之宰必求如卓密令魯中牟得千里為之牧必求如田仁㑹元結輩今無能以尺寸及物豈吾志不如古人吾才不及今人耶是有命焉吾固安之矣力學成吾志汝曹勉之棐誦其言以告余為愀然嘆曰士所植立係其志所逢合係其時今竊科進身有貪婪茍賤者官日大流毒於民日深橐金與屋數世不肖子孫用不盡乃使志士仁人以濟人利物為心不得施設萬一分使之賣文為活僅得數畝田數椽屋以庥夀其後嗣則自詭以為詩書之末效至於身不得行其志且以望其子若孫焉吁是可悲也已君諱應龍以字行於世晚以梅窗居士自命享年六十七娶吳繼趙先卒男一人即吾友棐也為吾族乙未特魁之姪壻孫四曰炳曰煥曰煒曰燁女二長適營道宰商景春次適進士陳伯順早世棐以己亥九月六日壬申領諸孫奉君柩葬於興化縣廣業里牛岡之竹峰昔君在衡日謁術者得卦兆有牛岡尋吉穴歸葬竹峰前之句今所葬之地之名與兆協豈天閟神藏以厚吉人他日將有興者歟銘曰族望兮堂堂聲名兮洸洸走四方兮皇皇不貴不夀兮返故鄉從龜從筮兮歸吉藏不在其身在於其子孫兮吾為之責報於蒼蒼祭文祭林通甫先生墓文嗚呼湖海之英如公者幾儒冠誤人公竟止此談經講道三傳蹄筌人謂先生為盧玉川具眼逹觀齊一生死人謂先生為䝉莊子少而好游足跡四方人謂先生為馬子長古貌古心寄興幽雅人謂先生為孟東野酒酣行樂縱筆歌行人謂先生為石曼卿知夀不遐晚不納室人謂先生為种眀逸其位甚卑而道則尊其身云亡而德則存我輩游從為日既久天喪斯文哲人不夀撫棺而慟一酹抒哀魂如可招盍歸乎來東山之藏故居之右君子之終沒而不朽祭海陽縣尉林磻漁先生文先生之學涵古茹今先生之文戛玉鏘金三十餘年授業青襟晚得一第僅償苦心初筮下僚上官刮眼來事可為仕途履坦人亦有言黃花香晚天假之齡如是其短嗚呼茫茫彼蒼於物有情亨者使泰枯者使榮獨於先生嗇而不贏前輩雕喪空餘典刑吾黨向來受教席下一奠柩前有淚盈把鄉先生亡祭之於社誰倡義風興起來者祭親友林涇清叔文嗚呼人誰不死子死於溺九月初旬余聞之於道塗未敢以為的也未兩日而言之者益譁往往以為實也余欲問訊於子家恐子之親驚且惕也又數日始知子家招魂於水濵余然後撫膺而痛泣也自是以來余食不能以下咽寢不能以終夕也一夕夢子卧床簀之間余有言而子默默也既覺則月照屋梁恍然如見子之顔色也嗚呼子其竟止於斯耶子於余為世姻而交情則金石也余初聚徒於龍池子之年才二十一也朋友五十餘人子獨為吾門之巨擘也與余纍年為文字遊子之學日進於一日也余既登第於太常則冀子聫翩於桂籍也去秋不利於貢闈則冀子䇿勳於環璧也中夏俟捷音不至則冀子歸之亟也末夏得中都書謂子有厭厭之疾也初秋寄書於子勸子以肩輿而歸恐病後之無力也不謂子舍陸而川遽有風濤之厄也嗚呼文人才士之薄命如子者蓋不一也賈誼止於二十三而李賀則二十七也今子年三十一而死亦未足為子惜也獨以死而不得正所以不能不為子戚戚也然自古有如子之不幸者皆不容以致詰也屈原自沈於汨羅而李白自投於采石也子豈二子之流故與之相從於水仙之室也嗚呼才者鬼神之所嫉也夀者造化之所嗇也使子無如是之才則亦不為功名役也使子不困於功名之行則必亦令終於寢室也然自逹道者觀之則又等生死於一夢付去來於一息也莊周之徒所以不有其身謂不免乎烏鳶螻蟻之所食也蓋一㸃英靈之氣凡所至皆可求其魂魄惟是可傷可念者子有雙親望子之成名於捧檄也子有少妻望子之和鳴於琴瑟也子何忍使老者之虛其望使少者之喪其匹也余與朋友所期待於子者何如又何忍使數月間而幽眀之永隔也一慟生芻之前雖秃千毫不足以寫悲傷之臆也嗚呼哀哉子每能飲其量如鯨今酹一杯子不能傾子其知此情耶其不知此情耶哀哉祭陳復齊寺丞文嗚呼萬類沄沄隨波俱沒金石精堅劫火不滅復齊先生千年人物忠孝持身聖賢合轍嗟世家之無人多自頽其閥閲惟先生大正獻之家聲有吕范二公之風骨嘆道學之無傳幾不絶其如髮惟先生得文公之正宗探伊洛諸賢之理窟方壯嵗之立朝抱嶙峋之直節丙子一疏之盡言搢紳相顧而吐舌殿豸為之失威社鼠為之塞穴既出把於州麾視民瘼之如飢渴南康延平之政成幾萬生靈之全活廬阜避其孤髙劒水遜其清潔逮寧考之上仙泣遺弓之清血誓墓之志一堅栗里之歸始决蘭無人而自芳松到天而不屈蓋其語也非賣直以沽名其默也非甘心於囊括其出也直有救世之赤誠其處也豈但為保身之眀哲根之以內心之昭融加之以學問之親切由本領之純全故功用之宏闊將宇宙之是扶何梁木之遽折豈蒼生之命果窮而斯文之脉將絶然生榮而死哀且全歸而無缺有東閣之郎君可繼承於風烈有西山之美人可垂銘於墓碣然則先生之所存於世者甚長豈比榮華富貴之消歇某也以里巷之諸生荷知憐於方拙坐眀道之春風揖濂溪之霽月歸自長沙也先生為之書廉仁公勤之針及官中都也先生贈之以捨生取義之說尚擬嗣嵗之春長在摳衣之列何哲人之云亡攪悲腸之悁結寄奠一觥臨文哽噎嗚呼先生幽明永訣諸門生祭真大參西山先生文時朝士之為門人者十有七人天生先生為宗社計進退存亡關係斯世海內一詞期以經濟道之將行命有所制窮理致用講學有宗時雨之教春風之容僞者獻誠慢者致恭人謂先生為程淳公方寸不欺守道自信曰思無邪曰無不敬口無過言身無玷行人謂先生為馬文正淳公位卑道立於獨人惜其亡天下無福文正登庸逺夷心服未久而薨都人巷哭先生之道逺紹於程立朝補外俊偉光明先生之位雖不及馬兒童走卒無不知者權姦見忌退處八年著書西山其樂怡然天日清眀甫及聞政筋力未衰乃嬰病疢丐歸者屢僅畀內祠丙吉病愈上日望之中外門人孰不致禱夫何彼蒼遽奪此老述作萬卷珍重璠璵最留意者衍義一書謂此書成死可無憾自今觀之殆成語䜟風濤洶涌思濟洪流巨楫一折淪胥是憂自有都堂凡幾輔弼如先生者不一秉筆易簀之際神氣溶溶曰豫此心秋月當空騎鯨而仙先生何缺國病民痍孰針孰砭諸生疇昔樂在摳趍忍於此日而奠生芻薄奠陳情有淚盈掬已矣先生百身莫贖又先生受清和之異禀集理義之大醇氣之塞乎天地者志為之帥行之通乎神眀者敬為之源凡出處之大節為搢紳之所尊維先皇帝賞其忠勤將大用而未竟留以遺於後昆維眀天子潛躍有聞亟召還於長沙趨入覲於紫宸陳綱常以扶世教之墜辨忠邪以燭時人之昏使其言之果行可再造乎乾坤其如月偃林甫之堂風起元規之塵虎守關而耽耽犬吠雪而狺狺先生乃傲視乎軒冕髙蹈乎邱園謂不見之行事即斯文而䇿勳登堂而受業者詵詵之學子趨庭而問禮者繩繩之子孫窮百聖位育之道探千古理亂之原著大學之衍義可肩孟而跨荀曰如有用我者吾將獻之吾君天佑我宋端平改元權姦不誅而自斃羣憸鼠伏而兔奔先生乃辭粵山之泉石整造闕之申轅溫公起於洛人謂之游龍行雨范公起於蜀人謂之鳴鳳出羣去二公百餘載人於先生亦云至則抱所著之一書侍翠幄而討論動重瞳之注視啓玉齒之咨詢位文昌之清華司貢闈之選掄疲神考校廢寢忘飱夜得一士旦告蒼旻暨撤棘而造榜愆調理於寒溫下天使之拊問示睿眷之頻蕃就登延於政府欲旋畀之國均奈大數之有盡莫竟展乎經綸上咨惜以輟朝痛元老之不存敕季弟以護窆加賻禮而異倫錫以易名之典慰其如在之魂曰委質立朝無如公之忠曰垂世立教無如公之文合二者以為諡播青史之遺芬嗚呼哀哉惟先生之用舍係吾道之泰屯惟先生之存亡關吾民之戚欣嗟弊壞之已極當汙俗之胥淪進賢而莫行其志去惡而不拔其根橘或化而為枳蕕終得而掩薰神龍去而羣蚖肆威鳳逝而衆鳥喧顧巨楫之已折傷波流之沄沄嗚呼哀哉先生所居化熏甌閩頃羣盜之為梗悉去晉而奔秦慘輀車之東歸哭道周之縞巾焄蒿悽愴之戚家如喪於所親先生所治易地同仁泉民愛之尤深如河內之愛恂聞郵傳之訃告慟於祠者兼旬秋菊寒泉之荐嵗彌久而彌新昔傳仙峯之絶頂有士修道而煉真丹甫成而倐化為先生之前身僕嘗於暇日以有問先生答以不語怪神但言其使江東之日夢班於紫微之垣又言天上之為神仙皆人間之孝子忠臣今即斯言而深省當去而為上界官府之星辰某也猥以狂斐久逰師門受知獲愛誨語諄諄鑄我以轉砂之爐斫我以運風之斤為訂頑而砭愚為袪蔽而通堙曰英氣多和氣少者憤啓之訓曰一生短千載長者有味之言自師資之既往悵莫報乎大恩追遺教以佩服誓九殞而弗諼比閏秋之奏對吐肝膽之輪囷內言欺君罔上之百辟外言飛揚跋扈之統軍近言宦寺有捷出之徑逺言濟邸有未雪之寃荷聖度之容納初不怒其逆鱗獨驕帥之肆辨結讒夫之搖唇至班行之諂子亦助之而瀾翻果白簡之見及曽余舌之莫捫幸鶴山之夫子獨愛直而賞珍空船載乎眀月滿袖惹乎香藝入南浦之迤邐眷西山之嶙峋思立門之夜雪念侍坐之陽春恍昨遊其如夢灑涕泗之繽紛嗚呼哀哉共極堂髙兮夜不晨招鶴亭深兮愁暮雲六經無師兮宇宙無人惟有珠林之麓兮長餘春木之芚生芻一束心香三熏先生如生歆此一樽其必曰是為吾學而不吾叛者宜登拜於斯墳祭趙東巖文嗚呼東巖在閩南塘在浙皆工文章皆負氣節塘蘭方枯巖松又折以官職言有優有劣以名節言孰全孰缺與其致身於從班以逢君為容恱孰若全終身之令名無可恨之毫髮此天下士均惜二公之亡尤為東巖悲傷而痛切昔寶慶之權門紛邪朋之附熱公才綴於班行遽抽身而勇决逮端平之初元來衆正之英轍諸公挽之而留中公乃掉頭而不屑方其陟峨嵋而遊錦城歷秦望而探禹穴襲浣花之芳塵臨蘭亭之遺帖及其道林嶽麓之倘徉石鼓洞庭之登涉紉纕乎沅芷湘蘭搜采乎顔碑栁碣以昌吾詩之精神以寫吾琴之幽絶不汙廋亮之纎塵不染曹蜍之㸃沫其宰安溪也人愛之如魯恭其守惠陽也人歌之如元結董睢邸之宗􅉀屬舶臺之兼攝視琛貨如涕洟化不清作玉雪加以真西山之髙與夫李竹湖之潔三清萃於一時賢者之師而不屑者之怛持兩節於重湖撫遐氓如飢渴當狎至之羽書督洪流之戰筏不加賦以擾民竟如期而津發處急遽以恬間轉震驚而妥帖凡飲德而茹仁猶膏枯而醒暍果最課之上聞亟賜環而覲闕公一笑而來歸曰宵征之宜歇散策乎荷屋藥房銜杯乎杉風蘿月心羡髙舉之鸞鳳耳厭妖鳴之鶗鴂指箕尾之書升愴長庚之夜滅嗚呼哀哉人物雕萎世途杌隉命代之儒爽邦之哲聚於本朝猶在目睫二三年來如風掃葉仍於斯時奪此人傑更生卒而宗國之憂孰分李晟亡而萬人之命誰活以位則不至公卿以年則不登耄耋獨留東巖之巍峩長並三山之岌嶪某也晚登門墻辱憐朴拙文席一違嵗筒四閲忽訃告之流傳增憂心之忡惙覽謫仙之詩而涕零撫中散之琴而聲咽埋玉之墳向山之垤白馬素車詣堂膏秣秋菊寒泉宜薦芳冽先緘詞以抒情叙榮哀之本末冀精爽之來歆悵幽眀之永訣祭魏鶴山先生文惟國家盛時之人才稟山川清淑之間氣文章則眉山之父子道學則伊川之昆季更南渡之百年邈徽稱而誰嗣鶴山先生以英偉之姿抱逺大之器文追正始之音學探聖賢之祕權史當朝以儒為戲先生輩人不得行志當寶慶之初元抗綱常之宏議虎守關而怒號犬見日而羣吠斥忠質於渠陽快女嬃之怨詈誼也當此賦鵩以悲鳴原也當此沉湘而憔悴先生處之泰然曰吾有命有義履畏境如康莊茹苦荼如甘薺獨盡力於斯文將垂光於來世於易則探賾鈎深於禮則訂訛證僞於詩則陶寫襟靈於字則平章篆𨽻凡筆端之遊嬉指理窟而超詣積八年之深功續程蘇之位置使一朝之大用當盡抒於經濟逮夫天斃權姦朝登儒揆初年而西山自閩來次年而先生自蜀至洪蔣諸賢後先征彚遂使端平之初及見元祐之懿奈西山之一頺如杲日之西墜先生哭之盡哀人士聞之興喟未幾而蔣終於家又未幾而洪薨於位立東門者一人凛靈光之標致以政地之重臣為督府之元帥何異乎嫉真卿而使之為說李之行惡彥國而使之為出疆之使未視師而賊膽寒將策勛而同列忌俄異論之橫生悵初心之莫遂蜀無家之可歸奉叢祠之若寄及帥閩之命攽猶物情之少慰司封駁者何人犯清議而不愧使此身之猶存尚行道之可冀何殞星之告妖乃翛然而蟬蛻嗚呼哀哉天生偉人關繫匪細出處則關民生之戚休存亡則係吾道之興廢宜錫之期頥之年留以為宗社之衛至於姦臣弄權貪夫敗類宜凶於而身而家毋得以為鬼為魅彼蒼者天胡然不惠惡者永年善者降厲望之周堪殁而孔光賜杖於建平之間元城瑩中卒而蔡京白首於靖康之際鐘鳴漏盡者冥行不休而元夫巨人乃淪亡而相繼嗚呼哀哉國步間關民生雕弊京襄邱墟江淮鼎沸外有側目伺隙之憸壬內有搖舌肆讒之婦寺此何時而梁木摧此何景而蛟龍逝是殆晉人所謂秋髙搖落之時使人眩然而出涕某晚登門墻辱窺小異雖名位之不侔偶襟期之胥契讀奏篇之瞽言曰差强乎人意屬霜簡之見排紛羣目之疾視先生白之榻前至色莊而言毅謂去一微臣不足憐恐天下自此以為諱旋開悟於上心得免投之荒裔贈之以朝陽鳴鳳之繡圖申之以綵筆飛鸞之大字至今序引之珍藏燁然有光於巾笥先生於僕非納交僕於先生非借勢或者下石之未休猶謂托名流而附麗自漳濵而斥還擬墓前而自誓抱直道以不渝鞭古心而愈勵聞訃告於郵傳集百憂於肝肺蓋為世道之隱憂非特一身之私計假精廬以招魂陳生芻而設祭諒英爽之周遊如源泉之在地隨感召而必通儻下歆乎一酹人之云亡邦國殄瘁悠悠我思明發不寐祭丁元輝給事文嗚呼人之才品有崇有庳遭時履運有險有夷自寶慶而紹定紛邪黨之猖披毁蘭茝而不佩采蕭艾以充幃公乃在下寮而不愠見合光塵而不詭隨此一時也人不得以汙元規之塵而見譏暨端平之改瑟為善類之休期鳳嗚陽而噦噦麟瑞世而師師公乃居風憲之緊地進伏蒲之良規此一時也人不得以負望之之薦而見疑至嘉熙之變局正黨論之交馳摸床稜者無可無否騎門限者半黠半癡公乃吮筆乎螭陛演綸乎鰲扉司銀臺之封駁班文石之論思此一時也人又不得以牛李之黨而目之嗚呼自紹定而始進已發軔乎通逵在端平則合端平在嘉熙則合嘉熙自古賢者之出處不與時枘鑿者幾希設於時而諧合又於道而支離公則內不失乎已外不違乎時出與物接侃侃愈怡入守官針惴惴矜持享厚祿而弗恤諸孫之無褐典衡文而不欲邑子之瞻依於所厚者寧薄不以公而滅私入仕四十年而不掛吏議立朝十餘載而不蹈危機上有以結九重之眷下有以締三相之知將進登於四近庶展究其設施方其後福之猶熾胡造物者之不愸遺嗚呼年來人物日覺雕萎有出處不能為朝廷之輕重有存亡不繫世道之安危有毁譽出於勢利之遷就有是非不根於人心之秉彞如公之不大用亦門生故吏之所共悲僕昔同朝才及半朞以罪去國升潛異岐聞訃告而感悼迎素車而差池生芻一束寓哀平時嗚呼公乎竟止於斯祭鄭都承子敬文丁酉嗚呼哀哉仲春初浣方得公書情文溢紙細字渠渠謂因感冷藥褁是需我每羡公精於調理紅顔怡怡髙談亹亹縱有微疴亦偶然爾一日行路忽有異傳我不敢信心極懸懸徐詰其實公果溘然嗚呼哀哉公生相門實則儒素涵茹羣書練習典故不但多聞且通世務太和試邑藹有休稱入遷院轄再轉為丞顯宦要職跬步可登維時權姦其門可炙公心恥之抗章丐出吾官寧卑吾道不屈髙牙大纛作牧廬陵民肌春暖吏膽氷凝不畏强禦讒言朋興浩然來歸一邱一壑與陳復齊追隨最樂罔俾耆英専美於洛十有七載冰山乃傾遄以郎召承㫖樞庭一語不合拂袖而行有詔起家卑以漳守政痁民疵是圖是究千里詠歌二天宏覆乃者望日出勸農耕歸坐鈴閣寢已三更曽謂頃刻乃隔死生嗚呼哀哉賢者存亡有關天運比年以來德星屢殞我欲問天天不可問復齊冡木鬱乎蒼煙建昌仙去閭里凄然又弱一個人何望焉嗚呼官至元士官不為小年踰耳順年不為夭所可恨者積豐施眇郡失良牧朝失藎臣子失名父里失賢人知與不知愴然傷神某也辱知亶非一日迎拜素車有淚盈臆巵酒寫哀公其來格嗚呼哀哉又嗚呼嘉定之間朝登謬宰公間於家十有七載端平儒相收召諸賢公得起廢一嵗數遷是時朝廷號小元祐公在都司賢業未究三陽方長羣隂伏焉陳腳一動公去翩然出守清漳未幾奏最胡為元身中宵蟬蛻年來宇宙白晝晦冥天荒地老雨􅬝風盲元夫巨人乃不得夀俗物茫茫龎眉皓首靖康之際海內流離龜山和靖皆身見之孰若元城與了翁老騎鯨而仙不見此禍公今往矣鈞天其游千年芳魄聊寄此邱子孫能賢滿種松檟吉人之藏過者下馬祭連袂謝克恭欽仲文嗚呼人道亦大矣或托好於朋友或締契於姻㜕始情分之雖密終交道之難全間有全之於其人而固虧之於其天此吾今日所以為欽仲而一慟蓋不勝其愴然也始吾與欽仲為友道同氣合者垂二十年散則無一月而不遣僕聚則無一日而不共筵我嘗砭君之過君亦繩我之愆凡書素之所寄皆中心之所宣如淵眀親戚情話之恱如子美人生襟袂之連及余自長沙而告至君嘗唁我於琧室之偏秉燭相對而如夢心事未剖而遽旋自後僮價之往來乃言偶困於沉綿然以宿疴之屢愈將謂後恙之必痊亦豈料賈誼之倐速化而長吉之遽仙也哉嗚呼欽仲已矣在閨門則孝友而無間在姻族則遜義而相先何厄運之推移使門户之迍邅既銜悲於屺岵又抱痛於斷絃獨其身之僅存俄夜壑之移船此道路之人皆傷吉人之不夀不獨豫涕泗之漣漣所可幸者君有子已近志學之嵗君有弟可謂克家之賢若夫受嵇子托孤之寄念翟公書門之言余不敢以不勉君可瞑目於九泉嗚呼昔我至止倒屣出延今我來思忍相弃捐隻雞斗酒酹君柩前嗚呼哀哉逝者如川祭海豐宰顔養智文疇昔之日辱君文盟芝蘭臭味金石交情君來吾莆大揚教鐸我時過從論文甚樂君自莆歸得宰惠陽懷此美人在天一方物色便郵將寄雙鯉有自南來曰君止此嗚呼清源勝彥璧水名流穹車方駕誰折其輈海內年來善類雕瘁公亦無年殁於下位有子尚幼未能扶喪賴有玉季扶攜還鄉丹旐載道見者墮淚薄酒一巵朋友之誼祭從兄鸞少冲文嗚呼能不能謂之才幸不幸謂之命世有妄男子而僥幸成名亦有老文學而終身蹭蹬此志士所以多苦心必蓋棺而後事始定吾兄少年席珍待聘方聲譽之交馳屬春秋之鼎盛夫何抱璞而銜卞和之寃鼓琴而無子期之聽澤水涸而蛟龍愁暮天寒而騏驥病晚始豁然而逹觀蓋未始不順受其正某幼辱兄憐長知兄敬每旅試於文場惟元方乎審訂我及壯而策名兄晚節而尤徑將收功於桑榆何舟移乎宿信告殮斯辰痛根天性巵酒陳哀誰知此疢祭鄒給事母葉夫人文昔者曽子子路初仕之時俱有遺祿逮親之喜及夫親沒之後方為楚國之仕參則謂椎牛之祭不如及親之雞豚由則謂列鼎而食不如為親之負米是則為二子之親不能不遺憾於此孰如夫人克生令子垂三十年優游甘㫖奉楚堂之養則坐享重茵開魯侯之燕則誕膺多祉凡參也由也其親之所無者夫人皆得而有之矣惜夫萱草之春未央白楊之風遽起胡不及見列辟之回班而乃遽罹憂於陟屺僕也昨筮仕於蓮池荷元戎之知已及銜恤之來歸每懷思於湘水聞夫人之訃告增寸腸之哀毁悵望素帷莫能至止寄情斯文有淚盈紙宜春郡博士陳茂獻哀辭天之生賢兮孔艱既曰生之兮曷不其延豐之才而嗇之數兮意乘除之或然吾非為茂獻惜一死兮蓋為世惜一賢木堪棟於明堂兮俄漂搖於風雨玉可藻於清廟兮遽委棄於泥土不曰有命在天兮杳乎不明其故豈物之生而有才兮皆鬼神之所妬充茂獻之純孝兮可移為忠以事君雖欲為而不可兮猶可證於方册之遺文施茂獻之友悌兮可熏善良於國人雖施者之不遐兮猶可挹其紫荆之餘芬嗟人之逹道兮豈不知順受其正獨我輩之情鍾兮有不能以自勝命短而所存之甚長兮吾於君乎何病尚其相爾弟昆暨後嗣兮天至斯而始定
