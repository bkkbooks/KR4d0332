body:
  text: 臞軒集卷九宋王邁撰啓按此卷自南外睦宗教授至通判漳州作後十一篇係代人作附卷末謝真師薦舉啓開藩旬日方羅幕府之羣英薦剡一封首及墻屏之下士識者以為公舉衆人則曰私恩退自省循獨有感慨惟師生以道而合與賔主之分不同彥明授業於伊川本無干祿之意器之執經於洓水非為薦求之階天爵重則人爵可輕義榮貴則勢榮可賤有寧終其身之弗遇不忍叛所學以茍容如某之愚從公也久孺子可教初拜南昌之贈言門人益親屢造西山而問道所謂晦斯明窒斯通之席喜得於學不厭誨不倦之時昔年盛而氣盈今霜降而水涸來倚麟庠之席獲依燕寢之香瞬養息存日省月試窮理致用之訓朝以書紳習靜持敬之方夕而銘几茍有立命安身之地敢為貪榮希進之圖及牙纛之蒞三神山歎蓬萊之隔一弱水忽聞郵置特賜衮褒豈察其學業之漸成亦望其德業之少試蓋知仲淹之賢則必薦遑及其他而為安定之學者非迂覬施諸用此相期之盛意不敢望於他人兹蓋伏遇某官誠立而明通操約而施普鴻辭麗藻續麟筆之正傳寶匣瑶琴嗣龍門之遺響憂國之心愈渴閲士之眼彌髙方將以此身任當世之經綸亦必勉其徒以大人之事業髙文行逺而謂某有甚蔚之詞章直氣蟠空而謂某有不阿之議論何以當此竊有請焉今天下之所少非文士君子之最難者節居上位者既喜佞而惡戇在下寮者多毁方而為圓鄭公良臣不樂義方有太直之行曲江英宰且嫌挺之負苦徑之名所願先生秉鈞軸之權博取吾黨有氣節之士某益思植立愈勵操修表裏同源敢不推立言之誠而立德阿諛深恥又當移事師之忠以事君惟能為人是報知巳謝曾參薦舉啓起亞相於午橋行將入覲薦迂儒於寅陛轉以上聞趣裝如是其匆匆推轂胡為而汲汲仰窺盛意俯激愚忠竊以魏公用則所舉皆正直人司馬相則其徒行經濟學或拔才於選調或引類於經筵蓋晝錦堂嘯詠之時每訓才品而耆英會徜徉之際常訪人才况當聖主之勵精方召大臣於間散必也搜羅俊傑使之馳騖事功如某者徒有苦心本無媚骨青衫素髮消磨十載之光陰黃卷短檠感慨千年之理亂但見與世而枘鑿不為隨人之桔橰來吟苜蓿之盤正在棘槐之里豈無蚍蜉之援可以攀躋自顧麋鹿之羣甘於恬退寧方為皂恥曲而侯不知何取於髙明乃至垂情於寒畯豈必求乃豫至有如程子之所規故敷奏以言猶愈知仲淹而不薦品題髙而無實以稱力量大而有請必行兹蓋伏遇某官忠貫儀鄰名在彛鼎盛年勇退不依偃月之堂晚節益香好在靈光之殿上有意北方之經理公豈宜西墅之夷猶江左有管夷吾何憂得於親見齊國用樂正子為政誠所喜聞方將録夾袋以儲才乃使先錐囊之露頴某誓堅素守圖報洪知焉有文章得預元祐科名之列尚存氣節要賡慶歷聖德之詩賀福帥王侍郎啓輟班法從出殿全閩淑旗綏章以錫諸侯申重帥垣之命精金古器以比君子載頒御府之珍近比所無上意可卜惟七聚舊安於擊壤而纍年釁起於揭竿屬郡五六城皆被瘡夷長樂十二邑僅逃鋒鏑震疊撼搖者方妥流離蕩析者未全電閃雷轟見謂驚魂之甫定風恬雨霽要令元氣之復還爰以近臣付之專閫觀聖天子臨軒而諏訪與明執事伏陛而敷陳田里根本則欲不傷臺府脈絡則求無壅言而及此民其庶幾恭惟某官一代宗師四朝夀雋故家喬木晉禊帖之猶存晚節黃花魯靈光之獨在容與功名之會更閲禮義之多自入李廷即躋柏府剛詞摘伏斥去熙寧之十鑽正色輸忠追還慶歷之三諫不為枉尺直尋而屈竟請髙牙大纛而行至今婺女之民昌言召父之政排抵權門之橫議講明經界之良規孟子言大略於滕誰為潤色鼂錯嘗有心於漢令始施行此非俗吏之能為要皆儒效之已試緑綈亟召紫橐升華勾稽版籍之盈虛甄别名流之清濁裕民足國鄙夷管晏之近功為官擇人度越馬裴之遴選將駸駸乎大用復汲汲於此來推廣王心王言發為仁聲仁聞念民疾苦如已癢疴解嬈除苛遺安靖和平之福化頑歸厚示轉移風俗之機言之出於真誠讀者至於感激僉曰潁川去泰甚耳亦如渤海非求勝之僕雖至愚竊有過計今之為民賊者多長惡之不悛上而茍有仁人盍知病之所在欲盡革帶牛之習當痛懲碩鼠之貪以致廣寇薄汀邵之鄰海盜闖漳泉之境淮卒櫜弓之已散閩兵受甲而不勝彼易得以搗虛我豈容於缺備此不可以柔而獨理又當思先事而預防江左有管夷吾何憂幸而親見齊國使樂正子為政嗣此有聞伏念某樣不入時癖惟嗜古一第十七年之久歷官與四考之書校藝殿廷強項掇要官之怒充員宗邸低頭受公子之嘲人共嘆其淹回天乃錫之機會昔在丁丑嘗陪玉筍之門生今維甲辰復忝前茅之屬吏竦聞開府喜至忘餐適有采薪之憂遂稽拂繭之敬疾方少愈名始自通敢比正倫遙胄僭攀於杜曲擬同湜輩終身不叛於韓門上何帥啓征衣西上銜計臺一顧之恩别駕南來受帥閫十連之察涓剛辰而告吉飭柔訥以抒誠伏念某徒有苦心素無媚骨校文紹定固應罹邪黨之讒奏疏端平何至取時賢之忌蓋以上方親政下無隱情雲狂因得以盡言黯戅遂從而妄發果而邊帥騰章辨跋扈之名重以廷臣切齒惡欺謾之語友朋解體嬖幸搖唇已方持一簣以障河彼乃推泰山而壓卵坐以孔門訐為直之罪繩以漢法大不敬之刑小人謂弗免君子謂必歸未知死所聖主不加誅宰臣不見斥僅畀叢祠清遊亟返於蓬萊歸路載披於荆棘仙凡立隔榮悴頓殊失勢一落千丈強自安蹇步衝人決起百餘尺坐看羣飛誓墓志堅買山計決曾謂成命自天而下循畀贅丞於漳之濵靜言思之孰主張是兹蓋伏遇某官德盛仁熟誠立明通更閲義理之多掀播芬芳之久正冠峩豸清風滌羣小之辱臺隨仗立螭直筆刋前朝之誣史庾亮之塵無所汙曹蜍之沫莫能加聖化更新前此緊官之餘幾公論不泯巋然一老之獨存已進登於獻納論思乃自詭於咨詢諏度屬時閩嶠有警潢池爰輟文石之班出當英蕩之寄申嚴威令轟雷迅電之鋤姦加意撫摩膏雨祥雲之潤物歡騰七聚最徹九重爰以禮樂之使華更任詩書之元帥治貪墨則嚴三尺字惸婺矛牙則寬一分議沮𣙜鹽無異毁征茶之詔稅寬履畝不啻爭青苗之難陰功隱德之居多野史稗官之可考惟是世途隘甚人物眇然此獨何時橫濟川之舟於野渡行且有命起擎天之柱於明堂固將登明而選公寧不憐窮而悼屈重念某猥以儒素來入吏塵名為分風月於偏州實似試湯火之劇邑搜見底囊以供北餫作無麵餅以餉南軍押催科之帖而攢眉視箠楚之瘢而攬涕所恃惠慈之長少逭督責之嚴庶幾孤立危蹤毋至洊干司敗何相奬賢好士居多被薦於朝廷王祥佐郡無功安得具謡於邦國上姚漕啓綴班東觀嘗依太乙以分光半刺南州復仰福星而受察滌龜告至拂繭通誠伏念某徒有苦心素無媚骨校文紹定固應罹邪黨之讒奏疏端平何至取時賢之忌蓋以上方親政下無隱情雲狂因得以盡言黯戅遂從而妄發果而邊帥騰章辨跋扈之名重以廷臣切齒惡欺謾之語友朋解體嬖幸搖唇已方持一簣以障河彼乃推泰山而壓卵坐以孔門訐為直之罪繩以漢法大不敬之刑小人謂弗免君子謂必歸未知死所聖主不加誅宰臣不見斥僅畀叢祠清遊亟返於蓬萊歸路載披於荆棘仙凡立隔榮悴頓殊失勢一落千丈強自安蹇步衝人決起百餘尺坐看羣飛誓墓志堅買山計決曾謂成命自天而下猶俾贅丞於漳之濵靜言思之孰主張是兹蓋伏遇某官德盛仁熟誠立明通續濓溪諸儒之燈傳延平夫子之印授徒講道七十子其速肖哉對䇿盡言二百年無此作矣自播掄魁之譽不萌榮進之心鴻冥冥而髙飛犬狺狺而自吠及聖化載更於琴瑟舊染維新凡名流悉赴於弓旌同聲相應鐔津之龍始躍朝陽之鳳方鳴米廪橫經招館下諸生而受教蓬山翻帙領瀛洲學士以登仙遄晉渥於郎闈仍升華於樞掾試數偃月堂之黨富貴消磨何如靈光殿之存風標峭拔國論賴以訂正運籌仰其彌縫方佐鼎以調􅀈將持囊而簮筆屬時甌嶠有警潢池帝顧在廷孰任臺府相維之寄公於是地嘗播邦國不空之謡爰畀錫盾雕戈以鎮丹山碧水申嚴戒令轟雷迅電之鋤姦加意拊摩甘雨祥風之潤物七聚相慶一塵不驚澄清激濁而吏治精噓枯吹生而民氣樂惟是世途巇險善類雕零此獨何時橫濟川之舟於野渡行且大用進擎天之柱於明堂固將登明而選公寧不憐窮而悼屈重念某猥以儒素來入吏塵名為分風月於偏州實似試湯火之劇邑搜見底囊以供北餫作無麵餅以餉南軍押催科之帖而攢眉視箠楚之瘢而攬涕所恃惠慈之長少逭督責之嚴庶幾孤立危蹤毋至洊煩司敗世久無綈袍之誼下念故交僕敢憑杯酒之歡上干公法通漳守鄭左司啓綴班蓬觀稔聞尚書曵履之聲竊稍叢祠敢作刺史題輿之望偶叨恩而起間散得帥屬以奉教條敬飭墨卿晉干籖帥恭惟某官清凌氷柱峻埒斗杓昔在元樞不作漢唐之人物篤生令子克紹韓吕之世家方在盛年見稱偉器容與功名之會更閲理義之多正色立朝舌底吐氷人之語一麾出守毫端宣澤物之仁奈西風之塵一髙而東山之興莫遏著書平屋講學專門卷之而懷已並復齋之髙躅充然有得誠如西山之薦章及聖化新琴瑟之調宜名勝應弓旌而起繇郎闈之雋武參樞掾之宏謨習明先朝之典章蕩滌纍年之垢玩形之論建多所施行獻可有先見之明方為時出龜山又不合而去正坐名髙賢者進退之非輕世道汙隆之所係比興思於側席亟有命以起家眷言清漳之名區宜有通儒之報政旌麾至止襦袴藹然崇教尚文振起紫陽之墜緒蠲租減賦舉行竹隱之寬條惟是時事日新善類星散朔黨洛黨之論橫起南軍北軍之變未銷此獨何時橫濟川之舟於野渡行且有詔起擎天之柱於明堂某徒有苦心本無甜舌戇拙既不容於紹定疏狂復見斥於端平耕具釣竿已分煙霞之痼疾箳篁泥軾何心風月之平分獨幸以邑子而事鄉尊况復以書生而師素宦必有訂頑砭愚之教以為針膏起廢之方嘉與同寮欽奉循良之政令願言暇日拱聞經濟之緒餘通興化范守啓出綸閶闔作屏壺山范老十萬兵於胸中時方倚重元結數百輩在天下民其少蘇仰上日之匪遙企下風而起敬恭惟某官清凌冰柱峻埒斗杓月旦題評元方季方之行誼天庠模楷大陸小陸之文章講學遍諸老之參著書作千載之計屬權姦之當國紛競習之移人一世瀾趨相與染曹蜍之沫二難壁立斷不汙元規之塵紉蘭自馨食檗有味逮聖化已新調瑟而衆賢交起彈冠所挾者髙尤難於進謂寧得小國寡民以行志不願為枉尋直尺以留中惟莆稱詩書禮樂之邦久焉弄印以公為忠信慈惠之長宜此分符旌麾未肅前驅襦袴已歌來暮吏狃於政弱而垢玩民困於軍興之誅求剜肉醫瘡甚矣羣生之寡遂酣歌恆舞幾於一國之若狂所望獨立使君之來以為一方疲氓之幸仁必有勇嚴以濟寬使鄉無打門索錢之胥則家有左饘右粥之樂然而世道隘甚人物眇然此獨何時橫濟川之舟於野渡行且有詔起擎天之柱於明堂某為儒而迂入仕而拙愚戇既見排於紹定踈狂復不合於端平竊祿祠庭已自分煙霞之疾贅丞鄰郡初何心風月之分惟半生於方册以服膺乃一旦𨽻治封而親炙必有訂頑砭愚之誨以為針膏起廢之方嘉與斯民親沐循良之德化更祈暇曰拱聞經濟之緒餘與龍溪趙宰啓别駕權輕况復添蛇之足大冠寄重方興馴雉之謡佩髙義之相先飭柔箋而起敬恭惟某官五玉明潤八忩玲瓏讀書感太乙之精光青藜杖琢句奪長庚之魄滿古錦囊早斫桂以搴芳喜紉蘭而為佩花封小試尚餘壺山夀水之春蓉幕清遊不受石門貪泉之汚鶚飛薦牘蟬蛻選階不能直尋枉尺以留中自詭墨綬銅章而補外今之君子攢眉湯鑊之焦熬籍甚宗英入手霜硎之敏決原注一作早以文章之一班施諸政事之三昧在我者大而官無小其位雖卑而名則髙維今銅章所涖之邦乃昔綵捧經行之地寒生冰甑不妨馬骨之臞卧治琴堂喚起鸂灘之夢警吏則嚴之三尺字民則寬之一分居然茂卓魯之勳為一道最行矣厠嚴徐之列立要路津某之迂疏世所姍笑故山招隱方翻相鶴之經漳水贅丞偶玷誤蠅之筆幸有宗英之聨事獲於大邑以庇身州縣一家當念貫通之脈絡雲霄萬里相期久逺之功名按本傳邁由漳州通判言時事削秩久之復通判潁州淳祐初通判吉州旋知邵武軍應有往來諸啓永樂大典本俱闕代通應經略啓誦諸葛出師之表久起敬於油幢為毛義捧檄之遊行備員於鹺局士莫重乎始進天固使之有依三熏蒙竿牘之恭百官拜旌旄之下恭惟某官出處之節皎如日忠孝之心通乎天筆下無一點塵埃富大蘇之風采胸中有百萬兵甲負小范之經綸惟中原久淪汚於兵燹而殘冦尚陸梁於疆場士狃於東南之懦習皆諱戰而喜和公熟於西北之事情謂有進而無退止楚囚之泣而作其氣焚石勒之幣而挫其鋒仗大節以臨邊馳一封而詣闕忠誠憤發可質列聖在天之靈大計堅凝將有兩河拓地之喜未逾旬而來四方之豪傑不終日而易萬人之衣裝捷凱載塗羣凶褫氣其如功髙而人見忌名大而世莫容方𢎞訴協謀俱授晉公之節制及魚程反間遽收郭令之兵權浩然袖手以來歸識者拂膺而太息然公論常如日月一食何傷雖雅志已在煙霞欲留莫可帝思南嶠之最逺詔以元戎而啓行幡然以轟雷閃電之威斂而為陽春膏雨之惠坐閲黃灣之落木足助吟哦笑飲石門之貪泉不移清介鯨波恬靜龍戶歡呼兼理民將略之長皆平生學力之驗人望之在執事逺則張方平之登輔相近則蔣頴叔之任機機留衣鉢以相傳紀旗常而可待伏念某聞道最晚賦才甚涼弓冶承家期復青氊於再世草茅對䇿濫收黃甲之乙科教忠方勉於過庭遭難何堪於陟岵意造物乘除之有數使世緣歷涉之稍深謀養斗升七稔寒飢之所苦失身管庫一官猥屑而亦甘不圖初筮之遭逢乃得大賢而師事惟是傳癖書癡之素習拙於笏畫鞭算之良籌誓當自拔於濁流不敢取尤於清議服鹽車垂兩耳姑強顔陪屬吏於此時鐫浯石紀萬年願執筆從先生於異日代賀贑守聶侍郎啓帝以近臣牧於巨屏昌言諤諤不能枉尋直尺以留中晚莭堂堂徑請大纛髙牙而補外善類愛其髙舉衆人謂之左遷竊謂置身侍從之班跬步疑丞之地皇皇患失比比茍同焉得受聖主之深知而能為大臣之倚重乃不阿合惟知納忠方在先朝一疏首排於社鼠及逢新政丹心慨念於鼎龍憫士夫少難進易退之風歎廟堂乏翕受敷施之量獨立敢言而無懼旁觀竊忌者居多謂與其枉道而留又孰若從吾所好見幾而作守千里則澤千里之民量力可行寬一分則為一分之賜識者交賀壯哉此行恭惟某官義氣噓雲精忠貫日去國十年而復入愛君一念之常堅際會風雲論思日月諸大夫之唯而舍之諤介若無朋一齊人之傅而楚之咻確然自信西風之塵已動東山之興愈濃請一壑以來歸縱六丁而莫挽惟今漳贑比漢淮陽如公直臣真宋汲黯開藩閲嵗載路興謡貪吏聞風或解印綬而先去姦民縮手爭賣刀劍而歸耕陰功陰德之甚多野史稗官之可紀惟是世途隘甚人物眇然此獨何時橫孤舟於野渡行且入覲植一柱於明堂某一自違離兩更寒暑昔侍樽俎聆健論之風生及伏衡茅喜直聲之日出逺莫陪於賀厦條已見於班春恨無怒翼以奮飛姑托便鱗而問訊夢魂失險常屢過大江之西旌節匪遙當敬迓修門之外代上察院啓接武筍班最辱綈袍之眷陳情柏府輒明貝錦之讒物不平則必鳴道既直則宜見伏念某雖名族實屬寒儒費半生燈火之功僅收科甲脫萬死兵戈之下方出選坑急為菽水之謀逺赴松廳之戍至則緑林之為梗窘於油幕之寡謀乃命書生往當勍敵飛矢亂石如雨之注弱兵脆卒望風而奔狼心變詐之不常虎口咆哮而待噬重以兩軍之先覆誰不膽驚幸而七洞之生降出於口伐夫何幕府䇿勳之日肆開黠胥納賄之門以虛為實實為虛故殿反最最反殿此姑勿論抑有大寃適下邑之長官為計使之親黨不善製錦洊蒙帥閫之大訶力使代庖兼出庾司之重命自揣不堪於共二固辭輒至於再三兩司迫之使前一臺為之不樂帥既仙去庾又召還岌岌孤蹤皇皇終日詭計屢從而下石斐言巧入以如簧欲加罪則無辭至踰時而伺隙有府從事獲譴於漕讞刑使者適至是邦既為之緩頰以解圍彼得以乘機而轉手謂取鼎於郜莫能掩巳之瑕疵必假道於虞庶可欺人之耳目名為憲劾實出漕謀求中傷者無自而吹毛受轉託者姑從而射影初止為魚而設網鴻則見離不忍殺牛以釁鐘羊誠何罪一路士夫皆為切齒三尺童子亦知含寃欲自雪以無由今幸天之已定兹蓋伏遇某官章天奎璧鎮地嵩衡霜幹堂堂魏謨有祖之烈氷壺凛凛胡威肖父之清新天子居然器之先皇帝留以遺我峻擢烏臺之長屢輸白簡之忠持公道如持權衡愛善類如愛圭璧諫官明目張膽之氣竦動周行宰相登明選公之方權輿今日致令么麼敢纍陶鈞重念某親老倚門家寒透骨橫遭誣衊天髙髙而莫聞求欲辨明世滔滔而安往質衣而詣京闕束帶而立門闌夤緣一日之知僥幸三生之遇朝無知巳灰寒未易以復燃公不垂情河清豈容於再俟况簡牘可詳於本末而告詞曲示於矜憐倘蒙軫繾綣之知冀有可湔洗之理有人民與社稷固所甘心安邊境立功名亦其素願雖甚不敏安敢辱知代節推謝帥還職啓效官弗謹莫逃貝錦之讒薄罰示懲隨許舊氊之復方歎宦海風波之洶湧賴有使天日月之清明愧見乎顔感極而涕伏念某名為族屬實則書生過庭聞詩禮之緒餘從仕守命義之大戒坐曹贊畫深慚不稼而取禾被檄董輸敢憚折腰而為米適大帥開藩之始軫細民艱食之憂既咸蠲斛靣以寬民力之一分又督責關頭以防吏姦之百出凡編戶皆合詞而鼓躍在末寮當極力以遵承其奈此邦素稱薄俗凡為學子半是假儒簸而揚前有粃粳欺公太甚穀不熟弗如荑稗久積何堪則為出納之有司可不隄防於始入以此斂怨宜其速尤至於黠胥有鼠雀之求衆卒爭雞蟲之得是則監臨之有罪方將兢惕以省愆敢謂仁私遽加恕宥初亦察祠家之無對疑且從輕終又喜小子之自新不為己甚兹蓋伏遇某官名節霜明而雪白德量山負而海涵一飯念民推赤心而起廢萬間庇士赦小過而舉賢致使斗筲之微才不為天地之棄物某敢不澡身浴德息劓補黥正己所以正人巳佩書紳之訓使功不如使過幸無躍冶之嫌代上廣帥留郎中啓委巷食貧每作梅巖之夢窮途干祿漫為蒲澗之遊惟莆為泉壘之附庸而尉膺星臺之奔走庶幾似鄉人而見喜况復援介紹而至前伏惟某官鶴唳青田鳳鳴丹穴經綸敏手五色石之補天爾雅清文萬斛泉之出地淡然無膏粱之習即之有璋璧之溫别駕展軨歌播海圻而功歸邦國巨藩剖竹令修庭戶而人樂湖山入由農扈以升華旋陟郎闈而增渥却要津而懶上斂怒翼以斜飛兩節觀風秋月印錢塘之水十連作屏慶雲橫禹穴之山雖去留出處之甚輕奈功名迫逐之不赦惟廣重地在天一方起公祥斯道之刑見上重逺人之意鼓十四城而下令肅若風行用三千屬而無寃何庸雪洗乃攽宸綍就俾閫旄誰言五嶺之皆炎我覺二天之獨有坐閲黃灣之落木足助吟哦笑飲石門之貪泉不移清介龍戶安堵鯨海恬波昔開元有宋廣平嘗去之而黃閣至元祐則蔣穎叔亦由是而紫樞行將名字之覆甌端是登庸之傳鉢伏念某木偶人計拙氷氏子地寒五舉省闈幾成畫虎一叨仕版殆甚木雞瓜戍之期尚賖匏繫之謀甚左漆雕開斯之吾未信初筮何堪燭之武老矣無能為壯心空在百指纍纍之待哺二毛凛凛以逼人為飢所苦而來稍足亦甘於隱知公侯下士不辭三握髮三吐哺之勞如鯫生無竒猶望一垂手一轉足之力寒谷肯回於暖律枯楊可冀於生華雖抱關擊柝且不辭俾越俎代庖則為過所求易與巢林之鷦不過一枝安敢負知伏櫪之驥猶思千里代見福帥啓炷瓣香於畫戟之堂舊曾窺豹展漫刺於碧油之幕今復登龍不辭三百里之行來喚二十年之夢然公負韓范歐蘇之人望孰不歸依而僕無曹劉沈謝之時名恐難記省非當代善類先為之介則何物小子敢冒而前恭惟某官一代倫魁四朝夀雋任重道逺六鼇背上之擎山孤立無朋萬馬羣中而駐足曩巨姦之當軸紛憸黨以盈庭時以郎潛力持國是對仗而斥宰相人盡危之請劍以斷佞臣事果濟矣峩豸而登騎省執筆而立螭坳讜論危言振起過江諸賢之弱忠肝義膽對越在天列聖之靈道大莫容名髙見忌不能枉尺直尋而茍合乃請髙牙巨纛而有行賑青社之飢如救頭然息潢池之警靡容目瞬甚盛之舉不一能言之類皆知及西風之塵愈髙而東山之興莫遏以直道去人言野渡之橫舟知晚節難自賦寒花於老圃未幾清議之明白旋躋從槖之光華新天子居然器之先皇帝留以遺我蓋將處之疑丞近地之寄必先假以詩書元帥之權四方望霖雨之霑濡七聚私福星之臨照衆俊皆已在列一老行即還朝僕雖至愚竊有過計今之天下所憂蓋在於本根譬之弱人其病毋求之腠理賢能雖集而莫為之宗主議論雖勝而未見之施行主少國疑名為慶歷元祐清名之始上壅下塞實有宣和大觀蒙蔽之憂近觀諸賢時出硬語犯逆鱗之龍者有矣斥守關之虎者誰歟久焉恐嘉橘之栽亦能成枳甚者悔芳蘭之佩甘化為茅方人物之眇然如執事者有幾想近在目睫而有召命必堅起脊梁以濟時艱代上廣東楊漕啓三鱣堂前弱冠預諸生之列五羊城下強顔隨屬吏之聨不自知末路之桑榆輒私敘恩門之桃李南北雖分於二地生成實均於一天恭惟某官玲瓏八忩瑰竒九鼎龜山誠學續伊洛二程之傳汝水家聲出靖恭諸楊之右負倫魁之偉望敡膴仕之休聲逮綴鵷序於端門恥向權豪而炙手正席西庠而講道整襟北靣者盈門時皆爭據於要津公獨回旋於雋武把麾出守遺愛藹於丹荔之鄉澤笏造朝衆心期以紫荷之槖帝惟海嶠地逺神臯韶州白葛交趾丹砂方物萃止蒲澗疏鐘黃灣落木仙隱依然爰屈當代之偉人來將一道之餉事轡方攬而吏姦影遁鞭不算而貨源日通納上霧下潦之俗於清涼辦挽粟飛芻之功於間暇右諸道之課奏行被璽褒左一相之席虗亟膺枋用伏念某天賦不腆地寒無媒方為雁鶩之謀頻迫啼號之纍瓜戍未及匏繫何堪初既職弟子於韓門繼又𨽻編氓於漆壤眷眷三十年墻屏之舊渠渠千萬間厦屋之依今焉效一尉於塵埃何幸望崇臺之旌棨必俟官期之至方執役於弓刀殆恐我公之歸邈難親於函丈投機之會間不容髮露頴而脫輒欲效毛未知倒屣之餘猶記遺簮乎否倘阮眼之青可再雖潘鬢之白何慚鷦巢林而求一枝如許依棲之地驥伏櫪而志千里敢辭鞭䇿之勞願以餘生決之一諾代謝俞漕啓備數恩門之桃李剡墨未乾遣哦鄰邑之槐松檄緘狎至方將圖報而無所何又蒙施於不求愧溢顔間感纒心曲竊以丞之為職實裨一縣之綱維官有攝員蓋出隆臺之指授一有折肱而去孰不染指其旁曾謂八郡之屬而難其人乃以百僚之末而充其選如某者學校百戰權輿一官收虀鹽清苦之身入枳棘卑汙之地簿書鞅掌幾絶簡編燈火青熒動縻嵗月恐辜父兄師友之訓敢效稻粱雁鶩之謀詎意薦鶚書名過飾斗筲以當鐘吕乃竟點蠅誤筆俾越尸祝以代庖厨惟同溪逼父母之邦而二令分子男之寄松榆相望瓜李其嫌以使指遣之而姑來故士民望之而加敬鶩行平立惟知占紙尾而書駑力何堪乃重費廄下之秣豈以曾在韓門之列故得收置狄籠之中兹蓋伏遇某官道載堪輿文工經緯隔弱水三萬而獨步將徑躋於蓬萊并楚澤八九而平吞初何有於雲夢必貯之承明之廬而後快乃畀以英蕩於外而謂何雖岫雲之出無心而陽春之來有腳主盟善類著眼畸儒比時之御輶軒既揚清而激濁他日之開黃閣必登明而選公致使孤身屢煩大造某敢不飾所未至行其所聞厲素節以飲堅氷矢丹心而如皎日可南也或可北也亦惟鞭䇿之從能華之必能實之終賴陶成之德代謝陳憲招捕啓警曹滿戍曾叨薦墨之榮贊府缺員又拜辟書之寵百尺樓許之攀附三品筆極其光華疇不謂逢凜所以報竊以在上位者貴舉賢而報國在下僚者必擇主以託身曩時巨公多入古靈先生之薦藁近世名士半出北山夫子之門墻惟奕代之儒宗有克家之風烈屬時多事兼司一道之兵刑雅志澄清坐閲八州之人物行臺開大幕府選吏如小朝廷謂將邑當兵戈之餘而二令分民社之寄鴟梟之室多毁鴻鴈之居未安親民固係於長官振職尤資於邑佐非智不足以剸繁治劇非仁不足以醒暍澤枯曾謂小才得居是選伏念某朱愚昧道白朴持身韋教一經努力箕裘之學孟鄰三徙厚顔紈袴之嘲坐踰甲癸之十霜才仕東南之一尉當三考垂書之日有四郊多壘之憂心馳驛道之鈴耳洗江城之柝風塵正動惟知瘦却於豺狼夜睫不交安得夢飛於雞鷘方為山之虧簣幸近水之有臺姓名得上於剡章榮耀頓生於末路歲聿云暮將趨吏部以覓官道阻且長獨念小人之有母遲遲西上汲汲南歸敢圖振念於遺簮即俾充員於占筆察父哲兄之念子弟未必如斯門生故吏之遇主人云胡不喜一力成就三生結來兹蓋伏遇某官尊主庇民之盛心開物成務之多識方在壯歲已負逺圖夜雪貂裘慷慨辦太原之檄秋風鐡騎笑談却沙漠之兵由其更閲理義之多所以容與功名之會方閩有黃巾之為梗起公於縗墨以從戎碧油運整暇之籌不差尺寸繡斧兼平反之任益重威權貔貅鼓行狗鼠禠氣凱捷紛綸而載路夀祠突兀以連雲人物今正眇然事變有大此者強藩悍鎮反狀已萌逹官要人束手無䇿賴有閲禮習書之元帥方成雅歌投壺之雋功誰為王言得借君重天下安得數結已交口於南州軍中惟有一韓始寒心於西賊預蓄英豪而待用胡為嵬瑣之兼收某敢不自勉孱庸力圖報稱士於知己雖披荆棘以不辭余不負丞已對松槐而有誓代上梅州王守啓受㕓莆水稔聞王别駕有邦國之功試吏程江親覩漢刺史播中和之頌南北雖分於兩地生成均出於二天三薰致竿牘之恭百拜獻旌麾之下恭惟某官才名江左學問河汾塵外清規望之如神仙胸中雅志決不在溫飽錦心繡口文追滕閣之英鐡畫銀鈎筆肖蘭亭之妙摘髭而收上第䇿足而登華途試劇邑之絃歌幾見飛鳬之迅主計臺之畫諾翊成流馬之功自分風月之清輝盍展星辰之濶步時惟此土地處偏方帝念逺氓墮瘴雨蠻煙之底公來出守覺春風和氣之還轓蓋一臨袴襦交賀凝冰霜於吏膽滲雨露於民肌雖渤海賴龔遂而安然朝廷知文翁也久凝香安靜暫為百花渚之清遊出綍承明行踵三槐亭之盛事伏念某賦分不腆讀書無成五舉省闈暗投明月一般燈火半上青雲自憐髀肉之復生衆笑頭顱之如許試花城之一尉僥幸終更紏蓮幕之六曹過逾始望適以繫囚之殞斃坐於前政之稽留水中之蟹何辜反移其怒蕉問之鹿俄失雖悔何追毁出求全災生無妄瘴來似墨但憂老病之交攻言巧如簧不料抵排之至此坐是妻僵而子仆凄然日暮以途窮往來見庾嶺之梅老淚欲滴夢寐繞故園之菊歸心如飛豈期佐下邑之子男乃獲事故邦之父母寒谷肯回於暖律枯楊或冀於生華鷦巢林而栖一枝喜有依投之地驥伏櫪而志千里敢辭鞭䇿之勞代通舶使啓翠節光華竦望宗英於霄漢青衫藍縷分甘倉氏之塵埃幾年引脰以仰髙一旦澡身而受察敬憑子墨往白帥籖恭惟某官紉芳蘭而自馨挺靈芝之獨秀追河間於千載後得禮樂之盛心夢太白於三生前傳文章之正印既收巍第不輟燈火雖在素官全以布韋為藍田哦竹之遊清哉官况試河陽栽花之手籍甚風流此雖緒餘獨不俊偉繼嘗馮軾無端溪隻硯之歸才一擁轓覺賔水甘棠之滿得地小而亦可行志去天逺而隨即疇庸眷海舶之一司關水衡之大計惟帝遴選煩公一來亷平而吏民安焉鯨波不動忠信而蠻貊行矣琛貢交通合浦之珠既去復還石門之泉不易其介大而國用嬴虗之制即此權輿次而版曹出納之權歸其掌握行有召命以重此臺伏念某聞道未深涉世尚淺讀書發憤期收再世之青氊射䇿決科濫竊一名於黃甲方習趨庭之訓遽罹陟岵之憂謀飬斗升七稔飢寒之所苦強顔管庫一官猥屑而亦甘惟不武之書生殊未嫺於吏事祗恐斗筲之器難逃氷鏡之前念先父曾忝交承夙有通家之好則賤子雖無介紹此為藉手之階倘以臭味之略同庶幾眄睞之稍異服鹽車而垂兩耳願殫駑力之勞得廣厦之有萬間可遂歡顔之託
