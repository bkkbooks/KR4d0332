body:
  text: 臞軒集卷十四宋王邁撰近體讀渡江諸將傳讀到諸賢傳令人淚灑衣功髙成怨府權盛是危機勇似韓彭有心如亷藺希中原豈天上尺土不能歸賢牧堂賢牧存遺愛邦人重此祠典刑前輩幾德政後來誰來日清泉濯歸時隻鶴隨不須看石碣人口是豐碑秋榜已揭不寐寒重難為坐宵長可奈眠老天不解事特地閏今年風助蛩聲苦霜和月色妍抱衾成百感嚼句憶坡仙春晚山行問酒主媪以瓶罄告霜曉寒於臘日中方有春雲頭才作暮風力又欺人老犢眠方穩雛鶯語未真停驂謀一醉不酌酒家貧轎中五言卯酒工為醉春衫怯曉寒籃輿有何味腳力且圖閒得句㸃頭笑拈書信手翻僕夫行且止我愛眼前山次韻調甘內掾韓掾才情妙吟成苦夜長歌殘如意鐵夢斷合歡床鼓瑟湘雲暖吹笙嶺月凉舊時雙燕子飛入謝家堂鵝坑先塋晚歸詰曲穿荒徑髙平見逺山溪乾呈石紫林峭露楓丹不道歸來晚惟愁句未安片雲真解事放出月團團夢林清叔原注林涇字清叔少年有文采吾親友中之至密者死于溺余以文哭之甚哀每夢見之已分幽眀隔無端入夢來交情今已矣汝死亦寃哉白骨今何在滄波去不回蛟龍慎勿食之子謫仙才冬孟駕出親享太廟連日雨是朝大霽都人云凡四次如此矣玉宇曈曨曉瓊京略綽寒紫衣千騎從黃繖萬人看日景新開霽天顔賸有歡駕回春滿殿聖母喜加餐榖旦街塵淨滿城春意多威儀清警蹕鹵簿扈鑾和從騎黃金勒回班白玉珂恩榮誰不羡報上合如何送陳宗諭進叔晉接赴慶元添倅及乃弟泰來四首向來寅陛對冷語頗氷人未犯神龍怒先遭老鳯嗔宗庠隨卻步家食不憂貧公語何嘗泯題輿寵渥新謾說題輿樂誰知憂國心城狐方伺隙邊馬已如林去上緹屏最行陳丹扆針脂韋何足算百煉是精金若見青山老煩言僕寄聲入新無好况依舊是狂生國事今如許庸醫見亦驚不知靈夀杖還解拄天傾玉季吾心友經行話舊遊定知龍有種又快鶚橫秋原注丁酉詔曽請國子舉對策空丹臆為兄賽一籌功名相迫逐只許片時留别劉孟容􅍲提幹二首孟容吾畏友春日去朝京蔗境詩多好蓮池官最清坐誣緣舉將取忌為時名諸老端平嵗同詞為辨眀原注孟容有蔗境集多佳詩遭口誣為舉主所纍也吾莆諸夀雋習靜魯靈光有子麒麟種羣孫鴛鷺行此行青眼衆見謂白眉良通籍何愁晚庭椿樂未央原注習靜乃其尊人夀翁名彌邵為鄉先生送林師道似之赴寧都尉二首造謗端平嵗時髦一網空君為梨嶺後名在蘂宫中躐等輕餘子知音邁巨公莫嫌登第晚試看艾軒翁原注艾軒五十登第及物官無小平生志所存一條氷出壑五色棒懸門皂蓋邦魁彥繡衣鄉達尊儻能念寒畯梅市得春溫送鄭卭叔圭之博羅尉四首竒士束科目炯如金在沙孤吟娛草帶幾度見槐花此舉衣才緑相看鬢欲華泥金墨猶濕已報熟葵瓜三十年朋友詩筒幾往還君才逰宦海我正賦囚山灘鶒何時下沙鷗鎮日閒升沉踪跡異心事却相關初宦南游日去年西嘯時豈無風竹興剩有雪梅詩一尉聊且凂諸公定見知勉旃行好事逺業此其基是邑經兵火今才補少痕要教民擊壤毋遣吏椎門文惠殘碑在坡仙醉墨存公餘勤物色幽興入琴樽送朱君錫圭尉德化二首鼓篋游環璧如君最妙齡阿㜷開綘幔大阮共爐亭力學案堆雪收科蟄奮霆莫嫌梅市小有路透青冥原注大阮謂乃叔履常鄰邑宜初宦輕軒最便家親顔恱萱草詩料有梅花佳兆雙飛鶒夷途萬里驊好培經世業他日步清華送張能父天定赴瑞州教二首孟子稱三樂廣文兼有之夀椿齊百嵗常棣秀連枝初筮筠江郡尊為芹泮師英才需教育逺業立鎡基太學穿楊巧青春斫桂榮心燈傳老宿文印授諸生德履華嵩重襟期玉雪清君王他日問張姓復其名送陳汝功起宰永春二首通了金閨籍須教邑債還尚威民作敵徙善吏容奸世久無彭澤人今識魯山平生經濟學隨力救時艱一第垂三紀卿評占得多生涯似韋布談笑試絃歌夏校士師道春臺民飲和政成行奏最好去立言坡送劉無競克遜司門赴召三首吾郡稱多士君家總俊遊仲方在閒散伯又襲編修道與時升降賔隨主去留郵亭還祖餞别意爽於秋原注仲謂濳夫克莊伯謂孟傳希醇皆為編修上了朱轓最催還白玉京兄憐子由别毋勸器之行醫國言須切謀身策尚平友朋空愛助君自有權衡更化僅如許和戎覺又非邉陲風色惡人物曉星稀國事迷當局時賢赴急機周釐空憤切不慮嵗無衣送龔少貽北赴汀洲司户莊敏與文獻諸孫總俊髦此郎如玉樹初筮即珠曹官小人能大心清名自髙公餘須力學流俗易滔滔送吳夢大監稅赴潮州圃灣二首詩禮名家子錚錚早有聲右班聊借徑在計更司征霜日孤標净湖山一閧平圖南九萬里此去是頭程一命官無小心思及物同髙風超俗見隻手救人窮宦路梅花白親庭萱草紅賢眀尤易事最喜遇南豐愛女愛女有家後沉痾未下床問巫羞左道市藥嘆空囊攻悶三杯酒祈安一瓣香祠山消息好秋杪得還鄉送良沃州賦得石上松南山巖石上鬱鬱長青松樛枝全似鐵老幹半成龍法雨流根潤慈雲護影重吾師掛錫處苔蘚近來封題名士蔡偉叔宣子文集書眼昏眵久今逢刮膜箆詩編雲岫序文卷水心題富艷濯江錦清寒印月犀行行遇知己莫歎槖無齎原注雲岫陳侍郎讜為偉叔作詩序葉水心跋其文仙水歸程九鯉湖邉路重來盟未寒折花挼水獻䇿杖馭風還宦海波濤惡仙家日月閒前生丹在否嵗晚要重丸簡仙逰宰黃瀛甫登二首黃能琴而工於詩為喜雙鳬舄將臨九鯉鄉民貧嗟轍涸吏橫正鴟張誰與催賢令速來仁一方茅簷茨屋下延頸望春陽詩要淵眀賦琴須宓子鳴幸哉吾百里行矣見雙清民瘼需綏撫人才待作成猪肝非我嗜無事纍髙眀池上歸道間即事二首一雨惱春思今朝得快晴水波隨日動麥浪受風平野意來無極籃輿穩更輕抵家何事好稚子亦歡迎寒食清眀近知春不久歸眼驚紅作陳心愛緑成圍宿鷺立晴瀨栖鴉掀夕暉狂逰付年少我已省前非癡兒癡兒才五嵗器局稍精眀弄筆誇郎罷窺鸞效女兄顧瞻眸子俊酬答舌頭輕但願身長健看渠骨骼成聽兒德胙讀書呈邱景實知一教授我被儒官誤如今又教渠但令識數字不要讀多書帝憚汲生戅人嫌賈誼踈君看朱紫貴不害腹空虛山中讀誠齊詩四海誠齊老千年百卷詩不親門下炙却恨我生遲嚼句有何味班荆坐許時太羮元淡泊妙處少人知人日設安籙醮有送菊花一盆四幹直上開花數百顆不减重陽喜而成詩弱幹簮頭大鮮葩蠟樣黃携來煩稚子喜甚見重陽不與浮花並看渠晚節香今宵持供聖一粲動天皇多病客問新來况新來病更多憂時添老色愠小損天和不夢榮華境祇尋安樂窩年豐米猶賤加飯笑亷頗看蔣玉父有珍炙膏肓炷艾劇炎火端躬如泰山醫師工指授竪子覺毛寒鐵脊梁須壯銀河水不乾明知寧忍痛絶欲信為難嵗晚月映林塘淡風含笑語凉俯窺憐緑净小立佇幽香携幼尋新菂扶衰坐野航延緣久未已嵗晚惜流光闕題文正為州日曽留此假竒靈臺貯清白廢井迸漣漪神護蛟龍宅波通日月池紛紛攫金者不畏此泉知挽寧宗皇帝章六首驛報行天下君王棄萬幾鶴翔雲漢逺原注髙宗升遐日都人見有乘鶴翔雲之異龍向鼎湖飛杞國天初陷咸池日尚微臨軒思往事血淚不停揮帝業親耆定皇圖日靖嘉憂民比仁祖在位邁重華原注孝宗二十八年謨烈詒千載車書混一家最悲行蹕地哀些咽簫笳聖化調新瑟仁師慰望霓方還趙全璧旋復禹元圭聲教恢鄒魯威靈暢女鞮浯碑堪恨處聖夀不天齊至道天同大清心水不渾六宫行幸少尺宅煉真存厭代金鑾殿收魂玉帝垣星辰羅上界還奉太微尊憂治勤宵旰生經爽鼎鉶玉巵臨瑞節畫翠愴昕廷草木秋零落乾坤晝晦冥扶持宗社計列聖在天靈方啓中興運旋開萬世功人心憂漆室神斷定青宫識見幾微表安危指顧中孤臣讀遺詔無語泣西風挽崇清陳侍郎五首太學修名立甘泉晚節香巋然周大老好在魯靈光餘慶滄浪水清規夀俊坊典刑今可挹通德合名鄉峩豸居烏府時方豹守關吾惟操白簡渠謾倚氷山六館為增氣羣憸覺汗顔左遷無慍色青史自斑斑當軸開邉釁朝紳半詭隨公方司獻納言必及安危願飾湟中備毋輕馬邑師當時雖枘鑿今日若蓍龜勇退歸雲岫投閒十四年莆中無此樣地上有行仙健筆凌坡老清詩輩樂天何人綴遺稿與作不刋傳小試濟川手東西兩玉虹誰知千載計更在十年中原注公歸休十年作㑹仙安利二橋在邑東西甚宏偉嘗與僕言每旦焚香告天乞延年以成二橋緣後果如願砥柱老彌壯恩波流不窮向來香一瓣心事與天通挽平昌戴丞東二首文籙傳三昧詞壇白雪吟竒才困場屋晚嵗綴紳簮所歷官雖小去思人到今挂冠垂九秩福善見天心倒蔗入佳境寒花留晚香福田三古剎恩澤四輿梁鶴化空華表牛眠占吉藏他年青與紫恆塞桂枝堂挽鄭昻叔圭母蔡夫人二首鍾秀端眀裔來嬪通德家早甘寒水玉晚愛白蓮花樂施隂功厚回班慶事賖他年龍鳯麓贈典有光華綘幔談經日熊丸茹苦時屢修堂上拜親炙母中師每羡萱堂樂今成薤露悲一生同令子共泣蓼莪詩二月朔日得詩二十六韻二月方書朔新晴景物饒今春添一閏是月始元朝一枕初回夢千官想正朝橫魚金繫帶鳴騎玉為鑣歸第無餘事流風競貴驕歌翻羯羊鼓舞襯鳯凰簫爛醉東西玉爭妍大小喬湖山行處樂日月暗中消軒冕吾何羡巾車隱者招林泉供嘯傲杖屨足逍遙砌笋和泥掘盆花引水澆酒爐衣可準茶竈火頻燒冷眼蛾投燭灰心鹿覆蕉慣分田父席懶折督郵腰翻閲書連架𢋫酬詩滿瓢只知貧亦好未覺興無聊所恨黃巾熾能為鄰境妖四郊羣嘯聚十室九焚焦舊臘月虧蝕新年地震搖臺占頻告異塗說洊興妖帶甲多淪沒抽丁困役徭偹防家買劍巡邏境鳴刁惡少鋒尤烈渠魁首未梟豺狼行逐逐鴻雁羽翛翛欲訴閭閻苦其如魏闕遼太平何日見讀報惱孫樵潘世表來訪臨别贈二十韻病眼緣春困晨興為子眀未應談世故政恐纍吾清書况近何若襟期久不傾春來已多日課辦幾何程我懶覺成慣人憐太瘦生招窮詩作祟攻悶酒為兵昨著僧房宿思尋友舊盟時時整行李往往嘆浮萍一動歸歟興長歌去矣行小軒頻偃蹇分物息經營緑愛彌墻幄紅驚糝地英感時愁杜宇喚夢賞鸝鶊秩馬來迢遞論文㑹合并匆匆為草具鬱鬱有蘭馨如許遽言别深知不盡情惜花二三月送客短長亭萬事眼前幻一杯身後名相期在忠孝冷笑付枯榮問學無窮盡文章合老成倘來聊爾爾所立要錚錚此去逢同社為儂好寄聲有需新句子此稿不妨呈春月閲報成詩寄呈方漕信儒孚若邉耗遽如許廟謨先定無書生良不武夜半亦長吁關表成餘幾山陽援正孤黃塵號鬼魅落日走猩鼯甲士疲鏖戰丁夫困轉輸臨淮一帶水諸將萬金軀宛地誰收馬延秋忌有烏畢魂空慘淡曦鬼定揶揄公外英雄少生來忠孝俱全將身作膽曽以口降胡方喜規模偉翻為文法拘正塗多植枳公論冷如菰嚙雪全初節凌煙勉後圖未應歌舞地冷眼看侏儒人日六言五首功名朝三暮四學問人百已千古今無限卿相方册惟著聖賢誦詩心醉六義讀易夢吞三爻毛鄭寸長我取羲文千載神交飲食鮮能知味巫醫各有單傳要得胸中活法勿求紙上空言六經桑麻榖粟諸子綺縠竒珍常常灌溉胸次久久功用入神嵗月滔滔流水友朋落落踈星載酒誰諏竒字焚香自讀騷經和書樓叔遇叔題小蓬萊月砌雲階不染埃疑從天上幻將來一龕儼坐鐘兼吕二老相從聃與萊丹劑好從金鼎鍊𤣥關須要玉匙開他年勳業如粗了待約羣仙笑語陪嵗晚偶題飲氷食蘖坐窮閻旋覺星星上鬢髯百尺樓中從偃卧五侯門下任暄炎寒花最愛香來晚倒蔗須教末見甜夀相誰知三甲異新年願得一丁添除夜洗硯多謝吾家即墨侯朝濡暮染富春秋為供文字逢青眼要䇿功名趂黑頭濯以清泉塵已蛻衣之文錦翠如虬呼童除夜陳豐饌少勞精神併汝酬寄謝希賢先覺表兄昔君弱冠我猶兒黃卷青燈茅屋西父對人談稱衛玠母因客過器王圭别來阻寄尺書鯉夢裏時親日角犀風快偶然翔短翼不應鴻鵠久卑栖丁丑同蔣力父東歸至城詩以别之發軔神臯愁熱甚解驂鄉井得凉多半生相托左右手一日同收甲乙科老我已鋤年少習期君共守嵗寒柯榮華富貴邯鄲枕惟孝惟忠久不磨晚過白沙浪踏麻鞋破曉行林梢猶自帶殘星氣吞宇宙原無餒心醉功名未覺醒紅雨無端汙行色白雲知我憶親庭平生慣作江湖客得酒相看眼倍青二月十六日到仙水未第前屢得夢雙轂相催羊胛熟三年方遂鯉湖遊羣仙笑問來何晚世故相牽不自由昨夢回思聊爾爾他時稍足便休休寄聲岩下鵝冠子丹竈何妨為我留謝仙逰許宰伯詡立續題名記招飲二首記乃崇清侍郎作栽花次第滿河陽誰結寒根桃李場鰲在三山驚贔屭鳬飛雙舄費揄揚春風折屐緣聞捷臘雪開筵重借光他日眀堂需大木桷榱或得入平章憶昔琴堂宴士時至今人誦壯行詩政緣勇氣填然躍遂竊科名副所期鄉槖摛詞光吐鳯邦侯瑑美穩蟠螭乞留片石棠隂下要寫春風德政碑賀許宰伯詡再考進退韻宰官才具萬人豪雞小如何下得刀奏課再經書上上理繁祇見辦多多錦囊有卷牛腰重裝橐無金馬骨髙欲賀政成憐我懶篇詩付與邑人歌夀仙逰許宰原注戊子生中元後一日南極秋來光燭天琴堂此夕夀詩仙龐公戊子孰小大冦相中元相後先製錦從容才有刃嚼丹賦詠筆如椽交梨火棗君家物從此蓬萊不計年桃蹊梅塢踈踈密密自成行共趂春妍鬬曉粧移得武陵溪上種傳來大庾嶺頭香𤣥都道士風流别東閣詩人興味長喚取園丁勤物色合將何樹比甘棠和崇清侍郎招飲超燕堂韻超燕堂開一面春却教寒畯亦充賔西清班裏推名從南極躔中見老人草聖已傳碑不朽花神覺與思俱新鄉邦桃李誰培植直待魁然宰輔真再和陳侍郎子知丞寄桂香酒新到又令孫司户出柑為勸柏葉椒花未報春陽和先到四筵賔傳觀秀句堪呈佛諦聽清談太迫人子舍香醪浮甕碧孫枚名果薦盤新却將甘㫖分寒陋尤見先生愛士真寒食呈陳崇清一百五日寒食節八十六翁行地仙曲水飛觴酬勝景漢宫傳燭憶青烟三春幸自添餘閏雙筆今題第幾篇俯仰興懷兒輩事先生有樂在壺天夀陳崇清侍郎笑把荷囊下紫霄人傳千載鶴歸遼精忠一片馳寅陛樂事無窮繼午橋垂釣滄浪聽欵乃揮毫雲岫賦逍遙今辰恰紀蓬壺瑞南極橫陳埒斗杓賀陳侍郎該宗祀告成加封清源郡侯二首告詞有緬懷耆德飬老乞言等語錦書飛下字如鴉從槖詞頭似相麻竣事眀禋均雨露緬懷耆德傲烟霞雞窠佚老精神健燕頷宜侯爵邑加願體乞言珍重意星馳驛騎奏忠嘉辭封來伴赤松逰判作山中萬戶侯一片葵心天北闕十行芝檢殿西頭淵洪端靜恩言厚拊藉溫存眷禮優國事多艱耆舊少須公與作濟川舟再和二首筆飛鸞鳯墨翻鴉白玉堂中懶草麻得句批風仍抹月怡神飲露更餐霞公於軒冕浮名薄帝念耆英寵禮加丕衍修齡全晚節洋洋一札聖言嘉原注皆誥詞中語壯嵗清源曽倦遊今朝大郡又封侯身安不用扶鳩杖骨貴從知應虎頭望闕承恩顔有喜即家問政禮宜優濟時事業需元老莫遣空橫野渡舟送鄉先生林漁磻黃石講㑹嵗暮何時更逺逰劉蕡下第我色羞陽春自古難為和眀月如今肯暗投宿諾不輕連璧友新盟借重扞城侯九江儻拒黿鼇餌何處堪人下釣鈎原注時朱上舍趙監鎮為之倡賀謝景芳得第四男每愛君家玉滿階仙宫今又見琨臺父兮定得鈴旗夢母也須懷磬石胎羯末封胡知有種復臨泰壯看朋來林家絡秀如聞此好好來求依樣杯賀弟綱得男韓相由來紫府仙微之曽侍玉皇前羡君久矣崇真教生子居然契道緣料得玉麟親入夢試看銅狄幾經年不須草草為湯餅剩出犀錢醉四筵寄鄭龍川子汝瞻巖翁二首一叙别懷一謝惠端硯汝瞻當日預文盟七十人中最妙齡别久恨無書寄鴈夜深猶記案帷螢我叨天幸登科甲子盍心期紹品丁後㑹阿䝉須刮目流聲不減國蘭馨寄我端溪玉一彎文房取友此其端眼中厭看珊瑚樹掌上欣擎紫馬肝底用千金求國手擬封九錫霸詞壇他時遊宦南州路免載囊中隻石還離家無端輕棄白雲拗似被梅花喚出郊嵗律堂堂蛇赴壑宦途役役燕營巢數更聽雨情何極憂國懷家睫不交老了英雄天不管那堪更被北山嘲謝何察推鯽鱠君家一筯萬錢拚分我銀絲侑客歡芳餌得來珍丙穴金刀落處照辛盤腹腴差迫詩肩瘦鱗活能生酒面寒玉手行厨如許巧說教魚婢學應難别戴仲實人生契好不在久一日可當十年遊共君三兩夜清話洗我千萬斛竒愁欲晴未晴雲閣雨臨别惜别車停輈異時扁舟下瀨渚安道謹勿避子猷二月閲邸報聞道邉頭數萬兵倒戈歸我我遺民處降失䇿國非國清野無糧人食人關外數州城不獵山陽孤戍草無春書生憂憤空頭白自有經綸社稷臣感嘆時事西風慘淡起愁雲走檄飛書正糾紛劔器朝方驅冶匠戈船夕又募新軍馬肥已報髙秋警鶴唳那堪中夜聞我輩憂邉心欲折棘門灞上漫論勳聞倪正甫尚書遭臺評人從捷徑博公侯一老堂堂去不留誰向帝前讒陸贄不令王所著居州修名已立公何缺直道難行國可憂安得上方三尺劍為渠斷取佞臣頭題王雙巖詩集後二首自是先生標致髙誦詩恍見萬人豪清如金掌雙莖露壯似錢塘八月濤胸次無塵春拍拍道腴有味樂陶陶輶軒刻棗傳衡嶽留得芬芳伴楚騷白首憂時意更長眀言六籍法皆良先生不竟身前用有子親傳肘後方時論無人傳藥石上醫著眼識膏肓歸歟活國工夫辦要續雙巖百世香寄題盧川容膝軒詩誰將容膝榜軒楣未見髙人心領之緑綺牙籖無長物名芝芳茝是佳兒卧看筆架成江夢坐揖爐峰讀楚詞諸謝風流應未逺盧川今又種清規送方潛仲入太學英氣軒軒貫斗牛春風匹馬辟雍遊家庭競秀三株樹伯仲相交五鳯樓回首白雲添舊感細聽夜雨入新愁妙年唾掌收科第㑹有歐公避一頭石巴山買舟年來機事付沙鷗湖海萍蓬覺倦逰千里白雲關我恨一江流水替人愁快聞飛槳健於馬底問前灘吼似牛枕藉舟中君莫歎人生何日不虛舟陳方大弟宏父將省侍潮陽以詩約别逆旅頻連風雨床歸來蹤跡兩參商誰知才隔路三舍不似相從天一方壺山白認梅將雪潮水黃知菊已霜便去也須留驛道欲携斗酒話倣徨
