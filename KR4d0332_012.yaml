body:
  text: 臞軒集卷十二宋王邁撰古詩試石鼓墨得月字韻水聲響崢嶸山勢髙嵂矹我居山水間瞥焉五閲月看山寬眼界聽水清詩骨妙理在濁醪淡交寄薇蕨翻書明月軒瀹茗清泉窟一雨釀黃梅連朝來不歇雲疏漏簷光晴意猶鶻突卓午睡瞢騰起來足不襪搔首獨無言書空時咄咄天宇未清夷世途良臲􅑶丈夫志未酬徒有衝冠髮俯頭習科舉與俗聊汩汩壯圖要有待非久黔吾突富貴漸逼人榮途軔須發題元山蔡行可對青亭終日在山中不見山可愛欲識愛山趣須在山之外南山不古今悠然與意會西山無朝暮佳致固長在蔡君金玉人結亭避闤闠面面蒼璧屏坐卧與青對晚曦射紫翠宿雨濯藍黛能消幾兩屐不賞此竒槩芙蓉為君裳蘭茝為君佩今非避世時乃學陶謝輩諸公富唱酬拔戟各成隊我出一轉語功成身始退君為端明胄忠孝後必大山靈縱有盟一出合破戒蒼生正有求富貴不渠貸山債會一償相期在晚嵗題弟綱舉之奉仙之室曰小蓬萊吾祖有方平曾與麻姑會滄溟化為田彈指五百嵗又有仙人喬神遊八極外朝舄作鳬飛世緣比蟬蛻寥寥千載後之子得正派風度亦可人春秋况未艾朝搬紫河車暮結飛霞佩嚴事鍾與吕信心終不退經營白玉壇肖象儼相對四面來青山獻竒飛羽蓋爐熏徹玉虛劔水清塵界瓊笈閲千函丹方探三昧誰謂三鳬遙近在吾境內蓬萊若云小孰能為之大跋黃京甫必昌提幹四書講義吾友黃京甫器資厚以渾自了場屋債遍參諸老門四書不釋手日旰忘晨飱超悟到聖處不能忘于言序講凡五篇字字比璵璠伊洛有心印傳受百聖源紫陽有心燈曯破萬世昏得君再紬繹提要鉤其元如印一洗滌篆籀宛然存如燈增膏油光焰大且繁我昔從師友是書粗討論老大學不進德性焉能尊因君重感慨舊聞日當溫願言剪枝葉作意事本根甲戌九月日有食之紀異三十韻甲戌九月秋朔旦見災眚孛彗犯太陽凄凄如月冷方其始虧時宛然蟲食皿食之至於既當空懸黑餅髣佛存輪圈中陷猶枯井雲間星晝見草木森弄影天地寂無聲疑似非人境問之道旁翁欲語喉先哽翁今九十餘眼未見此景爰有蟣虱臣拜跪淚沾領天髙聽則卑宜鑒愚臣請日者陽之宗千古光常炳此日何不臧臣心憂耿耿或者天愛君先事示之警流金為湯戒洚水為堯警雖重一時憂何傷天歷永吾君今堯湯四海元元幸公道大開明朝列肅而整祗恐萬一間左右容憸悻方秋陰用事陽微陰漸逞不去讒慝根懼作忠良穽天乃出怪異意欲悟觀省吾國必有人伏蒲輸骨鯁吾君必開納小心知畏謹陽政必日修陰邪必痛屏天其終仁愛悔過在俄頃大呌天上人齊喚金烏醒讀林去華居厚主簿省題病夫夜不眠五鼓始交睫懶起比吳蠶清夢飛莊蝶恭承髙軒過不及倒屣接惠我百篇詩珠璣何煒燁五言比長城一望皆危堞壯如廣陵散悲似陽關疊音韻最清圓格律尤妥帖登壇禆將降咒水小巫怯永嘉富人物往躅足追躡經術北齋陳文章水心葉林君遊其門早負賢關篋鄉校設臯比户外紛屨屧科目苦無憑取捨如漁獵入網多弱翰上鈎希巨鬛西廊上奏篇甲第僅書捷低頭矮屋中壯氣不萎繭研朱點周易修此清淨業焚香讀楚詞時作真行帖臺府嵗舉員求者例有挾孤士乏梯媒剛腸羞婦妾諸公縱憐才或被權勢劫誰能推挽之士論得欣愜東歸同年三山王簿賓之趙户立父連簿仁父黃上舍偕行分道買樽酌别我從京華來溽暑不可邇藍縷一征衣邂逅四君子臭味同芝蘭鄉井連桑梓王君吾兄行派出銅川氏一飲吞百杯一揮爛十紙此是鑾坡人非久棲鸞枳黃君天庠英貴名方日起三年拜賜師行雪殽函恥後來幾英豪願作榜下士小連真可人犀玉浮冰峙再鼓氣不衰收科趾前美朋山萬青襟求識習鑿齒立父天族英雅非膏粱比青桂近嬋娟紅蕖映青泚名駒産天廄一日當萬里今夕知何夕德星偶同晷明月入觥船涼颸生劔履相逢吳山頭相别閩江觜交情托管鮑同年序許李明日懷美人娟娟隔秋水何以慰我思馳書寄雙鯉東歸至衢城十五里頭征衣犯火雲來自長安道浹背汗淋漓遵程行數跛險阻已備嘗習氣覺如掃京華紈袴兒顔色差強好玉斚酌玻璃金盤飣水果享此竟無端榮枯太顛倒嗟余數之竒涉世嗟枯稿青雲志未酬午夜心如搗浪蹈軟紅塵有懷白雲老決䇿賦歸歟受此大轗軻倚杖立沉吟持杯澆磊砢生平忠憤心皎皎通穹昊一身不足憂世途深可悼往嵗淮甸間邊吏困科瑣金鼓聲漲天溝壑填肝腦一旦計之窮首謀伏天討耽耽欲無厭百計需金寶今者馳使車囊橐費賫褁乳臭坐廟堂茍免及身禍誰知鴻雁嗚朝夕不相保旱蝗莫為災四望無青草我輩獨何心日夕憂江左豈不欲救之勢力顧未可敬持一瓣香好為蒼生禱何日鞭五龍澤之以霖潦手提四方人脫之於水火父執德化陳宰叔髙槩寄詩和之欲作好官易與時同俯仰欲作好人難前修嚴矱矩馬安為巧宦孔光位宰輔貽臭汗青中詬罵之所聚胡威清比父魏謨直肖祖世家有若人百不一二數夫君少壯時筆力迫韓杜晚嵗宰一同治最方卓魯中都清要官唾手可摶取徑挂神武冠去國身如羽隱几挹青山稱觴環綵舞導養學熊鶴鉛永成龍虎妙香參鼻觀虛白生靈宇興來聳文筆象物蒙藻黼客至開香醪鯨量少儔伍我登清風堂人今道則古敬宣與狎崇所擇聽張禹别永福張景山我友滿天下面交如斗量最晚得張子羣中孤鳳凰秀氣分髙蓋妙年侔洛陽趨向頗近道才具已老蒼蘭若參文盟過眼五月強别我求贈言握手吐肝腸學貴根書茂積貯焉可忘如行千里路須具三月糧文亦有活法先使意氣張如破勍敵壘須擒賊中王子家藹文獻庭砌多琳琅歸歟力種績宜親師友良植本日以大養氣日以昌學豐敷為文如富出所藏襟期要犖犖俗物徒茫茫他日泉石下候氣視北方知有滔滔者非豫誰其當白髮吟明發覽青銅寸白墜華簪懸知不能免豈意遽見侵憶昔隨羣兒總角混青襟縱弱不好弄既冠知惜陰時開磊塊胸澆之以古今二十偕計書進士路欹嶔遲遲十四年一第酬苦心今年已六六暮景來駸駸一髮照我眸衆髮立森森忽然一失笑政要渠相尋有田願種玉有腰願垂金富貴豈不好勞鹿那能禁何如一床書侑之緑綺琴逺參蘭茝香清玩山水音髙歌月滿架醉卧斗橫參待教頭半白挂冠老山林飲犢青草浦盟鷗白沙潯憑虛喚張陸聽我白髮吟白髮嘆日月轉四時團團輾清昊人生一世間輕塵棲弱草寒暑不相貸容鬢豈常好嗟豫涉世紛聞道苦不早塵勞縱掀簸冉冉風中葆行年將四十素標已插腦星星才數莖爛熳色勝縞耘鑷雖暫無安能遏衰稿黃精似可餌已白恐難掃幸有琴心文真訣堪却老華池溉隱芝青青可常保斯理不吾欺從今勤探討要當驗他時難為常人道青銅作明鑑皎皎鋪晴昊照我沐初晞幾縷經霜草本無適俗韻頗識林園好何為浪自苦落得衰顔早懸知日夜改青絲成素葆達人遺世纍土木視肝腦那於形骸間計校元與縞彼獨何人哉而我嘆枯稿壯年不可挽過日如霜掃但有嵗寒心不逐冰霜老誓開三徑荒種藝雜庸保雖無大藥資尚得恣幽討此外盡悠悠置之不復道題江郎石崒嵂天外來生平眼不識道傍問行人指此為何石云是江郎神兹地顯靈迹嶽瀆孕精靈陰陽陶器質壁立千萬仞蔥然翠欲滴縹眇出塵寰上與太清迫伏如蛟龍蟠聳如麒麟逸開如旌旗揚斂如圭綬直交酬如大賓相敬見顔色特立如正女齋莊不可昵勇如毛大夫囊錐推頴出烈如藺相如挺身衛全璧徑如傅介子叱吒在三尺直如太史公巉巖操史筆裒萃許精英狀出大竒特誰言造化工於物無雕刻我來揖清標倚杖立歎息年來天柱傾誰是扶持力願移此靈根支拄天西北三光五嶽氣要使合為一血食千萬年與國同無極和趙簿題席麻林居士小隱四韻公子有竒節嵗寒心印松千邱仍萬壑是中雅能容晚來萬事懶獨有詩不慵諸郎富文采筆端聳孤峯繞園萬竿竹竒壑千丈松此物匹髙士坐羞桃李容客至談世故接之令人慵相看兩不厭晴昊倚髙峯棊聲響蒼石茶竈燒枯松故人惠然來風竹為先容野性曠而適機心疏更慵生憐謝安石携妓汙名峯笙簧豈不韻雅景受風松紈綺可為裳靈均采芙蓉古來曠達士世膩亦太慵可望不可押人如雲外峯題趙别駕委齋詩别駕來訪别徵我委齋詩敢問委之説别駕自發揮萬事悉委分吾何容心為抱槧遊文屋去取委所司一戰偶得雋敢誇詞藻竒隨牒走仕途薦舉委所知一朝獲通籍敢恃妍媚姿不見百里奚非黠亦非癡爵祿委倘來飯牛牛自肥不見塞上翁無喜亦無悲得喪委自然失馬馬復歸委懷在琴書栗里真吾師委順聽時命香山不吾欺吾以名吾齋曰委不亦宜王子曰不然我言異於斯人性涵萬善其位配兩儀凡天所委付受者不得辭行藏道汙隆進退時安危委禹以治水胼胝敢言疲委尹以復辟寵利非謀私經制委姬旦述作委仲尼今古理無二聖賢人可希綱常或淪斁委我開訓彛楊墨路必闢韓莊門宜麾宇宙或傾仆委我力扶持補天出媧石浴日升咸池飢者委我食寒者委我衣一或負所委是謂天職虧若君所言者莊老同一岐梁以苦空壞晉以清談隳流弊至委棄往事真來規世道真險隘天將委之誰上不能使爾夫豈無良醫因詩重感慨當有評是非送族姪千里歸漳浦吾宗居漳濱枌杜足不到迫嵗携琴書迢迢以謁告草木同臭味水火隨濕燥行色念辛酸開樽勤燕勞葭管陽方升凌室冰新破語言頗有味知子為跨竈日暮望白雲江頭理歸柂别我乞贈言求以為宗好謝安自薦元杜子每念佐子真元佐流我譽不為過惟學無他逵損益在勤惰我昔少年日螢雪功自課嘔肝綴文詞懸膽警坐卧甑寒心自憐筆凍指欲墮牛羊事芻牧鴻雁謀粱稻慈親日待養一第天所報願子繼自今書田深種播定力要堅持居安謹無躁青雲信有梯我已為前導後來當有人衮衮如響和洗耳候凱音嘉節迫吹帽呼童辦楮英為子征西賀四十自夀前四十年非追之已莫返後四十年是圖之良未晚水涸自見涘木落知見本善者契吾機今復猶不逺養生先節欲葆粹在懲忿聖賢人可為勿使善惡混寄居元職方北第呈西鄰盛進士解褐去鄉里宦遊一紀餘抱戚今來歸茫然無屋廬暮瞻還林烏朝羡趨淵魚淵林各有歸曾不魚鳥如元侯雅好義假我舍北居入門掃埃壒間草以次鋤貧賤誰顧門豈必容髙車餘杭衆富家碧瓦侵太虛土木雖無情亦與儒冠疏所幸並舍賢昔年同詩書何兹瓦礫陋復爾鄰璠璵鄉田及同井此義無忽諸寄同年新塗王宰夢弼玉笥髙嵯峨異石光燦皠紫蓋有佳人出為花縣宰佳人秀吾宗天姿最髙塏飲水抱絲絃紉蘭纕蕙茝疇昔紏郡掾辨獄亦幾殆人命我所爭斗粟何足愛上官翻相知剡薦異寮寀及膺民社寄直道肯自悔以柔克髙明為政尚慈愷農扈飽春和荒年獨不餒猾吏履薄霜洗手畏納賄桑問雉正馴壁上魚多鯘昔我在湘幕相從垂兩載書生守方拙時粧不入隊惟君雅知心刮目賞竒磊君有桃李栽我獨芙蓉采無何風木悲天乎余何罪歸歟泣焄蒿久矣嬰病痗除夜接君書烏欄墨璀璀訪問死生餘警語鞭不逮為言剛近仁直性終難改近乃加和平痛自鏟光彩萬事必宗道衆流須納海隨時少屈伸正直固常在再拜君之言書紳戒荒怠時事苦間關誰歟穆天縡來書尚可為蒼生久相待靈白湖歸憩林氏墳庵僧出能誦豫舊詩設茗碗蒲食以詩贈之兼寄呈林六十兄霜風襲客裘朝日曬農背誰遣役此軀隱痛在五內宿草漸重生局蹐處覆載扶衰策瘦笻乞靈問龜蔡往來才信宿屏息過闤闠夙駕三十里僕夫已告憊小庵闞道旁丈室藏法界叩扉僧出迎面熟不猜怪白髮久不梳爬癢得痛快荷設茗碗供仍有蒲食配去此已五霜重來發孤慨一飽猶可謀三釜已不逮退藏心甚甘世故肯相貸博陵隱君子堂萱春未艾悠悠我之思此日君當愛簡延平李公足擇善原注時隨侍其父為興化令余在制中昔人重相思千里且命駕我家去遊洋相望才四舍偃息豈不思吉服詎可借惟憑一雁翔敢望雙鳬下日者聞琴堂墨綬將解卸東閣領羣英勝遊當首夏惠然訪九仙雲物爭迎迓拂石納晚涼秉燭娛清夜吉碑共摩挲吉夢相矜詫物色故老言赤鯉何年化題詩富錦囊仙境為增價是地近吾廬過從何未暇初傳尚半疑後信良多訝世態如浮雲炎涼更代謝髙誼定不然寄聲來慰藉簡林公似窮猿不擇木祥鳳宜棲竹髙門結駟榮陋巷一瓢足仕有時為貧貧乃急於祿夫君何所欠百事盡從欲新諧種玉婚大敞堆金屋鏡裏顔尚朱庭前萱正緑中州不徜徉炎海甘馳逐遂令君子心度以小人腹我貧甚去年全家久食粥獨醒妬人醉譏誚那免俗名節千載光富貴一炊熟朋友嚴簡書敢以石攻玉寄浙漕王子文野以思君令人老五字為韻得詩五首長沙一傾蓋情好如塤箎間關十寒署何時不相思君為雎邸教再挹冰玉姿升堂拜夀母摩頂識馨兒敘舊方戀戀臨分轉依依自是成鴻燕羽翼竟差池音問久不接清宵夢見之魚腹得尺素羊胛經幾炊陳雷不可作千載同襟期我友半湖海知心吾子文君忙我已老事事不如君君生通貴家我出寒素門君披貂毛裘我著犢鼻褌戲綵君有母列鼎共清溫我早失烏哺空山悵白雲弱冠君有子世科將襲芬我子方垂髫詩禮未有聞凡此皆不如官職不必論原明有申公公休繼文正後來諸名家有子多不令堂堂先太史孤峭立萬仞身不為從官美諡君所命子文為之子壯嵗名已盛榮華付倘來節義傳心印波流石不移火熾玉寧盡嚮來箋天疏每讀必起敬相期輝國史何止續家乘西山門下士雜襲如魚鱗惟我與子文受愛異他人送我長沙序言言足書紳贈君樵川詩字字示寵珍潛齋養正堂兩記尤諄諄為君説太玄藏心養靈根為我演蒙頤山立靜澄神先生愛吾徒不啻子弟親將何報此德相與玉其身我本麋鹿羣官職不要討儋石倘有儲山林堪佚老焚香旦告天非為其私禱一願屢豐年田疇足禾稻二願息兵戈塗地無肝腦飲水樂在中茹芝顔轉好篤信而好學守死以善道佩此八字符傳為子孫寶作詩寫殷勤未省蒙印可與友人飲分等字韻君詩敵曹劉我才慚碩頲隱几共團圞醉鄉從酩酊強吟蹙眉尖得句蒙首肯吟蛩聲咿咿銀燭光耿耿相看不惜夜自足攻逆境搜腹憐龜腸朵頤傍羊鼎論文固非儔義氣略相等世情似紙輕交道如菰冷願堅松柏心嵗寒青挺挺贈傳神莊士儀畫工亦無數好手不可遇非是畫事難難得畫中趣况寫佳士照又不比行路莊生頗工此為我掃尺素儼然山澤臞詩肩瘦鳬鷺老色雖上顔庾塵莫能汚生畫甚迫真餘子等孩孺得錢散酒家無心問婚娶醉被風雪欺術招鬼神妬長安多貴人朱門富紈褲使聞生之名當即懸金募我貧亦如生正以詩窮故一畫博一詩兩手相分付殿廷初考諸同舍約共賦詩紹丑夏五初皇帝下明詔大廷策羣英虛心問道要初考凡六員同時赴宣召宫講潔齋子典刑真克肖胄丞道鄉孫道心長返照何殊鐘在簴宛如刀出鞘谷口亦何人才德俱富邵走也分塵埃識見等螢爝亦獲在選中所得過所料宫燭分夜輝御香供早燒羣羽競赴矰衆鱗爭入釣意氣雲龍翔精神風虎嘯或巽入柔行或疾聲大呌或自出機軸或工事竊剽或寫雲和音或鼓折楊調或作朝鳳嗚或吟蚯蚓竅好惡隨品題寧復相譏誚上方富春秋明齊日月耀涓露增滄溟微塵填嶽嶠乙覽公平章甲科須直峭諷必納祈招針必容庭燎國步賴扶持民痍需砭療詰朝已竣事杯行可以釂謝京尹惠酒饌逐客次江干復此風雨夜元戎念寂寥更僕相慰藉醽醁實珍肴寵光生邸舍妻孥共感戚道路或猜訝謂此偃蹇蹤橫被彎弓射彼哉簧正巧或者石猶下同志欲過從避黨輒驚怕曾謂十連尊理煩無頃暇惠顧及無聊多言莫為謝平生仗信義正色叱姦詐此樣不入時致入人話靶明時方獻文安得有謗罵獨以殿廬中語言少假借遂犯螳螂怒問坐鴟梟嚇先期入簾幕坐是罹罟擭公施不報恩髙義等嵩華一言挾纊溫所嗜非酒炙天日方清明罪過宜宥赦白璧可洗瑕煩公叩造化簡同年刁時中俊卿詩并序時中吾諍友也未第時作老農行以諷其長官言辭甚苦今為綏寧簿被鄒帥檄來董虎營二千問之役諸邑疲於應命民間悴於科募一日稟帥又欲任浮屠宫宇之責帥以小緩謝之余退而作詩即以所諷令者諷之讀君老農詩一讀三太息君方未第時憂民真懇惻直筆誅縣官言言虹貫日縣官怒其訕移文加誚斥君笑答之書抗辭如矢直旁觀爭吐舌此士勇無匹今君已得官一飯必念國民為國本根豈不思培植其如邊事殷賦役煩且亟虎營間二千鳩工日數百硬土燒熾窑髙岡輿巨石山骨慘無青犢皮腥帶赤羸者頳其肩飢者菜其色憔悴動天愁搬移驚地脈吏叨鷹隼如攫拏何顧惜交炭不論斤每十必加一量竹不計圍每丈必嬴尺軍則新有營誰念民無室吏則日飽鮮誰憫民艱食州家費不資帑藏空儲積間有小人儒旁獻生財策大帥令龔黃豈願聞此畫夏潦苦不多秋旱勢如炙願君在莒心端不渝疇昔蔡人即吾人一視孰肥瘠築事宜少寬紓徐俟農隙至如浮屠宫底用吾儒力彼役猶有名何名尸此役君言雖慫恿帥意競縮瑟同年義弟兄王事同休戚相辨色如爭相與情似昵余言似太戅有君前日癖責人斯無難亦合受人責我既規君過君盍砭我失面諛皆相傾俗子吾所嫉簡復齋陳寺丞子表夫知丞併呈真西山復齋吾之師髙山儼標致僕嘗函丈問乞得四針字及來仕京華登門願受記復齋首肯之贈言簡而毅殺身可成仁舍生甘取義此生尚可輕圭黍眇爵位僕退書之紳雋永言有味充員京兆幕萬一可行志赧顔斥吏胥冷眼視權貴婉嫿孤無朋旁觀輒相忌朝肆緝緝讒暮遭申申詈聖主初臨軒不才叨考試諸賢憚生語一律愛軟媚我喜衆所驚人取我必棄問有植私恩了不恤公議枘鑿不相投罟擭焉得避襆被去候潮襁褓有幼稚少需辰之良解纜辭清渭邂逅復齋子入京方卸轡為言東湖上英才日以萃窮伊洛淵源傳紫陽位置要使莆三邑薰為善良地僕也聞斯言歸心生兩翅平生真西山赤心愛善類誨我以沉潛意同言小異二公負名節可望不可企勇退在盛年髙卧看兒戲我行拜二公顔面儻無愧作詩欠硬語呈似賢昆季謹勿示他人恐為吾黨纍親舊問盜作詩四十韻以答之亦可備野史之録我來自京師己丑之十月道之建劔間行行遇兵卒問之何為行對言聲哽咽初只因臨汀鹽商時出沒縣官事張皇星夜聞帥鉞帥出乃捕兵此曹輒猖獗加之江西冦恃嶮護巢穴向來誤殺降貽禍今尤烈合黨肆紛披交鋒爭桀黠聚落四百村室廬遭毁爇轉徙臨昭陽孤城危一髮帥方實歸裝視此苦不切惟漕暨庾臺協心圖撲滅移文責十連義激詞語辣就檄劉權軍専城植鎩􅚛又有一老尉賈勇抗鴟鶻賴此所居民猶茍旦暮活我聞此卒言憂憤中腸熱及歸抵吾廬保伍亦團結或恐汀邵冦餘燼尚分裂或疑鼠狗徒乘問敢竊發吾鄉號樂國目不見寸鐵一聞鉦鼓聲縮頭畏如鱉新嵗或訛言城居竟搬挈丁男肩欲頳稚女足不襪相顧莫為謀去守將安決汝知誨盜誰吾能為汝説年來民賊多田里困根括單丁火亦追逃户租盡刷猛虎政太苛攘雞手已滑剝床忍及膚椎肌慘見血吏肥富薰天民貧怨刻骨及此皆幸災狺險何聒聒古來盜賊興按此與下句不接考次首和韻此處脫六句官吏去叨餮大者籍其家小亦置重罰人心知是非端可以理折民賊盡芟夷雖賞之不竊鄭昻叔和余問盜詩末及山東事弟姪輩又問山東本末再用前韻答之江左百年來英雄老嵗月空糜東南財坐廩驕惰卒嘉定懲開禧廢食因一咽國論規便安神州聽淪沒和戎益金繒諱戰鈍斧鉞邇者天禍之韃靼逞狂獗一舉殄金人犂庭掃其穴金如釜中魚靼如火烈烈乘間蠻觸衡復有山東黠長驅淮甸間大縱山陽爇或屠制帥家許國或髠守臣髮姚翀魚肉我王人茍夢王諸人首領春蔥切塗炭我生靈聚落炊煙滅嫚書揭通衢著語太辛辣供帳王者居左纛將軍紱按前首専城植鎩􅚛此韻與前互異往來青齊區健比霜天鶻一名娘子軍掎角同生活狼心肆陸梁烽燧競熏熱我事南方強謂可以恩結衣裳一顛倒茅土甘疏裂納侮忍包羞容姦噤不發誰與生厲階正爾錯鑄鐵彼計甚詐狙吾謀類跛鱉嵗幣久樁儲復為彼齎挈邊籌乏寸長往往如拆襪相顧皆狐疑莫能抵龜決心知示弱非成事付不説邊民亦何辜一孔盡搜括戰艦尾相銜義丁家盡刷需求意無厭許可舌太滑譬之護癰疽包裹畏見血僅僅外留皮駸駸齧至骨理勢有必然吾言非強聒惟願天聽回攬權制生殺毋倒太阿持毋憚強弩末毋貽養虎憂毋使饞蜂孽廢籍起忠賢窮荒斥竒餮一朝出六師聲罪行天罰名正事必成本強衝可折銜璧許來臣寸鐵誰敢竊按邁於紹宣三年充考試官詩首言來自京師己丑十月應在殿廬被劾免官之後李全於是年十二月冦揚州時事吻合故二詩序次在此弔何巖可憐何巖民何罪遭此劫冦攘發他邦警報經旬浹官府過張皇民居少寧貼昨方科箭翎今又催甲葉厚斂招提金名色何所挾昌言募土兵相與守城堞繡衣意其欺急下徴兵帖束手無一人差官許専輒縣官至何巖丁壯被威脅黔首畏墨黥依違謀未協口或出怨咨心實先震懾官兵胡為來紛然肆漁獵室廬罹燬燒老稚殘鋒鋏山徑至通逵輿尸交積疊敢梟平人首偽奏譙門捷殺民汝何勇殺賊汝何怯此鄉風俗淳武斷無豪俠目不識戈矛家盡事耕饁豈應有叛謀誰子為荆聶黃巾縱挺威吾地足未涉官吏大不仁使爾血先喋千家聚落蕃幾代農桑業一望成邱墟獨非我臣妾安知此怪事不入賊問諜設或搗吾虛小壘真岌嶪舟中敵國多况望蒸徒楫書生憂世心夜半不交睫作詩弔寃民詩成淚盈頰翻恨天門髙不與閻閭接丈夫貴敢言女子乃呫囁信手閲清溪詩一首依韻即事久雨妨好春朝暮無休息出門欲有行苔滑泥餘尺四望人煙稀千山鳥聲寂叨寒不肯歸青帝覺無力况有黃巾徒鄰郊漸相迫虐焰挺戈矛連車掠金帛王旅猶稽留民兵半覆沒羊狠來莫當鼠竄去無迹踐蹂清野塵原草不能碧世運何乖張生靈罹此厄丁壯抱枵腸駢頭受科率氛妖誰掃清氣象太窘窄書生憂國懷半夜轉加劇相倚如輔車忍視為胡越富家太不仁增價糶斗石但愛囊槖豐不憂狗鼠黠甘為盜貯儲遑恤人飢渴凶渠曷日殱苦潦何時歇作詩愧北征聊以志嵗月携笻出尤嶺嶺頭坐俟輿夫不至我居南麓下頗利君子遁如何溽暑初涉此復嶺峻瘦藤代笱輿路熟不待問拂石小盤跚心愛木陰潤清風解人意陸續松杉韻掬泉咽茗芽竊賞此味俊我坐亦良久我僕行何鈍平生性麋鹿合有幽間分舉足履世途退尺進僅寸曾此小遲速而足置喜愠繼今出處同冥心法天運斯遊悟窮通持與達者論送黃成甫殿講被召泉為閩望郡山海來航梯琛貢交異域珠貝象玳璃腥風易涴人濁如雨後泥不屑受點汚除非辟塵犀南渡賢太守前稱王梅溪中問西山真後有苕川倪近嵗李竹湖四賢玉雪齊他守非不賢多以欲境迷一罅茍可投趨者由旁蹊利心長萌蘖公道生蒺藜梟見腐鼠嚇鳳甘梧桐棲物性殊潔穢人品隨髙低君侯第一人壯氣干虹霓天墀一長嗚萬馬不敢嘶為州上異最趨覲下宸奎歸裝試檢點定無南物齎時艱方急賢君命焉可稽巨艦方解維穹車正發輗憶昔端平初衆正咸登躋如人墮夢境忽聽警旦雞云何不常泰一變成孤暌大老遽淪謝善類誰提撕菊坡未起南鶴山斥歸西朽屋費撑拄洪流欠障隄蜀道橫豺虎邊城喧鼓鼙流民滿京輔溝壑填髫倪弊事非一端言之重酸悽醫國要大藥去膜須金箆君子與小人却是一巨題願為君子者名檢身自禔皎然不可玷琳琅别介圭凜然不可犯貞女處幽閨必服羣小心始去禾中稊義利生一念治亂分兩畦老我以狂故屢為語穽擠朝行辭鵷鷺野性便鳬鷖附熱恥翕翕耐寒甘凄凄荷君不世情猶念故人綈紅絮正飛零緑陰被長堤送客洛陽橋春風逐馬蹄相期在逺大不敢惜分携有客一首寄溫陵史君趙侍郎涯有客至自泉為我出嘉話泉得趙史君誰人不稱快天生冰玉姿系出龜琴派標峻埒昭回氣清融沆瀣方在諫省時朝紳推鯁介及膺承宣命未到心已解真李報政後紀綱日大壞有坐泉山堂不守盂水戒户庭交賈胡寶貨通買賣繼者廉而慈卧疴力衰憊暴吏恃叨官誅求及管蒯大姓及細民怨仇起眥睚我公方下車當食輒興喟寮屬愛貪泉爭飲不為怪豫將輩元結誰肯伍樊噲職曹與舶屬時號大駔儈兩疏劾四凶人喜如爬疥州胥富蓋藏至則繫以械曰此其渠魁豈止為罥絓縣官庇黠胥期限稍寬解山判吁可驚即日命追解惟仁必有勇勇去禾中稗良善苦勢家至則行決夬府史例橐姦今乃聽自敗無欲始能剛剛拔園中薤我起瞻四方風濤極澎湃砥柱設無人淪胥靡所屆理欲差毫芒公私分限界公竪硬脊梁浮榮等草芥出處民戚休行藏道隆殺授公以師旄一路息雕瘵位公以中書舉世警曚瞶宇宙倘清明行有大除拜作歌者何人江左狂生邁題洪知觀靜齋蠻觸當戰衝蚌鷸據爭境相持無了期復命終歸靜人事苦紛拏世態異炎冷逺抱異俗觀照以清明景余生涉畏途所至虞機穽求富恥執鞭圖名成畫餅道侣得洪師喚我夢中醒師如辟塵犀神觀最清警葆粹息天倪運斤優匠郢結茅規數椽討勝事幽屏楹檻疏以明規撫肅而整畫永篆飛煙風來幡弄影開卷課黃庭煮茶汲清井以靜名其軒會處心自省吾廬雜塵囂相望限一嶺煩師縮地脈得我便造請别來火雲張今見霜宇淨寄詩當梅花一笑師當領學易齋太極分陰陽生生之謂易易有乾之元生意露消息先生易中行日用而飲食全體純是仁本自元中得克已下工夫心臺皎如日處則為顔曾出則為禹稷所以學易齋孜孜奉天職滿腔皆春和八荒開夀域題余君肅曰嚴忍齋君肅吾良朋天資秀而頴以忍名其齋求余為序引余聞刃制心其字謂之忍一忍寬百憂百動歸一靜人心本至明萬善集虛境外物一障之天真隨晦泯意猿肆頡頏氣馬浪馳騁以忍作防間如物有繩凖聖賢養心學最切是懲忿愚者一不校魯者三自省行行無取才宜為夫子哂師德豈懦夫見善必操秉唾面令自乾可以愧不逞公藝忠孝人家法肅而整九世有盤盂一字其要領願子繼自今去過貴乎敏育德必體蒙辨義直觀井意融妄盡消心清事亦省我少染習氣近亦痛除屏作詩雖警君且欲以自警堅固堂五常之有信猶土相生植四端有諸已體用歸於實先生於實地外方而內直硬作鐵脊梁許身衛社稷神授五字符得大堅固力不為聲色搖不為利害怵所以堅固堂山立而玉色願言愛精神自夀以夀國常惺惺室性命一同源萬善天所賦五行水生智正以虛明故先生原命宫水與金夾輔清質自生明冰壺澄月露窮理以致用幹事必正固與國作蓍龜應物公權度所以常惺惺一室神明護室中主人公夀比喬松數代簡奉寄三山方時父過遊幾叟明復昔我遊三山稠中得二友初交方時父後識遊幾叟大比獻能書厥嵗在丁酉垂釣文海中修鱗上鈎否蔡簿校文回曰方其所取有髙説夫者姓名出其右髙遊本弟昆紫荆偶分剖遊雖遲再薦楚弓楚人有余評時父才進士中少耦詞絶似秦七詩已迫黃九幾叟尤不凡耿耿良自負英辭沮金石直氣干星斗等是青雲人科第爭前後射策對天墀會須為舉首三年一掄魁須服天下口毋為陳誠之要作張無垢狂生分不才垂老未覺醜嚮坐太饒舌相看擁衆手六階何惜鐫百謫亦甘受不愛騎鶴姿看人作太守只讀相牛經教子事農畝乏地堪置錐仰天頻擊缶二君最知心一别忽許久作詩分寄之或賞千金帚併簡潘庭堅何時一樽酒寄陳士登元龍士登書問盜且責豫不貽書當路為剪除計豫方以罪歸有言誰見省作詩謝之悠悠我之思東里陳驚坐更闌夢持環晝永心搖纛一春苦風雨我困南山餓君樓百尺髙頭上天幾大於我未忘情更僕修夙好耿耿憂世懷急於聞警報為憐上四州豺虎正喧噪虐焰欲熏天獲人爭斬銼將州豈不武棄縣如洟唾官軍望而奔所至徼宴犒鄰境近憂惶刁斗急巡邏君責我以書何時乃髙卧曷不出良籌亟為當路告當局自能迷看局當不蹉我壯君之言義起千夫愞顧方謹三緘此戒那可破諸賢各有謀何欠儂一箇君家昔太邱能愧梁上盜毋為陳君短此語更傳播吾家昔彥方能正屠牛暴勿使王君知叩頭甘謝過兩家俱德門今有若人麼前時何巖警召亂在縣左賴君告少仙全活幾髫髦但推此仁心古人不難到鄰里貴有恩急難相憫悼裂劵蠲宿逋減資糶莊課肯令州中人指我為竒貨盜亦有道者仁里敢桀驁忠信蠻貊行豈弟神明勞我持一瓣香日為蒼生禱吾君甚愛民恩德侔覆幬社稷福靈長妖氛行屏掃吾言非誕迂有唱吾須和送表弟陳一鳴堯章入京科目狹為途英雄多短氣賓賢詔一頒應舉紛如蝟低心逐時趨練語避忌諱得者固僥踰失者徒歔欷巨鱗不上鈎修翼不入罻鄉選亦孔艱計臺征以彚我嘗校蘭省厥嵗在乙未時收甲乙科多是戊巳尉國步矧多艱志士發長喟襄蜀漲氛妖江淮方鼎沸毛錐無能為長劔使人畏朝能立寸功暮可攫富貴二子趨玉京道逺不吝費進身假梯媒流品孰涇渭世科藉此登親望始寬慰老我謬憂時周嫠遑恤緯諸公忌生語悉力攻謗誹藿食可充飢荷裳尚堪衣功名付君等山林吾有味以喜聞過墨贈吾壻鄭純父玸西蜀遊文昌贈我墨兩箇墨上署嘉名名曰喜聞過過失人誰無剛褊柔易愞衆人巧自文君子喜人告豫性失之剛所患在急躁未嘗不佩韋因循及老大不能如師德受人對面唾至使巧宦徒目為背時貨子性失之柔鮮有特立操嗜欲微萌芽左右紛投好不能如乖崖按劔警坐卧中心欠所主恐似風搖纛乃翁匹前修德行圭中瑁承家合有人前猷宜久蹈賢母慈且嚴熊膽親調和養志最為難家聲出堂奧吾女正抱疴朝夕煩拊勞要相敬如賓毋縱欲長傲女亦嘗聞詩緑衣戒顛倒候其疾之瘳蘋蘩能采芼內行儻不愆事業當逺到賢者後必昌積善天所報持墨為子針進德謹勿惰墨卿子良師莫被渠看破送春有感東君行趣裝桃李事如夢蝶懶欲息遊鶯老不好弄殘紅正可憐更禁風雨送榆莢羞獨飛却惱楊花共去年於此時客食紅塵鬨眼看豪俠兒躍馬青絲鞚美姝舞娉婷吹簫來紫鳳開樽六一亭偃蓋飛來洞我亦強行吟詩成和者衆時序易推移人事少間空翻思年時樂已如耳邊哄清曉坐孤寺晴曦照華棟沙平嘴帶鷗山逺腰橫蝀閲書眼倍明拈筆手猶凍掃地焚甲煎呼童開臘甕汲井得甘泉瀹茗試新貢短章寫我懷謾遣兒曹諷獵者原注見方雷桂子直言其事山中有獵者設網張四隅稚麞為所絓性命懸庖厨母麞至網外躑躅相悲呼明知獵者意於已併覬覦奈愛不可割投網與子俱獵者偶省悟攢眉發長吁縱之與偕活長揖謝獵徒焚網毁毒矢放鷹逐韓盧人物強非類天性元不殊愛母寢皮猿惜子喬腹魚人均作此念可廢佃與漁獵者仁孝心洞然貫體膚彼為中國穽愧見此獵無夀方右史德順大琮生朝大哉天地仁生意無盡藏芳春三月時五陽正敷暢在卦則為夬澤下於天上篤生萬人英出應蒼生望退然處鄉閭溫恭加直諒萬頃波汪汪一團和盎盎凜然立朝廷讜論動旒纊張膽輸藎忠頳顔斥庸妄寧為鳳鳴陽不作馬立仗玉皇笑點頭諌疏堪屏障讒者何人斯嚴科欲監謗綱常盡斁淪天日忍欺誑白璧汙蒼蠅鳴珂辭翠閬膏屯施未光幹蠱遂髙尚郭外新結廬野色耽虛曠積書遺兒孫開斚延輩行及此紱麟旦仙壺敞方丈台宿煥祥輝矞雲賓景貺有客前稱觥致詞太豪放海內今何時四面波濤漲督府册元戎廟坐轅門帳妖氛不能清惻焉賴汝將都堂留一老手携靈夀杖顛危不能扶又焉用彼相時流忌生語相顧效啞瘴回首憶端平芳菲僅一餉大號正揚庭一隂敢陽抗治少亂日多古今同證狀公抱葵藿心未忘太陽向天運有推移陰陽迭摩蕩夬進則為乾羣龍神氣王公主善類盟任重在力量周道當中興方叔猶必壯松茂宜柏悅呂鳴因律唱喚起矍鑠翁吾軍亦可張壺山獻寶熏夀水足醇釀一瓣虬吐煙一吸鯨吞浪夀公乃夀國他語徒冗長玉鼎願精調金甌保無恙書懷奉簡黃成甫史君憶昔紹定元被命考廷策偶過袁君房玉墀日將夕案頭得君文喜躍越三百張燭朗誦之相與手加額若人作掄魁餘子當辟易時有詳定官嫌君多指斥衆默余獨爭言厲面發赤紫宸一傳臚璧水推巨擘諸君始相賀時相頗不懌爰有小人儒從旁肆蜂螫諫官工逢迎霜簡肆捃托此事人能言本末甚明白暨于端平初天奪老姦魄散地起忠良邱園紛束帛君老登瀛洲講筵賜重席余亦試玉堂朝有愈之迹啜茶熏玉蚪投餅呼金鯽同校南宫文等是西山客無何陳腳動君出為方伯館中失名流我輩苦嘆惜西山遽仙去局面日改革余入對未央苦語出肝膈淮南寃未消元載家當籍外黨分牛李內寵怙秦虢臣愚懷隱憂厚地其敢蹐虎鬚敢一編龍鱗敢一逆自信填海隅復中含沙射移舟返蓬萊伏隩甘冰檗君正舞萊衣清香籠畫戟年豐富紅倉風順多琛舶我舍抵是州相望才四驛幽棲懶及門一再通書尺起家倅障濱始訪二千石居官未半期臺評又尋摘既罹關虎嗔宜有人貓厄歸途抵溫陵除夜大促迫所親有室廬許我相假借蓮燈看爛紅柏酒浮重碧去家差不逺朋舊來絡繹雌堂在何許一望弱水隔山鬼巧揶揄室人交遍謫平生重名檢義利最知擇冷眼視輿金寶身甚拱璧世途赫赫炎衆手所共炙誰能效李錐作計事鑽刺蒲葵安可常秋至輒拋擲貴賤見交情書門何怪翟趨時豈不好嗜古業成癖羣飛任刺天甘剪籠中翮丈夫身計輕憂國愁如積向欲恢三京今日蹙五百西蜀斷咽喉北軍患肘腋流民滿京師戾氣成疾疫強寇恣咆哮行人飽需索廷紳倒手版淮帥羞巾幗南海下蒲輪西人望衮舄病劇乏良醫棋危需善奕君行覲清光何䇿輸忠益急須息邊塵徐可夀國脈任責屬諸賢臞儒老山澤寄惠州陳史君真卿千仭羅浮山蓬萊分左股有詔陳太邱剖符為地主皇皇太邱門德星之所聚前光盛胚胎後來紛衆甫共惟休齋公遺教垂鄒魯君侯其聞孫風烈不沗祖繼以詩書帥遺愛比召杜君侯其英嗣真清亦如父嚮者位于朝穹官可拾取不能枉尺尋矧肯效媚嫵翩然乞一麾來此開藩府此郡舊富饒廣中號樂土年來困軍須炎火無冷釜鄰盜闖其藩燒痕未全補噓枯待仁風醒暍仰膏雨迎輅兩朱幡歡呼十萬户朝宣上德意夕問民疾苦為渠作豐年愁嘆變歌舞得結數十輩萬物氣可吐行奏循良功入布承明武走也山林人本無素宦譜妄言宗社事屢犯君相怒緝緝惡樊繩耽耽畏關虎歸歟結茆庵課僕理蔬圃餘子易炎涼眼前何足數君侯誼薄雲寄詩傾肺腑還氈行老屋數十椽下濕上又破無端野狐精昏夜入為盜竊我三重氈目之為竒貨持以獻朱門曰此堪媚竈自余失此物志意不少挫苦節凌嵗寒羞顔薄時好命義守大間潛深仍伏澳客從北方來特以吉語告舊物將見還前甑元不墮余笑與客言的有此説麼孔光坐廣堂當局已昏耄余嘗對天仗正色數渠過其心不能容未免含疾媢石顯在宫闈威福弄幽奧余又疏擊之見面定渠唾其術方盛行及此必圖報客乃寬余心少安謹勿躁聖主赦宿愆仁恩等天幬昭相愛善類德量如海大讒者害莫成匪伊氈自到未幾符其言客喜相問勞勸客勿為喜我且為時悼米石三十千杭人死飢餓敵寨七百里淮人共斬銼窖雪飛無留融風扇炎燥潮汐來無時民廬陷泥潦旱魃肆陸梁妖禽輒鳴噪殞星光射人雨雹威尤暴地軸疑翻騰乾文訝顛倒昔余出硬語萬死敢一冒廷臣誚雲狂相國嫌愈傲不幸期年間前言多踐蹈今居山澤中日向蒼穹禱一願雨暘時田疇足粳􅟙二願干弋休邊境息巡邏庶幾老餘生農圃得自課保此狂生名比方散人號不然瞻四方欲往誰前導雖粟不得食况有氈可卧人品有髙卑才氣分鋭惰嗟我甚低垂賴君起吾愞述夢午枕避塵囂夢乘銀潢槎好風吹衣袂墮我天之涯羣仙赴號召驂鳳來香車一見如故舊絲麟酌流霞或鞭石為羊或握棗如瓜中有汗漫生盤礴埋丹砂誰言仙有道挾術相矜夸顧我亦可學正坐一念差我笑謝之言仙凡各有家悠悠御風還聚散如團沙繩床一欠伸兹遊真幻耶咄咄置勿論呼童煮新茶辛未中元記夢夢與一僧談世事良久問答中有凡事如此汝曹勉之之語既而造一境如仙家居厥明用夢中八字為偈末章反騷一念稍分明天壤異仙凡諸相等歸妄天真要無厖凡物非我有秋毫不可貪只此為上乘其諸總虛談無字經可閲無言禪可參白雲過前山明月映空潭蘧蘧一夢中了了三生意法界如許寬此生亦特寄誰言玉局仙元本是法器不解自磨礲因人亦成事強顔遊人間聊作逢場戲山色溪聲中略得些滋味石塔本無縫吐光萬丈餘不是風火扇又非喉管噓此光胡為來塔亦不知渠解作如是觀身心長自如塔身俱著實光心等是虛虛實歸一致無乘亦無除鑿空談荒唐我正不為此故知又故為頗悟前生是憑誰照前因斯言特戲耳既是無今古如何分彼己須彌一點塵萬劫一彈指無失亦無憂無得亦無喜禪悅既無門仙居在何所與渠無半面一見相爾汝霓裳製未成翩翩欲髙舉身如一羽輕去天才尺許胡為造此境問之不吾語正緣崆洞中蕭然無物貯世人欲不死焚香事大羅死後欲超生將身靠彌陀個裏不透徹仙佛如子何我素不持戒焉能斷腥臊獨有一寸圭明白不可磨學仙與學佛此事付兒曹搗薺餐鐵杵此味知者鮮乘車入鼠穴聞者知其舛打鐵作門限鬼笑定不免點雪紅爐中達觀理甚顯當局自然迷正欠撥一轉上馬奔前程此著須自勉盤中有止水歷歷見鬚眉能定乃能應人心固如斯至誠本如神聖賢不吾欺鳴鶴方在陰其子輒和之天未降時雨山川雲已知誰能舍我龜而觀爾朵頤贈談星達士列肆競談星謬者十八九達士何許人儔中推好手精步宿羅胸縱談鬼擘口技絶固招窮鶉衣不掩肘朅來訪臞翁意欲相擊扣翁命翁自知不問子休咎蒼生命甚危子亦知乎否魏闕妖狐翔吳江水獸吼馮夷肆陸梁富媪難載負強冦噬邊州湖堧經踐蹂王師戰且弱鉞鈍甲兵朽流民滿江濆溝洫紛骸髏京米貴於金十千可一斗暮夜光燭天彗星大於帚災眚此非常其敢飲以酒都人極皇皇如魚驚在笱國脈眇一絲病固有從受西山薨於前鶴山繼於後洪蔣與李徐俱作修文友吳訃漫塘翁廣哭菊坡叟天為國生賢福賢理宜厚何事數巨公不為國耆耉周堪劉向亡老光握靈夀元城了翁去賊京得皓首賢者今餘幾其生皆不偶或入在朝廷或出為牧守或未脫丹書或猶耕岩藪煩子布星躔為余細分剖孰可坐廟堂孰竟死田畝孰堅如松篁孰脆如蒲柳天如祚吾宋存者必長久狂生何能為自分安老醜無地堪植錐仰空長擊缶昂藏作丈夫諂佞羞妾婦寧可效熊經不出隨狗茍但願世道寧天宇息塵垢廷無憸壬人周召置左右邊無兒戲軍廉藺善攻取庶幾老餘生官職乎何有間日教子書不教子學走水口上舟呈同行傳月山萇泝流上嵩江江闊流益峻時方良月初打頭惡風信老翁把柂立首呌尾必應大男前運篙風激水還噴小男上拽縴石行跲復奮後退輒丈尋前躋不尺寸逼仄一堵中危坐易慵困冷雨去復來前山邈難認江天暮漸低好風來一瞬帆飽去如飛兩程疑可併舉杯囑月山凡物有定分壯年登王官轉盻更五閏星沙罹閔艱日轂轉顛頓方頭忤時流失腳落陷穽巧宦疾以馳笑我拙而鈍如登今日舟易退難於進自知平生事百欠無一剩飢寒驅出山歌笑破羣悶獨有不自欺心可與天印人為固多端天定或能勝願如晚來風先逆後乃順得酒且酌斟升沉付天運有窮必有通無喜亦無愠送林公似有之宰古田余與林公似生長南山南吾翁與乃翁宿望俱不凡或晚登黃甲祿不霑斗甔或困頓場屋補勞僅青衫執手授遺編尚友遷繼談家法無諂語妙理靜中參丁丑俱一第苦盡稍回甘蹭蹬二十年令才換頭銜嚮來同登者青雲遍騰驂吾輩慣冰檗世好殊酸鹹君去宰壯縣栽花興方酣我乃賦歸與悔狂口宜緘棘蠅來營營關虎卧耽耽頽波從汩沒砥柱髙巉巖孤士脫選階如出百丈塹舉員必及格桂籍始一占宰邑非不榮吏塵豈宜厭平生學愛心小試乃可驗今時邑大夫不軫閻閭念非財不經營所欲須屬饜創第要髙華買姬求美艷驕色肆頡頏嚴科行聚斂攫肉比飢鷹噬膚如獰獫但規已豐腴皇恤民亡阽吁嗟叨餮徒信是搢紳沗中人易轉移習俗多薰染林君最髙明百行無一欠俗然君不然白璧絶瑕玷狂生作此詩未病投針砭愛助極拳拳苦語忘其僭寄林教授龜從我生麋鹿羣巖穴性所樂寓城看病女蹤迹良踸踔神明倘見憐醫藥須課效便當歸舊廬誰愛入此閙炎暑甚蒸炮矮屋如籠罩欠伸尺蠖形低垂木雞貌清晨得君書銜繫新州教慈恩敘同年轉盻夢一覺我於端平初蓬山叨直儤批鱗咈神龍編鬚犯關豹一斥褫三官連年絶廩稍我罪坐狂愚令受人繫敲君胡二十年無由極比較今又深入南正坐不能巧羣兒益紛拏疾足逞超趠我輩履羊腸所歷極確磽宦海走千帆好風縱篙棹我輩航一葦無緣出泥淖世道日以艱大厦摧棟橈邊塵日以紛衝梯設矢炮逆潮陸成淵苦旱水飛窖餓莩盈通途驕兒縱烈爆君視此何時有官如荷校猶戒我韜藏前尤勿再效良玉不受焚直木不畏撓命當安窮通義當守忠孝久别誦吾詩君心獨無恔跋林學士宋卿帖林初第時與友人洪明昌帖云某叨沗後得鋪地錢千省孤寒出京人例厚贐之所存無幾但沒雙金間費耳僕一日過姑丈林叔寶家睹此帖因嘆前輩髙誼如此偶憶韓魏公生平輕財喜士凡數事國史不載而家傳載之遂成古詩以發潛德朝為一旅人暮拾九品官趾髙氣且浮反靣視孤寒昔聞韓魏公義風塞人寰赤舄坐晝錦有客排其關孤身無所賫乞公玉盥盤公笑授之去感涕雙汍瀾我始得此事謂可聳俗觀家傳書甚悉國史載不完今見學士帖爛然銀鈎蟠方其一第初半載遊長安持書遺鄉朋客費無虛間近得奩中資分壯貧士顔寧我食無魚不忍渠無餐寧我裾無華不忍渠衣單臭味何所愛敢言囊之慳猶愈輕薄兒一笑黃金拚我來閲遺書據案發長歎縱橫才片紙突兀已萬間魏公為上相庇士易為歡林公初筮仕為此良獨難景仰前輩人髙節騫雲山原下不可作清風何時還泚筆哦此詩寄名烏絲欄庶幾一見者可以激偷頑反艷歌曲復三山林斗南誰作艷歌曲律清語不塵雜之古樂府意態甚迫真謂余欠嫵媚宜為衆女嗔方憐長門閉漸喜湯沐新此曲豈不俊所擬非吾倫生為竒男子先辨許國身有手要折檻不炙許史門有頭要叩墀不拜五侯塵昵昵兒女語煦煦婦人仁夕泣緣失寵朝欣為承恩此非奴事張定是妾效秦是為赤有臭何止黃不純因君詞婉美感我意酸辛正恐漆園女嗤點我輩人送地栗與囊山應叟和尚淤泥生蓮花不如生地栗蓮花生好看地栗却好喫看底只是虛喫底却是實虛實總不如般若波羅密
