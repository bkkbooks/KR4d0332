body:
  text: 提要别集類三宋臞軒集十六巻臣等謹案臞軒集十六巻宋王邁撰邁字實之興化軍仙遊人嘉定十年進士調南外睦宗院教授召試學士院改通判漳州應詔直言為臺官所劾削二秩淳祐中知邵武軍予祠卒贈司農少卿事蹟具宋史本傳然考周宻癸辛雜識有載邁為正字時事而本傳不言其為此官則史文亦有所缺畧也邁所著文集宋史藝文志不著録惟明錢溥秘閣書目載有臞軒集七册王圻續文獻通考亦有臞軒集二十巻是明代尚有傳本今世所存祗臞軒四六一巻皆啟劄駢偶之作盖即從集中抄出别行偶然獨存者也今以永樂大典所載兼採他書所引附益之共得文一百七十一首詩四百四十三首詩餘五首釐為一十六巻計其篇目約畧得十之七八矣邁少負才名而史尤稱其練逹世務蓋非徒欲以詞藻見長者考其初以殿試第四人出佐長沙幕劉克莊作詩送之有䇿好人争誦名髙士責全之句見於後村集中是當對䇿時已有伉直之目厥後歴官所上封事類多區别邪正剖晰時弊之言如諌喬行簡再相及禋祀雷雨應詔諸篇敷陳皆極剴切其於濟王竑事反覆規勸更見拳拳忠愛之心癸辛雜識稱邁因輪對追論史彌逺擅權詞氣過戇帝以狂生目之邁後歸里遂自稱勅賜狂生其事為本傳所未載亦足以見其氣節今集中諸疏並存尚可考見一二集中詩文亦多昌明俊偉類其為人讀者因其言而論其行固不徒取文辭之工矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2b8e382428ca88555788d280ee82012bc91ec07235057f82fcf05d6006c27e36
