body:
  text: 臞軒集巻四宋王邁撰論文帝論一文帝仁柔之主非有武之剛鋭宣之嚴毅也及參稽帝之行事見其居重馭輕總攬大權雖武宣之君不能過而後知人君如帝正所謂仁而有勇寛而有制者也方其乘諸吕旣誅之後自代入繼習見南北兩軍之權能為社稷之輕重故於天下未定羣臣反側未安之始即拜宋昌為衛將軍以領之及天下已定人心已安又恐此曹之恃恩怙寵漸不可長也於是不二年間即罷昌之兵柄一呼吸指麾之頃兩軍權自天子出也故小而信近之臣禀命惟謹不敢竊弄威柄於㝠𡨕之中大而元功宿將奉身寅畏凛凛乎如履淵氷之上百司庻府不敢慢令於其内諸藩侯王不敢抗衡於其外吁何其壯也且七國之變不遽發於文帝之時者人謂吳楚包藏叛心已非一日之故惟賴文帝優游而涵容之故其謀無因而發景帝用晁錯削地之䇿始激其變竊以為不然以文帝之時觀之蓋未嘗無間隙可激諸侯之反者淮南王長首犯不軌死於蜀道當時有尺布斗粟之謡此有可乘之隙一也而七國不反濟北王興居與平勃之徒共平諸吕以封爵不如意而謀作亂卒起平之此有可乗之隙二也而七國不反帝太子與吳王濞太子爭博以棊局殺之吳王怨望失藩臣禮此有可乘之隙三也而七國不反有此三間之可乘而七國終莫為變者非不欲為也文帝收兵權於上七國退聽於下雖欲爲亂而不可得也嗟夫文帝天下之仁君而能果於用天下之權此其所以不可企及歟昔者聖人作易至巽之卦而教人以用巽之道其象曰重巽以申命至繫辭又以巽以行權言之夫巽者柔順之謂也聖人懼夫柔者之易玩而順者之易狎也故於出命之際先庚三日以令之猶以為未足必後庚三日以申之庻幾可以警天下之耳目而巽之權得以行焉仁之至義之盡也古之人有得巽之義而能用天下者文帝其當之矣文帝論二甚矣私心之未易克也太上無私其次則有私而能克人之德性本是髙明一為私慾所蔽則意念顛倒舉止輕浮外無威儀足以臨人中無操守足以行善發於其心害於其事姦言始得以亂吾政利口始得以覆吾邦几此者皆私慾之為害也是以人君能格物致知正心誠意就道親賢問之辨之以明所未明篤志勵行精之一之以守所難守私心邪念一切屏除天理昭融内明外映杲日中天羣陰自伏此二帝三王所以中天地而立極也漢之文帝其亦勇於克其私者歟何其見善之明而用心之剛也方六飛之幸渭橋有犯清道之蹕者帝怒必欲寘之極憲一怒之餘人命係焉私欲害正莫此為甚及一聞廷尉持平之言則釋然而悟犯者得免於死至於朝東宫之日宦者趙談得以驂乘人主舉動萬物所瞻一溺於愛悖道至此及一聞袁盎之諫隨即下談略無留難之色此二者猶可諉曰仁厚帝之天性故其釋犯蹕之怒為甚易而刑餘驂乗大有損人主之威故改之亦無甚難也鄧通近宦之最昵者也鉅萬之賜銅山之寵其所以貴幸通者出於内廷之右矣一旦立朝少有怠慢丞相嘉至府出片紙以檄之如召嬰兒帝不敢庇之也雖欲遣使召通而又恐丞相之威未伸必紓徐以待之度通已困辱然後遣使謝丞相而召之初未嘗寘忿怒於其間也其後新垣平之詐一蠱其心立廟之舉非所以為訓也未㡬而姦狀自白則孥戮之刑曽不少貸自五帝之祀領之以官未嘗躬徃蓋絶口不言鬼神之事者終其身非勇於克其私者疇能爾哉夫帝能敢于肉刑之除而不能免犯蹕之怒能安於服御之减而不能無驂乘之非能正元舅之刑而不能杜嬖倖之侮能除宗廟之祕祀而不能不為神仙之惑是皆私心有以撓之也使是數者而不能自克焉則怒者不息是枉法也非者不格是啟寵也侮者不懲是長惡也惑者不悟是迷復也又何足為文帝哉惟於其所為私而能克之則已徃之愆渙然氷釋自新之善昭映方來至此則大舜聞善若决之時成湯改過不吝之日夫子所謂觀過斯知仁文帝其當之矣文帝論三天下之事最不可以有心爲之有心於用其剛則剛者狎之招也有心於用其察則察者欺之本也是故惟天下之至柔者為能剛惟天下之至寛者為能察觀文帝之事則可見矣文帝以仁柔帥下當時稱為寛大宜若臣下可得而狎之而實則凛然不可犯武帝號為英明之主持法又嚴於文帝宜若可以杜左右之欺而實則易於狎侮是豈可以無辨哉薄昭文帝之母弟一旦以殺使者之故文帝以義制恩寘昭于法太后雖存不可得而庇之武帝之立受制母后曽不得一舉手及后崩帝始得以有為是后戚得專政於武帝之時而文帝則無之也絳侯親握天子璽而授之文帝功不細也告變之書帝一聞而生忌使廷折簡以召之極其困辱僅免於死而武帝初年武安侯為丞相擅人主生殺之權帝莫能禁如所謂君除吏盡吾亦欲除吏等語君弱臣强於勢甚舛是功臣得擅權於武帝之時而文帝又無之也魏尚守雲中首虜差六級似未為過而幕府以聞乃下吏奪之爵而武帝時李廣利捐五萬之師閲四年之乆從事於宛及其歸也不過得駿馬數百蹄而止而兩侯三卿同日並拜得二千石者百餘人是以邊境之事得售欺於武帝之時而文帝亦無之也文帝入宫夜拜宋昌為衛尉領南北軍不二年即停罷之操縱予奪不以兵權輕假人而武帝初遣李陵援貳師軍陵不受詔又遣路博德迎李陵而博德亦耻為陵後距是兵將之令不行於武帝之時而文帝又無之也張武帝藩邸之舊臣也受賂金錢事覺以賞愧之故由代來官不過郎中令而止武帝時田蚡受韓安國五百金即召為北地都尉受王恢千金諷太后使不誅事竟不發是贓汙之吏得容隱於武帝之時文帝又無之也新垣平之詐既與之立廟此固文帝一時之惑及其姦状既覺不旋踵而誅之斷在不赦而武帝信李少君丹砂可化之言聴粤人祠鬼有效之説及方士候神無效驗而公孫卿猶得以為解終身不悟是姦倖之徒得肆意於武帝之時文帝又無之也叠是六者而論之文帝豈真仁柔武帝豈果嚴毅哉文帝論四賈誼天下之竒才也得君如孝文而以不用死人孰不悲誼之不遇然則文帝果棄才之主耶吾有以知其故矣帝方即位召田叔問以天下長者叔曰臣何以知之上曰以公長者宜知之於是叔以孟舒應詔夫一舒之用不足道也而帝心所向則可知矣一時大臣自絳侯外張釋之直不疑馮唐諸公皆心知其為長者皆用之此帝之所見也誼一見帝相得驩甚一嵗之中自博士而陞中大夫帝之愛誼者不薄矣誼之血氣方剛世故未熟挾其有餘之才睨視漢廷諸臣欲出其上帝心雖愛誼而不敢决誼之用舍也一旦有請於帝首以改正朔易服色紛更制度為言帝于是得誼之為人矣吁亦孰知帝愛天下之重有甚於愛誼者乎漢興至此甫二十年髙惠之仁漸於人者尚淺也流離之民僅及息肩正猶痼疾初奮勺飲圭黍方入口腹而或者遽欲摇撼之故恙㡬不復作乎此固帝之所畏也又况重以紛亂諸事之譛出於帝平日親信者之口雖欲使誼一日安其身於朝廷不可也何也帝愛天下之重固有甚于愛誼也雖然長沙告行之後帝豈恝然忘情於誼哉度之帝意毋亦謂少年圭角未除曾不知老成之為定慮屈者伸之基栽培封殖以大誼之所受是帝之心也宣室召還之日其霜降水涸之時乎誼於是時閲天下之理義頗多於疇昔矣誼方自喜其前日之摧折乃所以為今日之發生而帝亦未敢以故態待誼必欲其少年英銳之姿斂而為元老之事業而後帝之願畢矣治安一策欲帝立制度為萬世計其論非不切至也奈何以三表五餌之説參錯乎其間使一時君相得見其踈故制度之説雖可終不見用豈不重可惜歟大抵帝之本心惟謹守髙皇帝之規模涵養天下民命而已利口如嗇夫之徒必痛懲而勇絶之誠恐此風一長有以激天下之多事則誼之不及究其設施者君子固不可得以病文帝余嘗因是而論漢髙文帝所用相臣皆重厚之流雖文雅不足而於天下事變練熟已深故不至輕舉而妄動自申屠嘉為相之前類皆持重鎮静無智名勇功表表在人耳目者天下隂受其和平之福申屠丞相薨明年晁錯用事一轉臂間如癰疽速潰而不可救朝無老成使新進之士得以變亂舊章騷動政令此豈天下之福哉故曰誼之不見用於文帝雖誼之不幸實漢家社稷之幸也文帝論五余嘗觀賈誼弔屈原賦因以究觀誼之終始而後知文帝未為不知誼而誼誠不能以自知也且誼之見知於帝以吳公一言也吳公之薦誼亦惟稱其能通諸家之書為經生學士之事也公以經生學士薦之帝以博士處之豈不為量能授職哉既官之博士矣而又陞之中大夫帝非不知中大夫為有政事之官而顧使誼書生為之者蓋欲以此試誼之施為也紛更常度慢易故老少年習氣色已呈露於是决知誼之才可以言文學而不可以論政事矣未㡬而出傅長沙焉漢家制度以明經學士為侯王師傅不特誼一人也董仲舒王吉貢禹諸人皆以文學居此位此正漢人中外迭補之法而誼獨不屑於其職弔湘之作悲鳴躑躅殆不能以自禁多見其不知量也夫道之窮通有命存焉無故之變聖賢有所不能免要在吾所以處之者如何耳人必有大患難而後有大植立而有道之士履坎險如夷塗遭變故如無事存神於我而榮辱得䘮所過者化如太虛之一塵孔孟之處世變用此道也柏舟仁人不遇之詩也而曰威儀棣棣不可選也何嘗怨其為不遇北門大夫不得志之詩也而曰天實為之謂之何哉何嘗恨其不得志考槃在澗碩人之寛賢者不自知其在澗隰桑在阿其葉有儺君子不自知其在阿必如是而後可以為窮理盡性之學又况誼今日之遇未為不盡其才者獨少容忍而静俟之憂喜欣戚横於肝鬲悻悻見靣如小丈夫曾是謂之知道乎其後宣室召還之日又不過出為梁傅而已甚矣文帝審於知誼而誼獨不能以自知也雖然誼誠竒才也而迄不為漢大臣元老吾於此深有感先王用人之制也先王之制限人以四十而仕者蓋欲其磨礲世故之深漸漬禮義之乆而後用之以責其成也使誼獲生於先王之世限之以四十而仕之制誼未必不為成德之人吾又嘆夫後世誘天下以爵禄之具其斷䘮人才者豈少哉文帝論六昔者聖人執皇極之道以御天下寜與天下從事於廣大樂易之中毋寜驅天下日就於隘狹蹙廹之域寜使精神心術運量酬酢猶有所遺而不敢盡毋寜使文理宻察光芒必露一窮而不可繼是以愛天下為甚重慮風俗為甚深非淺識末議可得窺測也余觀賈誼言文帝時每事有不滿人意剟簾器剽吏奪金等事未嘗不嘆其時禁網失之太疏是必有所見矣及觀酷吏傳見景帝時所用郅都寗成之徒行法獨先嚴酷時以蒼鷹乳虎目之此風一長其後如義縱以鷹撃毛鷙為治王温舒以窮治奸猾為能而吏民益輕犯法南陽齊楚燕趙之郊盜賊蠭起攻城邑取庫兵殺二千石者跳梁而不可禁至遣御史中丞以督之而猶莫之遏也又遣繡衣直指興兵捕而羣盜竄亡山澤無術以處之於是始作沈命之法盜賊若發發而不捕二千石以下者皆以死坐其後小吏畏誅雖有盜不敢發府亦不敢言上下相匿以避文法而後知天下之事正不容過於用其察也有郅都寗成之徒其勢必有義縱王温舒之吏治有義縱王温舒之吏治其勢必有南陽齊楚燕趙之盜既有南陽齊楚燕趙之盜其勢必有繡衣直指之使有繡衣直指之使其勢必有沈命之法有沈命之法其勢必有上下相匿以避文法之弊束之欲其急而犯者愈縱撲之欲其滅而趨者愈炎隄防日宻而罅漏日生檢柅日嚴而姦軌日勝反而思之文帝初年雖有巧詐暴戾之習而帝法不加察刑不必嚴者蓋以君子長者處其身而待天下亦以君子長者之道彼雖薄而吾待之以厚彼雖詐而吾示之以誠養天下安静和平之福而壽風俗之脉於無所終窮之地其為慮豈不深逺歟景之忌刻武之剛烈宣之聰察皆不足以進此故曰天下之事要其終而後見仁人君子之心景帝論論東都之明章不可不論西都之文景蓋明之忌刻似景而章之長厚似文叅前證後則景帝之失浮於明帝而肅宗之善過於文皇也逺要不可以無辨西漢自髙帝創業嘉與宇内從事於廣大樂易之域寛仁一念為漢家社稷之根本文帝繼之仁増而愈髙澤浚而愈深為景帝者不過守髙祖立國之意益從而培植之則漢家之元氣日充民心之戴漢愈固夫何刑名之習先入其心任用酷吏郅都寗成之徒以毒天下至使公卿大臣駢頸就戮髙文累世之澤殆㡬斬焉河汾氏不以之預七制之列者蓋惜之也若夫明帝之察慧咎不在帝而在光武光武矯先漢之枉凡事必過用其聰明方明帝為東海王時正在童丱之中而能知墾田之弊光武即期之以察慧至以庻代嫡而不以為過不知人之一心先入為主雖終其身湔洗不盡明帝既以慧察見喜於光武異時設施君子得以覘其終是則帝之刻薄光武有以遺之非如景帝之忌刻出於天姿之固然非其父祖之過故曰景帝之失浮於明帝者以此章帝承明帝苛政之後亦難乎其為繼矣而章帝則能代虐以寛除苛解嬈如楚王英之獄淮陽之囚知其無辜必為之洗濯其舊染而更除其禁錮輕徭薄賦與天下休息而又能容受直言朱暉之面折廷諍則温辭以慰勞之崔駰之為人告訐不特恕其罪又從而寵襃之蓋其性姿本自慈祥凡所設施有厚無薄一時風俗駸駸近古是以明帝苛政之失未遽形見蓋有章帝以蓋前人之愆也若文帝承髙惠之餘故家遺俗一本寛仁帝蓋習聞而稔見之故能謹守家法罔敢失墜非如章帝親承前世之苛政能反而為今日之愷悌也是以為文帝之寛仁易章帝之長者難故曰章帝之善過於文皇逺矣嗚呼以文帝之寛仁不幸而有景以明帝之慧察乃幸而有章讀史者試思之武帝論一昔者嘗疑漢文武之事矣文帝之詔三十有六而為民下者不啻大半而遣謁者問所不便安僅見後元十二年一詔而止至如武帝之詔無恝然無意於民者遣謁者行天下存問致賜則元狩元年也遣博士六人分行天下存問鰥寡廢疾則元狩六年也遣博士等循行告諭人之重困具舉以聞則元鼎二年也遣直指使者繡衣持斧分捕盜賊則天漢二年也且遣使以宣人主之德於天下此人主盛德事也今武帝所遣問勞之使多於後元謂無意於民不可也而治效反與文帝相反獨何歟蓋嘗讀郭槖駝傳而得其説也槖駝古之善種植者也或移徙木植無有不活他人雖窺伺傚慕莫能加焉或問其故則曰吾非能使木之壽且滋也惟能順木之天以致其性耳勿動勿慮去不復顧其蒔也若子其置也若棄則其天全而其性得矣不善植者爪其膚以驗其生枯摇其本以觀其踈宻而木之性日以離矣雖曰愛之其實害之故不我若也然則文帝之於民善植木者之順其天也德化行而民知禮義農桑勸而民知力田恭儉尚而民知朴厚之從肉刑除而民知有生之樂所以培固根本而全生民之天者至矣又安在其遣使之紛紛者乎武帝則反是矣殘民命於開邊括民財於平凖法嚴令宻輙陷民於無辜至於遣使之際陽為撫摩隂實煩撓今日使以命來曰官命恤爾饑憫爾貧明日又以命來曰爾有利官為爾興之爾有害官為爾除之車轍紛紜冠蓋駢聚民困於道路之將迎苦於朝夕之號召且不得暇又何暇蕃其生而全其性耶此所謂爪其膚而摇其本非惟無益而又害之者也因是以觀文帝一時治效自其外視之類不甚快人意禮樂則不興外裔則不服符瑞則不至然二十三年之治邦本民心牢不可動謂武帝之禮樂未興歟則百度修舉郊廟告成矣外裔未服歟則南粤之首垂北闕矣符瑞未至歟則天馬芝房嵗不絶書矣然而根本既戕雖强何恃是所謂宋人之苖方喜其勃然而興不知其槁之無日也故觀槖駝之植木而後知文帝之得觀宋人之揠苖而後知武帝之失武帝論二漢自髙皇帝脫略邊幅嘉與天下之士周旋於功名之㑹天下已定始思為休兵息民計而一時大臣皆相從於智名勇功之域而不敢激天下之多事文帝執䋲墨以用人才故廟堂大臣邊閫将帥皆髙惠時重厚舊臣為之而利口如嗇夫者必黜紛更如年少者必踈刻薄如家令者必斥至於晩而從容言論猶慨然於絳侯東陽侯之長者蓋其不敢用少年輕進之人以息功利之争以壽風俗之脉髙文立國夲意然也武帝今日所得之才奈何其不然歟帝負英特之姿思夫一日非才不足集事是以多其塗而誘其進大其門而不限其來曩時抱竒矜節困於芻牧賈販奴𨽻醜虜之㣲者皆得洗濯磨礪以赴功名不可失之機會君子安得不嘉其振作之雋功而健其招徠之鋭氣哉然徐攷而極論之人才之多非武帝之福也彼其好尚之意偏容養之量狹一見天下之多才為之囂然欲作而不能以自定方且與之角逐於事變紛來之中而髙文所以集天下安静和平之福者至是無餘脉矣平日周旋左右雅與帝合者内則寛宏之相外則衛霍之將也否則趙張桑孔其人也又否則臯朔朱嚴其人也皆喜生事者也皆巧持論者也皆突梯脂韋甘以妾婦為茍悦者也帝有所為此曹揣其意㫖有一能一藝可以自效者皆乗其機而急投之帝方竊自賀以為蓋世功名此曹可以立辦不知反為之蠱其慾以鴆其心障其明而錮其習則帝之肺腑皆非已有而所得之多頼以為已助者至是皆為已累矣然則武帝亦何樂於人才之盛哉雖然帝誠有志於功名者也所得之人非不多莫克自愛顧激而為一切之好是則可恨也輪臺之詔帝至是而年七十有五矣而能盡知昔日强悖之事深自悔咎一切更改于斯時也嗜慾之機息清明之慮生且環視在廷諸臣無一深沉雅量之士可託孺子之天下乃舉而屬之木强之霍光且光之沉審詳宻出入殿門郎吏察之不失尺寸帝知顧託之重不敢輕以付人惟光足以勝其任也是以一旦㧞之常調之中毅然以大事寄之一動足以鎮浮片言足以靖亂觀其輔少主定天下之日首述文景之事以培植其本根窒武帝興利之言而惠澤復流有以祈天永命則光之力居多焉夫以帝之晩年力衰意怠而猶能見及此輪臺一詔發之也武帝論三天下有尊德重道至賢之君而後能用守節仗義正直不屈之臣其好賢樂善之不出於誠心而區區禮文徒足以縁飾於其外者雖有社稷之臣不可得而用也武帝之待臣下鮮克由禮獨於汲黯奏事或時不冠則避之帷中使人可其請此帝盛德事也然黯之進言未嘗一聽畫䇿未嘗一用𢎞湯之阿諛順㫖皆躐進而驟用之至謂黯為甚戇謂黯為不學謂黯為妄發不能使其身一日安於朝廷之上淮陽之遷以召許之而十年不得調則前日之不冠不見者徒為如是之深文厚貌也且淮南王謀叛獨憚黯而不敢發是其節義忠信足以取信於蠻貊而帝獨不之知乎昔者司馬遷以黯為鄭當時之流匹故作汲鄭傳而班固作公孫𢎞等賛又曰質直則汲黯卜式以余觀之鄭當時雖有推轂薦士之能然在朝常趨和承意不敢甚斥臧否視黯之正直不阿烏能無愧卜式以財利得幸立朝大節寂然無聞而遷固乃以黯與二子者並稱是黯之生不見知於武帝而死又受誣於遷固也雖然自今觀之武帝所用功利之臣諛佞之士權勢氣焰雖在一時赫奕如許而身没之後與野馬塵埃漂蕩滅息而黯之剛聲勁節凛然與秋霜烈日争嚴至使千載之下讀其傳者想見其人起敬起畏之不暇則雖生為武帝之不用死受遷固之見誣亦何傷於黯哉武帝論四異端為吾道之蠡賊尚矣入春秋戰國以來諸子百家各以其唇門舌户簧鼔於時人心為之淪溺聖道為之荆榛蓋至漢興之初其習猶熾未易撲滅武帝之時起絶學於乆廢收經籍於散亡所舉賢良或治申韓蘇張之言者請罷之則建元元年衛綰之奏也諸不在六藝之科孔子之術者請絶之則元光元年仲舒之策也二子之闢異端言甚切至異時史筆亦以表章六經罷黜百家為帝之褒是二子當時之言帝亦施行之矣以史攷之殆不其然帝之於經術喜其名而隂諱其實於異端則用其實而陽諱其名綰之請罷者未甞罷也舒之請絶者亦非果絶也張湯趙禹非法家者流乎主父偃嚴助朱買臣非縱横家者流乎文成五利非隂陽家者流乎帝之一心攻者甚衆百家之習皆流入其中茫如捕風無所依據不過假竊儒術之名以瞽聾世俗之耳目雖然衛綰之奏亦豈真知申韓蘇張之果不可用哉綰帝之弄臣也平日從容帝側逆探帝之心術實開其端而陽諱其名故設為此奏以逢迎之爾綰不足責也而仲舒之請亦莫之用何耶竊謂仲舒雖號醇儒而闔縱隂陽之術亦自陷溺其中而莫之覺習俗移人豪傑不免何怪乎帝聴其言而不能絶也秦漢而下以儒自名不能不為異端所汚者亦多矣荀卿學孔氏也而是桀跖賈誼明王道也而習申韓黄老何人而史遷以之先六經百家七略何書而劉向父子以之爼豆於吾儒之列此皆不足深惜者而醇儒如仲舒猶不免議信矣必純乎為孔孟之學而後可以言正人心武帝論五竊嘗觀武帝之臣皆其平日親信昵狎者獨惟霍光汲黯以嚴見憚帝嘗稱霍光可以屬社稷亦以汲黯為社稷之臣及其晩年託光以孺子之天下使之得建大功立大名同漢不朽而黯竟老於淮南之一守社稷事業後世無聞焉夫二人之節義則同而成就則異其故何也蓋嘗思之辦天下之功名者在乎有大臣之節居大臣之功名者在乎有大臣之量剛毅正直凛然不可犯者其節也含宏光大淵乎不可窺者其量也坤臣道也六二臣之正位也聖人以直方大言之夫臣道以直方為上必欲以大居之而後直不至於抗方不至於褊此坤之所以盡臣道而居大臣之位者所宜法也昔者周公以忠於王家之心可以對越天地而無愧近則冲君之不見知逺則有四國流言之變他人處之鮮有不為之拂於心而衡於慮而赤舄几几德音不瑕周公何嘗致忿怒於其間異時植璧秉珪之書一出精契神交於不言之表故能德澤及萬民勲業蓋萬世者以其大也然則霍光之能立功名者固其節足以辦之亦其量直以居之汲黯無尺寸之權於漢者豈其節有餘而量不足歟且光之沉靜朴厚人莫見其涯涘郎官拒印則喜而加秩燕蓋流言則謝而不辨其容受之量過人甚逺宜其有以居莫大之功業也黯之為人面折不能容人之過合已者善待之不合者不能忍是其淺中之失已無以為功業之地矣觀其見丞相不拜見衛將軍不拜因其所自負甚髙蔑視王公而不為傲也然至於耻居𢎞湯之下遽發積薪之言出守淮南愠見顔色則多見其量之不宏也乘田委吏聖人安之黯未為不得君者何至欲行其志如此其遽哉吁大臣之果不可無量也如此
